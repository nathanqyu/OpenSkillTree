# OpenSkillTree — Local Development Database
#
# Usage:
#   docker compose up -d        # start Postgres in the background
#   docker compose down         # stop (data persisted in volume)
#   docker compose down -v      # stop and wipe all data
#
# The schema is applied automatically on first start via the init script.
# After `docker compose up -d`, set your DATABASE_URL in .env.local:
#   DATABASE_URL=postgres://openskill:openskill@localhost:5432/openskill

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: openskill
      POSTGRES_PASSWORD: openskill
      POSTGRES_DB: openskill
    ports:
      - "5432:5432"
    volumes:
      # Persistent data volume (survives `docker compose down`)
      - postgres_data:/var/lib/postgresql/data
      # Auto-apply schema on first container start
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openskill -d openskill"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
