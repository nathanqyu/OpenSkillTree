# OpenSkillTree — Seed Skill Tree: Photography
#
# Domain:  Creative Arts / Visual Arts / Photography
# Author:  OpenSkillTree Team (first pass)
# Version: 0.2.0
#
# Benchmark levels reference: NYIP curriculum levels, PSA merit system, 500px Pulse ratings
#   beginner     = Smartphone or entry-level camera user; relying on Auto mode
#   intermediate = Consistently uses Manual or semi-manual modes; understands exposure
#   advanced     = Produces technically competent, intentionally composed work
#   expert       = Professional-grade output; masters technical AND artistic dimensions
#
# Teaching order based on NYIP curriculum, Karl Taylor Education, John Greengo
# (CreativeLive Fundamentals), Parsons BFA Photography, and Icon Photography School:
#   Camera operation (Auto mode, basic handling) → exposure triangle →
#   focus & depth of field → composition → lens selection →
#   natural light → histogram & metering → white balance & color →
#   RAW processing → off-camera lighting → genre specialization.
# The majority of formal programs use a technical-first approach: camera operation
# before exposure theory, exposure before composition, natural light before
# artificial, generalist fundamentals before genre specialization.

tree:
  id: "creative-arts/photography"
  title: "Photography"
  description: >
    A complete skill map for photography — the art and craft of capturing light.
    Covers the exposure triangle, camera controls, composition, light, lens selection,
    post-processing, and specialized shooting techniques needed to progress from
    auto-mode smartphone photographer to technically and artistically masterful image-maker.
  domain: "Creative Arts"
  visibility: "public"

nodes:
  # ── CAMERA OPERATION (taught first — learn to use the tool) ─────────────────
  - id: "creative-arts/photography/camera-modes-settings"
    title: "Camera Modes & Settings"
    description: >
      The starting point: knowing how to operate your camera. Begins with
      day-zero basics — inserting a memory card, charging the battery, holding
      the camera correctly (right hand grip, left hand supporting lens), and
      understanding the viewfinder/LCD. Then progresses through camera modes
      from Auto to Manual as understanding deepens.
    benchmarks:
      - level: beginner
        criteria: "Holds camera correctly with stable two-hand grip. Inserts card, formats card, charges battery. Uses Auto mode competently. Understands what P, Av, Tv, and M modes do in principle."
        metrics:
          - "Can switch between Auto, Av, and Tv modes and explain why each is chosen"
          - "Takes 20 photos in Auto mode with correct framing and no camera shake"
        resources:
          - title: "Tony Northrup — Photography Basics in 10 Minutes"
            url: "https://www.youtube.com/watch?v=LxO-6rlihSg"
            type: "video"
          - title: "B&H Photo — Camera Basics: Understanding Your Camera"
            url: "https://www.youtube.com/watch?v=7ZVyNjKSr0M"
            type: "video"
        practice:
          - "15 min: practice switching between Auto, Av, and Tv modes and take 5 photos in each — note how the camera's choices differ"
          - "10 min: hold the camera with proper two-hand grip and take 20 photos of a stationary subject — check for camera shake"
        projects:
          - "Photograph a simple subject (a pet, a flower, a coffee cup) in each camera mode (P, Av, Tv, M) and compare the results"
          - "Take 20 photos in one outing using Auto mode with intentional framing — review and pick your best 5"
        tips:
          - "Camera shake is the #1 cause of blurry beginner photos — brace your elbows against your body and exhale before pressing the shutter"
          - "Do not try to learn Manual mode first; start in Auto, then Aperture Priority (Av/A) to understand one variable at a time"
      - level: intermediate
        criteria: >
          Uses Av for portraits and landscapes, Tv for sports and motion. Operates
          in Manual mode in controlled lighting. Configures AF mode (single vs. continuous)
          and drive mode (single shot vs. burst) appropriately.
        metrics:
          - "Correct mode selection in 8/10 scenario-matching exercises"
          - "Burst mode used on ≥80% of action shots submitted"
        resources:
          - title: "Tony Northrup — Camera Settings for Every Situation"
            url: "https://www.youtube.com/watch?v=F8T94sdiNjc"
            type: "video"
          - title: "Karl Taylor — Understanding Camera Modes"
            url: "https://www.youtube.com/watch?v=RS2jdUQLwbM"
            type: "video"
        practice:
          - "15 min: photograph a moving subject (person walking, pet playing) in Tv mode — experiment with 1/125, 1/250, 1/500s"
          - "10 min: configure AF mode (single vs. continuous) for stationary vs. moving subjects and test each"
        projects:
          - "Photograph the same scene in Av, Tv, and M modes — compare exposure and creative differences in the results"
          - "Complete a 10-photo shoot using Manual mode in controlled lighting with correct exposure on every shot"
        tips:
          - "In Manual mode, watch the exposure meter in your viewfinder — keep it centered until you intentionally want to deviate"
          - "Use continuous AF (AF-C/AI Servo) for anything that moves; single AF (AF-S/One Shot) for everything else"
      - level: advanced
        criteria: >
          Uses back-button focus, custom function buttons, and preset banks to
          configure camera rapidly for different scenarios. Understands all AF area
          modes (zone, tracking, spot). Uses Auto ISO with minimum shutter speed.
        metrics:
          - "Camera reconfigured for new shooting scenario in ≤30 seconds"
          - "0 missed shots due to incorrect camera mode or AF setting per shoot"
        resources:
          - title: "Karl Taylor — Advanced Camera Configuration"
            url: "https://www.youtube.com/watch?v=RS2jdUQLwbM"
            type: "video"
        tips:
          - "Set up custom banks (C1/C2/C3) for your most common scenarios so you can switch instantly"
      - level: expert
        criteria: >
          Camera operation is fully automatic/muscle-memory. Custom settings banks
          pre-configured for every shooting scenario. Teaches camera operation to
          students without referring to documentation.
        metrics:
          - "Professional shoot completed with 0 technically ruined shots due to camera error"
          - "Student camera setup: 100% configured correctly after 1 coaching session"
        resources:
          - title: "Tony Northrup — Stunning Digital Photography (full course)"
            url: "https://www.youtube.com/watch?v=LxO-6rlihSg"
            type: "course"
        tips:
          - "Camera operation should become muscle memory — practice mode changes and AF configuration until you can do them without looking"
    tags: ["technical", "foundation", "camera-operation"]

  # ── EXPOSURE (the physics foundation) ───────────────────────────────────────
  - id: "creative-arts/photography/exposure-triangle"
    title: "Exposure Triangle"
    description: >
      The fundamental physics of photography: aperture controls light and depth of field,
      shutter speed controls light and motion, ISO controls sensor sensitivity and noise.
      Understanding their interplay is the prerequisite for all intentional image-making.
      Camera operation (knowing how to change settings) enables learning the exposure
      triangle (understanding WHY to change them).
    benchmarks:
      - level: beginner
        criteria: "Names all three elements and explains what each does. Adjusts one setting and compensates with another to maintain exposure."
        metrics:
          - "Can achieve correct exposure in Manual mode in ≤3 adjustments"
          - "Correctly names all three triangle elements and their primary effects in a quiz"
        resources:
          - title: "Tony Northrup — Exposure Triangle Explained"
            url: "https://www.youtube.com/watch?v=YojL7UQTVhc"
            type: "video"
          - title: "B&H Photo — Understanding Exposure"
            url: "https://www.youtube.com/watch?v=Edvpu_939l4"
            type: "video"
        practice:
          - "15 min: in Manual mode, set correct exposure for a stationary subject using only 3 adjustments — repeat 10 times"
          - "10 min: change one exposure setting and compensate with another to maintain the same exposure — practice all 3 pairs"
        projects:
          - "Take 3 photos of the same subject: one with wide aperture (shallow DOF), one with fast shutter (frozen motion), one with high ISO (low light)"
          - "Photograph in Manual mode for one full hour without switching to Auto"
        tips:
          - "Do not memorize numbers — understand relationships: wider aperture = more light + shallower DOF; faster shutter = less light + frozen motion"
          - "If your photo is too dark, ask: 'Can I open the aperture? Slow the shutter? Raise the ISO?' in that priority order"
      - level: intermediate
        criteria: >
          Makes exposure decisions in real-time for changing light conditions.
          Deliberately chooses ISO to balance noise vs. shutter speed requirements.
          Uses exposure compensation effectively in semi-auto modes.
        metrics:
          - "Nails exposure (within ±0.5 EV of intended) on first shot 80%+ of the time"
          - "ISO choice explained correctly for 9/10 lighting scenarios presented"
        resources:
          - title: "Karl Taylor — Manual Exposure Masterclass"
            url: "https://www.youtube.com/watch?v=RS2jdUQLwbM"
            type: "video"
          - title: "Peter McKinnon — How I Expose My Photos"
            url: "https://www.youtube.com/watch?v=ixRKeQMa7Nc"
            type: "video"
        practice:
          - "20 min: photograph in changing light conditions (indoors to outdoors, shade to sun) adjusting exposure in real time"
          - "10 min: practice using exposure compensation (+/- EV) in Av mode on bright and dark subjects"
        projects:
          - "Photograph a full day (golden hour to midday to blue hour) adjusting exposure for each lighting condition"
          - "Take 10 portraits in mixed lighting with exposure within 0.5 EV of ideal on first shot"
        tips:
          - "Use the lowest ISO you can get away with — only raise ISO when you cannot open the aperture wider or slow the shutter further"
          - "Exposure compensation is your best friend in semi-auto modes: +1 EV for snow/white subjects, -1 EV for dark subjects"
      - level: advanced
        criteria: >
          Exposure decisions become creative tools: deliberately underexposes for dramatic
          shadows, overexposes for high-key effect. Uses ETTR (expose to the right) for
          maximum dynamic range in RAW capture.
        metrics:
          - "ETTR technique applied in ≥80% of RAW landscape/studio shots"
          - "0 clipped highlights on intentional shots (only on deliberate overexposure)"
        resources:
          - title: "Tony Northrup — ETTR and Dynamic Range"
            url: "https://www.youtube.com/watch?v=YojL7UQTVhc"
            type: "video"
        tips:
          - "ETTR (expose to the right) maximizes dynamic range in RAW — push the histogram right without clipping highlights"
      - level: expert
        criteria: >
          Masters exposure in extreme conditions (backlit subjects, mixed lighting, high-contrast
          scenes). Uses HDR, graduated ND filters, and exposure blending where single exposure
          is insufficient. Teaches exposure concepts to students.
        metrics:
          - "500px Pulse score ≥85 on technically challenging lighting shots"
          - "0 recoverable exposure errors on a 100-shot professional shoot"
        resources:
          - title: "Karl Taylor — Exposure in Extreme Conditions"
            url: "https://www.youtube.com/watch?v=RS2jdUQLwbM"
            type: "video"
        tips:
          - "In extreme contrast scenes, bracket your exposures (3 shots at -2, 0, +2 EV) and blend later for maximum dynamic range"
    tags: ["foundation", "technical", "measurable"]

  # ── FOCUS & SHARPNESS ───────────────────────────────────────────────────────
  - id: "creative-arts/photography/focus-depth-of-field"
    title: "Focus & Depth of Field"
    description: >
      Achieving sharp focus on the intended subject and controlling how much of
      the scene is in focus. Builds directly on exposure triangle knowledge
      (aperture controls depth of field) and camera settings (AF modes).
    benchmarks:
      - level: beginner
        criteria: "Achieves in-focus images on stationary subjects using single AF. Understands that aperture affects depth of field."
        metrics:
          - "In-focus rate on stationary portrait subjects: ≥90%"
        resources:
          - title: "Tony Northrup — Focus & Depth of Field Explained"
            url: "https://www.youtube.com/watch?v=34jkJoN8qOI"
            type: "video"
          - title: "B&H Photo — Understanding Autofocus"
            url: "https://www.youtube.com/watch?v=7ZVyNjKSr0M"
            type: "video"
        practice:
          - "15 min: photograph a portrait subject at f/2.8, f/5.6, and f/11 — compare depth of field in each"
          - "10 min: practice half-pressing the shutter to lock focus, then recomposing the shot before fully pressing"
        projects:
          - "Take 20 portrait photos focusing on the subject's eye — check focus accuracy by zooming to 100% on screen"
          - "Photograph the same scene at 3 different apertures and compare the depth of field"
        tips:
          - "Always focus on the nearest eye in portraits — if the eyes are sharp, the photo works; if the eyes are soft, nothing else matters"
          - "Wide apertures (f/1.8-2.8) look beautiful but make focus critical — a few inches of error puts the focus on the ear instead of the eye"
      - level: intermediate
        criteria: >
          Uses AF-Continuous for moving subjects. Selects specific focus points.
          Deliberately controls depth of field: wide aperture for subject isolation,
          narrow aperture for landscape sharpness front-to-back.
        metrics:
          - "In-focus rate on walking subjects: ≥80% with continuous AF"
          - "DOF matches intent (isolating subject or sharpening scene) on 85%+ of shots"
        resources:
          - title: "Tony Northrup — Continuous AF for Moving Subjects"
            url: "https://www.youtube.com/watch?v=34jkJoN8qOI"
            type: "video"
          - title: "Peter McKinnon — Depth of Field Explained"
            url: "https://www.youtube.com/watch?v=34jkJoN8qOI"
            type: "video"
        practice:
          - "15 min: photograph a person walking toward you using AF-C (continuous AF) — review hit rate at 100% zoom"
          - "10 min: practice deliberate DOF control — wide aperture for subject isolation, narrow aperture for landscapes"
        projects:
          - "Shoot a portrait series with shallow DOF (f/1.8-2.8) where the subject's eye is tack-sharp in 80%+ of images"
          - "Photograph a landscape with front-to-back sharpness using f/8-f/11"
        tips:
          - "For moving subjects, switch to continuous AF (AF-C) immediately — single AF (AF-S) locks on one distance and the subject will walk out of focus"
          - "Depth of field depends on 3 factors: aperture, focal length, and distance to subject — closer subjects have shallower DOF at any aperture"
      - level: advanced
        criteria: >
          Uses hyperfocal distance for landscape photography. Applies focus stacking
          for macro work. Achieves sharp focus on bird/wildlife in flight (AF tracking).
          Uses manual focus with focus peaking.
        metrics:
          - "In-focus rate on birds in flight: ≥70% with correct tracking AF"
          - "Hyperfocal calculation applied correctly on ≥80% of landscape sessions"
        resources:
          - title: "Tony Northrup — Focus Stacking Tutorial"
            url: "https://www.youtube.com/watch?v=34jkJoN8qOI"
            type: "video"
        tips:
          - "Use a hyperfocal distance app (like PhotoPills) to calculate the exact focus point for maximum landscape sharpness"
      - level: expert
        criteria: >
          Focus operates at reflex level. Anticipates subject movement to preload focus.
          Teaches focus stacking workflow. Focus technique invisible to viewer (sharpness
          is never the reason an image fails).
        metrics:
          - "0 out-of-focus shots in final edited professional portfolio"
          - "Focus stacking workflow produces tack-sharp macro images at any magnification"
        resources:
          - title: "Karl Taylor — Professional Focus Techniques"
            url: "https://www.youtube.com/watch?v=RS2jdUQLwbM"
            type: "video"
        tips:
          - "Focus should be invisible to the viewer — if someone notices the focus technique, it is drawing attention away from the subject"
    tags: ["technical", "focus", "optics"]

  # ── VISUAL LANGUAGE ─────────────────────────────────────────────────────────
  - id: "creative-arts/photography/composition"
    title: "Composition Fundamentals"
    description: >
      Arranging visual elements within the frame to create images that are
      visually compelling, communicate intent, and draw the viewer's eye where
      the photographer wants it. Composition is where photography becomes art.
    benchmarks:
      - level: beginner
        criteria: "Applies rule of thirds intentionally. Avoids mergers and distracting backgrounds. Considers horizon level."
        metrics:
          - "Rule of thirds applied in ≥70% of images submitted for critique"
          - "Horizon within 1° of level in ≥90% of landscape images"
        resources:
          - title: "Peter McKinnon — 5 Composition Tips for Better Photos"
            url: "https://www.youtube.com/watch?v=bpDRftkteFE"
            type: "video"
          - title: "B&H Photo — Composition Fundamentals"
            url: "https://www.youtube.com/watch?v=7ZVyNjKSr0M"
            type: "video"
        practice:
          - "15 min: enable the rule-of-thirds grid overlay on your camera and shoot 20 images placing the subject at grid intersections"
          - "10 min: review your last 20 photos and identify distracting backgrounds, mergers, and tilted horizons"
        projects:
          - "Photograph 10 subjects using rule of thirds — review each and confirm the focal point sits on a grid intersection"
          - "Shoot a series of 5 landscape photos with perfectly level horizons"
        tips:
          - "Check the background before pressing the shutter — a tree growing out of someone's head ruins an otherwise great portrait"
          - "Turn on the grid overlay in your camera or phone — it costs nothing and instantly improves composition"
      - level: intermediate
        criteria: >
          Uses leading lines, framing, negative space, foreground interest, and
          perspective deliberately. Recognizes and breaks rules intentionally (central
          composition for symmetry, etc.).
        metrics:
          - "≥3 distinct compositional techniques identified in any single image reviewed by instructor"
          - "Composition matches stated intent in 80%+ of images from a focused shoot"
        resources:
          - title: "Peter McKinnon — Advanced Composition Techniques"
            url: "https://www.youtube.com/watch?v=bpDRftkteFE"
            type: "video"
          - title: "Tony Northrup — Leading Lines, Framing & Negative Space"
            url: "https://www.youtube.com/watch?v=LxO-6rlihSg"
            type: "video"
        practice:
          - "20 min: photograph one subject using 5 different compositional techniques (rule of thirds, leading lines, framing, symmetry, negative space)"
          - "15 min: shoot the same scene from 5 different angles and heights — review how perspective changes the composition"
        projects:
          - "Create a 10-image series where each image demonstrates a different compositional technique, labeled"
          - "Photograph a local street scene using leading lines to draw the viewer's eye to a focal point"
        tips:
          - "Breaking compositional rules works only when you understand why the rule exists — center a subject only when symmetry is the point"
          - "If a composition feels off but you cannot identify why, try moving your feet — physical position change often solves it"
      - level: advanced
        criteria: >
          Composes for storytelling: uses environmental context, layers of depth,
          and juxtaposition. Visualizes final frame before shooting. Adapts composition
          to subject, focal length, and format (portrait vs. landscape orientation).
        metrics:
          - "PSA judge rates composition 7/10 or higher on 70%+ of submitted images"
          - "0 important compositional elements cropped by mistake in final edits"
        resources:
          - title: "Karl Taylor — Compositional Storytelling"
            url: "https://www.youtube.com/watch?v=RS2jdUQLwbM"
            type: "video"
        tips:
          - "Visualize the final frame before raising the camera — the best compositions happen in your mind before the viewfinder"
      - level: expert
        criteria: >
          Develops a distinctive compositional voice. Images are compositionally
          complex yet immediately readable. Teaches composition through personal
          critique methodology.
        metrics:
          - "500px Pulse score ≥90 on composition-heavy images"
          - "PSA merit star achieved at least once in landscape or travel category"
        resources:
          - title: "Peter McKinnon — Developing Your Photographic Eye"
            url: "https://www.youtube.com/watch?v=bpDRftkteFE"
            type: "video"
        tips:
          - "A distinctive compositional voice emerges from consistent practice, not from copying trends — shoot what interests you, not what gets likes"
    tags: ["artistic", "composition", "visual-language"]

  - id: "creative-arts/photography/lens-selection"
    title: "Lens Selection & Focal Length"
    description: >
      Understanding how focal length affects field of view, perspective compression,
      distortion, and subject-to-background relationships — and choosing the right
      glass for each creative situation.
    benchmarks:
      - level: beginner
        criteria: "Understands the difference between wide, standard, and telephoto focal lengths. Knows which focal lengths suit portraits vs. landscapes."
        metrics:
          - "Correctly matches focal length to genre in 8/10 scenario exercises"
        resources:
          - title: "Tony Northrup — Understanding Focal Length"
            url: "https://www.youtube.com/watch?v=YojL7UQTVhc"
            type: "video"
        practice:
          - "15 min: photograph the same subject at wide (24mm), standard (50mm), and telephoto (85mm+) focal lengths — compare perspective"
        projects:
          - "Create a comparison set showing how the same portrait looks at 24mm, 50mm, and 85mm from different distances"
        tips:
          - "Wider lenses exaggerate features near the camera (big nose effect in close-up portraits) — use 50mm+ for flattering portraits"
          - "Start with one lens (a 50mm or kit zoom) and learn it thoroughly before buying more glass"
      - level: intermediate
        criteria: >
          Uses wide angles (14–35mm) for environmental storytelling, standard (35–85mm)
          for street and documentary, telephoto (85–400mm) for compression and
          subject isolation. Understands prime vs. zoom tradeoffs.
        metrics:
          - "Focal length choice justified in image critique in 85%+ of cases"
          - "Uses at least 2 different focal lengths intentionally in a single shoot"
        resources:
          - title: "Karl Taylor — Lens Selection Masterclass"
            url: "https://www.youtube.com/watch?v=RS2jdUQLwbM"
            type: "video"
        practice:
          - "20 min: shoot the same scene with 3 different focal lengths and write down why you would choose each for publication"
        projects:
          - "Complete a photo walk using at least 2 different focal lengths intentionally and annotate why each was chosen"
        tips:
          - "Zoom with your feet first, then with the lens — physical movement creates perspective change, zooming only crops"
          - "Prime lenses (fixed focal length) force you to move and compose more deliberately than zooms"
      - level: advanced
        criteria: >
          Uses lens distortion and compression creatively. Chooses maximum aperture
          glass for low light or bokeh-critical work. Understands minimum focus
          distance and macro capabilities. Evaluates lenses by sharpness, breathing,
          and color rendering.
        metrics:
          - "Bokeh quality matches creative intent on 85%+ of wide-aperture shots"
          - "Lens selection documented and justified for every professional shoot"
        resources:
          - title: "Tony Northrup — Best Lenses for Every Situation"
            url: "https://www.youtube.com/watch?v=YojL7UQTVhc"
            type: "video"
        tips:
          - "The best lens is the one you have with you — obsessing over gear prevents you from making photos"
      - level: expert
        criteria: >
          Lens kit is curated and purposeful. Identifies the exact lens for an editorial
          brief without trial and error. Teaches focal length perspective to students
          using their own visual examples.
        metrics:
          - "Client briefs fulfilled with first-choice lens on 90%+ of commercial shoots"
          - "Can identify focal length of an unlabeled image within ±15mm in 8/10 examples"
        resources:
          - title: "Karl Taylor — Professional Lens Selection"
            url: "https://www.youtube.com/watch?v=RS2jdUQLwbM"
            type: "video"
        tips:
          - "Knowing the exact lens for a brief comes from experience — shoot enough and you will pre-visualize the focal length before picking up the camera"
    tags: ["technical", "optics", "gear"]

  # ── LIGHT ───────────────────────────────────────────────────────────────────
  - id: "creative-arts/photography/light-quality-direction"
    title: "Light Quality & Direction"
    description: >
      Understanding how the quality (hard vs. soft), direction (front, side, back),
      and color temperature of light shapes the mood and technical quality of an image.
      Natural light is taught FIRST in every program — students master reading and
      using available light before introducing artificial sources.
    benchmarks:
      - level: beginner
        criteria: "Avoids harsh midday sun for portraits. Seeks open shade or golden hour. Identifies front, side, and backlight."
        metrics:
          - "Can name 3 lighting qualities (hard, soft, diffuse) and give real-world examples of each"
        resources:
          - title: "Karl Taylor — Understanding Light for Photography"
            url: "https://www.youtube.com/watch?v=RS2jdUQLwbM"
            type: "video"
          - title: "Tony Northrup — Natural Light Photography Tips"
            url: "https://www.youtube.com/watch?v=F8T94sdiNjc"
            type: "video"
        practice:
          - "15 min: photograph a subject in direct sun, open shade, and overcast light — compare the quality of shadows in each"
          - "10 min: shoot portraits at golden hour and note how the warm, directional light changes the mood"
        projects:
          - "Photograph the same subject at 3 different times of day (morning, midday, golden hour) and compare the light quality"
          - "Find and photograph in open shade — notice how soft, even light eliminates harsh shadows"
        tips:
          - "Avoid midday direct sun for portraits — it creates harsh shadows under the eyes and nose; seek shade or wait for golden hour"
          - "The best free light is an overcast sky or open shade — nature's giant softbox"
      - level: intermediate
        criteria: >
          Uses golden hour and blue hour intentionally. Works in overcast light for
          portraits. Identifies and replicates Rembrandt, butterfly, and split lighting
          patterns. Positions reflectors to fill shadows.
        metrics:
          - "Shoots golden hour sessions with ≥80% technically keeper images (warm tone, correct exposure)"
          - "Demonstrates 3 portrait lighting patterns correctly in a controlled test"
        resources:
          - title: "Karl Taylor — Portrait Lighting Patterns"
            url: "https://www.youtube.com/watch?v=RS2jdUQLwbM"
            type: "video"
          - title: "Peter McKinnon — How To Use Natural Light"
            url: "https://www.youtube.com/watch?v=ixRKeQMa7Nc"
            type: "video"
        practice:
          - "20 min: practice creating Rembrandt, butterfly, and split lighting using a window as a single light source"
          - "10 min: use a reflector (or white board) to fill shadows on a portrait subject in directional light"
        projects:
          - "Photograph a portrait demonstrating 3 distinct lighting patterns (Rembrandt, butterfly, split) using only window light"
          - "Shoot a golden hour portrait session with 80%+ technically keeper images"
        tips:
          - "Window light is a free studio light — have your subject face a window and you can create any lighting pattern by moving them relative to it"
          - "A white poster board costs a dollar and works as a reflector to fill shadows — you do not need expensive gear"
      - level: advanced
        criteria: >
          Reads light in any environment and adapts technique: uses backlight for
          rim-lit drama, creates silhouettes intentionally, uses window light as a
          natural studio. Understands light directionality in landscape photography.
        metrics:
          - "Can recreate any lighting pattern using only available light in an unfamiliar location"
          - "0 lighting technical failures on a portrait session (harsh shadows, unflattering direction)"
        resources:
          - title: "Karl Taylor — Advanced Natural Light Techniques"
            url: "https://www.youtube.com/watch?v=RS2jdUQLwbM"
            type: "video"
        tips:
          - "Train yourself to read light in every environment — notice the direction, quality, and color of light even when you are not shooting"
      - level: expert
        criteria: >
          Shapes light as a primary creative medium. Recognizes iconic lighting
          references and applies painterly techniques. Teaches light reading as
          a foundational skill.
        metrics:
          - "Editorial clients request photographer by name for lighting style"
          - "Workshop students can identify and reproduce 5 lighting patterns after 1 day of instruction"
        resources:
          - title: "Karl Taylor — Lighting Masterclass"
            url: "https://www.youtube.com/watch?v=RS2jdUQLwbM"
            type: "video"
        tips:
          - "Study paintings by old masters (Rembrandt, Vermeer, Caravaggio) — their lighting techniques directly apply to photography"
    tags: ["lighting", "artistic", "technical"]

  # ── EXPOSURE FEEDBACK ───────────────────────────────────────────────────────
  - id: "creative-arts/photography/histogram-metering"
    title: "Checking Your Exposure"
    description: >
      Your camera has built-in tools to tell you whether your photo is too dark,
      too bright, or just right. The histogram is a graph that shows the
      distribution of brightness in your image — left side is shadows, right
      side is highlights. Metering modes control how your camera measures the
      light in a scene. Together, these feedback tools refine your exposure
      decisions beyond what the LCD screen alone can show.
    benchmarks:
      - level: beginner
        criteria: "Reads a histogram and identifies whether an image is overexposed, underexposed, or correctly exposed."
        metrics:
          - "Correctly classifies 9/10 histogram examples as over/under/correct"
        resources:
          - title: "Tony Northrup — How to Read a Histogram"
            url: "https://www.youtube.com/watch?v=YojL7UQTVhc"
            type: "video"
          - title: "B&H Photo — Understanding Histograms"
            url: "https://www.youtube.com/watch?v=Edvpu_939l4"
            type: "video"
        practice:
          - "10 min: take 10 photos and check the histogram after each — identify if the exposure is over, under, or correct"
          - "5 min: deliberately overexpose and underexpose a shot and compare their histograms to a correctly exposed version"
        projects:
          - "Review 10 photos from your last shoot and classify each histogram as overexposed, underexposed, or correct"
        tips:
          - "Do not trust your LCD screen in bright sunlight — it looks darker than it is; the histogram never lies about exposure"
          - "A histogram pushed to the right (bright) is not automatically overexposed — a snow scene should have a right-biased histogram"
      - level: intermediate
        criteria: >
          Switches metering modes (evaluative/matrix, center-weighted, spot) based on
          subject and lighting. Uses spot metering on high-contrast subjects. Reads
          the RGB histogram to detect channel clipping.
        metrics:
          - "Spot metering used correctly on 85%+ of backlit or high-contrast portraits"
          - "RGB histogram checked on 100% of outdoor shoots"
        resources:
          - title: "Tony Northrup — Metering Modes Explained"
            url: "https://www.youtube.com/watch?v=YojL7UQTVhc"
            type: "video"
        practice:
          - "15 min: photograph a backlit subject using spot metering on the face, then evaluative metering — compare results"
          - "10 min: check the RGB histogram on 10 outdoor shots to detect color channel clipping"
        projects:
          - "Photograph a high-contrast scene (backlit portrait) using spot metering and achieve correct face exposure"
        tips:
          - "Switch to spot metering for backlit subjects — evaluative metering will be fooled by the bright background and underexpose the face"
          - "Check the RGB histogram, not just the luminance histogram — you can clip a color channel without clipping overall brightness"
      - level: advanced
        criteria: >
          Uses exposure lock (AEL) to decouple metering from composition. Understands
          how different tonal subjects (snow, black fur) require exposure compensation.
          Uses histogram preview to achieve ETTR.
        metrics:
          - "ETTR application produces maximum shadow detail on 80%+ of RAW landscape shots"
          - "0 shots with unexplained clipping in professional work"
        resources:
          - title: "Karl Taylor — Advanced Exposure Control"
            url: "https://www.youtube.com/watch?v=RS2jdUQLwbM"
            type: "video"
        tips:
          - "Use exposure lock (AEL) to decouple metering from composition — meter on the subject, lock, recompose, shoot"
      - level: expert
        criteria: >
          Exposure metering system operates intuitively across all scene types. Can
          predict histogram shape before firing shutter. Mentors students on histogram
          reading as a feedback loop.
        metrics:
          - "Histogram prediction accuracy: within ±0.5 EV on 90%+ of shots in known conditions"
        resources:
          - title: "Tony Northrup — Intuitive Exposure Control"
            url: "https://www.youtube.com/watch?v=YojL7UQTVhc"
            type: "video"
        tips:
          - "Predicting the histogram before shooting is the mark of intuitive exposure — practice by guessing before checking"
    tags: ["technical", "exposure", "measurable"]

  # ── COLOR ───────────────────────────────────────────────────────────────────
  - id: "creative-arts/photography/white-balance-color"
    title: "White Balance & Color Theory"
    description: >
      Capturing and rendering accurate or intentionally stylized color. White balance
      controls the warmth or coolness of an image; color theory guides palette,
      harmony, and emotional tone. Beginners use Auto WB; Kelvin and custom WB
      develop at the intermediate level.
    benchmarks:
      - level: beginner
        criteria: "Uses preset white balance (Daylight, Cloudy, Shade, Tungsten) appropriately. Knows that AWB can be corrected in RAW."
        metrics:
          - "Correct WB preset chosen for the light source on 80%+ of shots"
        resources:
          - title: "Tony Northrup — White Balance Explained"
            url: "https://www.youtube.com/watch?v=YojL7UQTVhc"
            type: "video"
        practice:
          - "10 min: photograph the same subject under different WB presets (Daylight, Cloudy, Tungsten) and compare the warmth/coolness"
        projects:
          - "Photograph in 3 different lighting conditions and choose the correct WB preset for each"
        tips:
          - "If you shoot RAW, white balance can be corrected perfectly in post — but getting it right in-camera saves editing time"
          - "Auto white balance (AWB) struggles with mixed lighting and golden hour — set Daylight WB at golden hour to preserve the warm tones"
      - level: intermediate
        criteria: >
          Sets custom white balance using a grey card or Kelvin value. Understands
          that mixed lighting requires editorial decisions. Applies basic color
          correction in post. Recognizes complementary and analogous color harmonies
          in composition.
        metrics:
          - "Skin tones render naturally (no green or magenta cast) in 90%+ of portrait edits"
          - "Color palette intentional and harmonious in 75%+ of images in critique"
        resources:
          - title: "Peter McKinnon — Color Theory for Photographers"
            url: "https://www.youtube.com/watch?v=ixRKeQMa7Nc"
            type: "video"
        practice:
          - "15 min: set custom white balance using a grey card and compare to AWB in mixed lighting"
          - "10 min: practice basic color correction in Lightroom — adjust temperature and tint until skin tones look natural"
        projects:
          - "Photograph portraits in mixed lighting and produce natural skin tones in post (no green or magenta cast)"
          - "Create a 5-image series with a consistent, intentional color palette"
        tips:
          - "Skin tone is the litmus test of white balance — if skin looks natural, your WB is correct; if it looks green or magenta, adjust"
          - "Use a grey card for critical work — it costs under $10 and gives you a perfect reference for custom white balance"
      - level: advanced
        criteria: >
          Uses intentional color grading as a creative signature. Applies color
          theory to composition (warm/cool contrast, color leading lines). HSL
          panel in Lightroom used for selective color refinement.
        metrics:
          - "Color grade matches creative brief on first pass 80%+ of the time"
          - "HSL adjustments in Lightroom used correctly on ≥80% of edited images"
        resources:
          - title: "Peter McKinnon — Color Grading in Lightroom"
            url: "https://www.youtube.com/watch?v=ixRKeQMa7Nc"
            type: "video"
        tips:
          - "Use the HSL panel's luminance channel to brighten skin tones (orange slider) without affecting overall exposure"
      - level: expert
        criteria: >
          Develops signature color language. Color grade is recognizable across a
          portfolio without a watermark. Teaches color theory through image deconstruction.
        metrics:
          - "Commercial clients describe photographer's 'look' in color terms"
          - "Color consistency across a 20-image editorial set: all images pass art director review without color notes"
        resources:
          - title: "Karl Taylor — Signature Color & Style"
            url: "https://www.youtube.com/watch?v=RS2jdUQLwbM"
            type: "video"
        tips:
          - "A signature color language is built through consistent choices over years, not by copying presets — develop your own"
    tags: ["technical", "color", "post-processing"]

  # ── POST-PRODUCTION ─────────────────────────────────────────────────────────
  - id: "creative-arts/photography/raw-post-processing"
    title: "RAW Processing & Post-Production"
    description: >
      The digital darkroom: using Lightroom, Capture One, or equivalent tools to
      realize the full potential of a RAW file and develop a consistent, intentional
      editing workflow. Basic editing is introduced early-to-mid beginner stage;
      advanced retouching is intermediate-to-advanced.
    benchmarks:
      - level: beginner
        criteria: "Imports RAW files and applies basic exposure, highlights, shadows, and white balance adjustments."
        metrics:
          - "Can produce a clean edit from a RAW file in ≤10 minutes"
        resources:
          - title: "Tony Northrup — Lightroom Tutorial for Beginners"
            url: "https://www.youtube.com/watch?v=LxO-6rlihSg"
            type: "video"
          - title: "Peter McKinnon — How I Edit My Photos"
            url: "https://www.youtube.com/watch?v=ixRKeQMa7Nc"
            type: "video"
        practice:
          - "15 min: import a RAW file into Lightroom and adjust exposure, highlights, shadows, and white balance"
          - "10 min: practice the basic edit workflow — exposure first, then highlights/shadows, then white balance, then crop"
        projects:
          - "Edit 10 RAW files using only basic adjustments (exposure, highlights, shadows, WB) and produce clean results"
          - "Compare a JPEG straight from camera to your RAW edit of the same photo to see the difference"
        tips:
          - "Always shoot RAW, not JPEG — RAW files contain far more information for recovery of highlights and shadows in editing"
          - "Start every edit by setting white balance and exposure first — everything else builds on these two settings"
      - level: intermediate
        criteria: >
          Uses tone curve, HSL panel, lens correction, and local adjustments (radial
          filter, graduated filter, healing brush). Exports with correct settings for
          web and print. Maintains a non-destructive workflow.
        metrics:
          - "Non-destructive workflow maintained: original RAW never overwritten"
          - "Edit covers exposure, tone, color, and cleanup in 100% of image edits"
        resources:
          - title: "Peter McKinnon — Advanced Lightroom Editing"
            url: "https://www.youtube.com/watch?v=ixRKeQMa7Nc"
            type: "video"
          - title: "Tony Northrup — Lightroom Workflow & Organization"
            url: "https://www.youtube.com/watch?v=LxO-6rlihSg"
            type: "video"
        practice:
          - "20 min: edit a photo using tone curve, HSL panel, and local adjustments (radial filter, graduated filter)"
          - "10 min: practice exporting with correct settings for web (sRGB, 2048px long edge, 80% quality JPEG)"
        projects:
          - "Develop a complete editing workflow: import, cull, edit, export — process a 50-photo shoot from start to finish"
          - "Create a before/after comparison showing the impact of tone curve, HSL, and local adjustments"
        tips:
          - "Never overwrite the original RAW file — Lightroom and Capture One are non-destructive by design; keep it that way"
          - "The tone curve is the most powerful tool in Lightroom — learn S-curves for contrast and faded-black looks"
      - level: advanced
        criteria: >
          Develops a consistent Lightroom preset or Capture One style that defines
          the photographer's look. Uses masking (sky, subject, luminosity range) for
          targeted edits. Reduces noise and sharpens selectively. Retouching in
          Photoshop for demanding commercial work.
        metrics:
          - "20-image shoot edited to visual consistency in ≤2 hours"
          - "0 distracting artifacts (halos, banding, excessive noise) in exported images"
        resources:
          - title: "Tony Northrup — Creating Lightroom Presets"
            url: "https://www.youtube.com/watch?v=LxO-6rlihSg"
            type: "video"
        tips:
          - "Develop a personal preset as a starting point, not a final product — adjust every image individually after applying the preset"
      - level: expert
        criteria: >
          Post-production workflow is a competitive advantage. Editing decisions
          are invisible to the viewer — they serve the image, not the tool.
          Develops presets and workflows adopted by other photographers.
        metrics:
          - "Client delivery turnaround: 100-image professional shoot edited and delivered in ≤48 hours"
          - "Art director requires 0 re-edits on 80%+ of delivered image sets"
        resources:
          - title: "Peter McKinnon — Professional Editing Workflow"
            url: "https://www.youtube.com/watch?v=ixRKeQMa7Nc"
            type: "video"
        tips:
          - "Editing should serve the image, not call attention to itself — if a viewer notices the editing, it is overdone"
    tags: ["post-processing", "editing", "workflow"]

  # ── ADVANCED SKILLS ─────────────────────────────────────────────────────────
  - id: "creative-arts/photography/off-camera-lighting"
    title: "Off-Camera Lighting"
    description: >
      Using flashes, strobes, and continuous lights independently from the camera
      to create controlled, directional, and repeatable lighting. Natural light
      must be mastered first — off-camera lighting builds on understanding of
      light quality and direction with the addition of technical flash control.
    benchmarks:
      - level: beginner
        criteria: "Fires an external flash in TTL mode. Understands sync speed and why it matters."
        metrics:
          - "Uses TTL external flash to fill shadows on portraits in 3 different environments"
        resources:
          - title: "Tony Northrup — Flash Photography for Beginners"
            url: "https://www.youtube.com/watch?v=F8T94sdiNjc"
            type: "video"
        practice:
          - "15 min: use an external flash in TTL mode to fill shadows on portrait subjects in 3 environments (indoor, shade, backlit)"
        projects:
          - "Photograph a portrait using on-camera flash bounced off a ceiling — compare to direct flash"
        tips:
          - "Never point a flash directly at someone's face — bounce it off a ceiling or wall for soft, natural-looking fill light"
          - "If you do not own a flash yet, a $30 reflector can fill shadows almost as well for portraits"
      - level: intermediate
        criteria: >
          Uses manual flash power for consistent and repeatable exposures. Applies
          light modifiers (umbrella, softbox). Sets up a 2-light portrait setup
          (key + fill or key + backlight). Uses off-camera triggers.
        metrics:
          - "2-light portrait setup built and shooting in ≤10 minutes"
          - "Flash exposures consistent within ±0.3 EV across a 10-image sequence"
        resources:
          - title: "Karl Taylor — Off-Camera Flash Setup"
            url: "https://www.youtube.com/watch?v=RS2jdUQLwbM"
            type: "video"
          - title: "Tony Northrup — Manual Flash for Consistent Results"
            url: "https://www.youtube.com/watch?v=F8T94sdiNjc"
            type: "video"
        practice:
          - "20 min: set up a 2-light portrait (key + fill) using off-camera flash and a light modifier (umbrella or softbox)"
          - "10 min: practice manual flash power settings for consistent exposure across a 10-shot sequence"
        projects:
          - "Build a 2-light portrait setup (key + fill or key + backlight) and produce 10 consistently exposed portraits"
          - "Compare TTL vs. manual flash — shoot the same portrait setup with each and note consistency differences"
        tips:
          - "Manual flash power gives consistent results shot-to-shot; TTL varies with each frame — switch to manual for studio-style work"
          - "Start with one light and a modifier before adding a second — understand one light well before complicating the setup"
      - level: advanced
        criteria: >
          Balances flash with ambient light (day-for-night, fill-flash outdoors).
          Uses 3+ light setups for commercial product or editorial work. Understands
          inverse square law for light placement. Uses high-speed sync (HSS) and
          radio triggers.
        metrics:
          - "Commercial product image delivered with professional lighting quality to client brief"
          - "0 sync-speed artifacts on any flash image in portfolio"
        resources:
          - title: "Karl Taylor — Advanced Flash Techniques"
            url: "https://www.youtube.com/watch?v=RS2jdUQLwbM"
            type: "video"
        tips:
          - "Know your camera's max sync speed (usually 1/200-1/250s) — exceeding it without HSS causes a black band across the image"
      - level: expert
        criteria: >
          Lighting design is a signature skill. Can recreate any published lighting
          setup from analyzing the image alone. Designs and executes complex 5+ light
          set for advertising-quality work. Teaches lighting workshops.
        metrics:
          - "Advertising or editorial clients book specifically for lighting capabilities"
          - "Workshop students: 90%+ rate lighting instruction as 'significantly improved my work'"
        resources:
          - title: "Karl Taylor — Studio Lighting Masterclass"
            url: "https://www.youtube.com/watch?v=RS2jdUQLwbM"
            type: "video"
        tips:
          - "Lighting design is about intent — before placing a light, ask: what mood, what direction, what story does this light tell?"
    tags: ["lighting", "studio", "advanced", "technical"]

  - id: "creative-arts/photography/genre-techniques"
    title: "Specialized Genre Techniques"
    description: >
      Photography genres have distinct technical requirements. Genre specialization
      is the capstone skill — it integrates all foundational and intermediate
      skills into mastery of a specific domain. Generalist fundamentals through
      beginner-intermediate, genre exploration at intermediate, genre
      specialization at advanced.
    benchmarks:
      - level: beginner
        criteria: "Shoots competently in one chosen genre using genre-appropriate settings."
        metrics:
          - "Produces 5 technically acceptable images in chosen genre in a single session"
        resources:
          - title: "Tony Northrup — Photography Genres Explained"
            url: "https://www.youtube.com/watch?v=LxO-6rlihSg"
            type: "video"
        practice:
          - "30 min: photograph 10 images in your chosen genre using genre-appropriate settings and technique"
        projects:
          - "Produce 5 technically acceptable images in one genre (portrait, landscape, or street) in a single session"
        tips:
          - "Pick one genre to focus on first — trying to be a portrait, landscape, and street photographer simultaneously dilutes your growth"
          - "Study the work of 3 photographers in your chosen genre and identify what makes their images successful"
      - level: intermediate
        criteria: >
          Applies genre-specific technique in at least 2 genres:
          portraits (catchlights, flattering focal length, fill light),
          landscape (golden hour, tripod, ND filters, wide focal length),
          street (zone focus, appropriate ISO, candid approach).
        metrics:
          - "Genre-specific checklist (e.g., catchlights visible, correct FL for portraits) met on 80%+ of shots"
          - "Images from 2+ genres in portfolio rated technically correct by instructor"
        resources:
          - title: "Peter McKinnon — How To Find Your Photography Niche"
            url: "https://www.youtube.com/watch?v=bpDRftkteFE"
            type: "video"
          - title: "B&H Photo — Genre-Specific Photography Tips"
            url: "https://www.youtube.com/watch?v=7ZVyNjKSr0M"
            type: "video"
        practice:
          - "30 min: apply genre-specific checklists when shooting (portraits: catchlights, flattering FL, fill light; landscapes: golden hour, tripod, wide FL)"
        projects:
          - "Build a portfolio with technically correct images from 2 different genres (e.g., portrait and landscape)"
          - "Photograph a portrait session using a genre-specific checklist: catchlights visible, flattering focal length, clean background"
        tips:
          - "Every genre has a technical checklist — learn it and follow it before trying to break the rules creatively"
          - "Portraits need catchlights (reflections in the eyes from the light source) — without them, eyes look lifeless"
      - level: advanced
        criteria: >
          Specializes in 1 primary and 1 secondary genre with professional-quality output.
          Uses genre-specific accessories (ND filters for landscape, macro tube for product).
          Understands the unique business requirements of chosen genre.
        metrics:
          - "Primary genre images accepted into at least 1 PSA or photography competition"
          - "Secondary genre images rated publishable by working professional in that genre"
        resources:
          - title: "Karl Taylor — Professional Genre Techniques"
            url: "https://www.youtube.com/watch?v=RS2jdUQLwbM"
            type: "video"
        tips:
          - "Genre mastery means understanding the unique business requirements — portrait photographers need client management skills; landscape photographers need patience and planning"
      - level: expert
        criteria: >
          Recognized by peers and clients as a master of chosen genre. Image style
          is distinctive and consistent. Published or exhibiting work in primary genre.
        metrics:
          - "Images published in editorial, exhibition, or licensed for commercial use"
          - "500px Pulse average ≥90 in primary genre across last 20 submitted images"
        resources:
          - title: "Tony Northrup — Building a Photography Portfolio"
            url: "https://www.youtube.com/watch?v=LxO-6rlihSg"
            type: "video"
        tips:
          - "Publication and competition success follows consistent, distinctive work — build a cohesive body of work rather than chasing variety"
    tags: ["genre", "specialization", "advanced"]

