  # -- HERB GARDENING ------------------------------------------------------------
  - id: "creative-arts/gardening/herb-gardening"
    title: "Herb Gardening"
    description: >
      Growing culinary, medicinal, and aromatic herbs. Covers herb selection for
      your climate, container vs. in-ground growing, harvesting techniques that
      promote continued growth, drying and preserving herbs, and understanding
      the difference between annual herbs (basil, cilantro, dill) and perennial
      herbs (rosemary, thyme, oregano, sage, mint).

      Sub-skills covered: selecting herbs for sun exposure (most need 6+ hours),
      understanding moisture needs (Mediterranean herbs like rosemary and thyme
      prefer drier soil; basil and mint prefer consistent moisture), pinching and
      harvesting to promote bushy growth, preventing bolting in heat-sensitive
      herbs (cilantro, basil), drying herbs (hanging, dehydrator, oven), making
      herb-infused oils and vinegars, and growing herbs in containers on patios
      and windowsills.
    benchmarks:
      - level: beginner
        criteria: "Grows 5+ herb varieties successfully (at least 3 culinary herbs). Knows the difference between annual and perennial herbs. Harvests herbs correctly (cutting above a leaf node to promote branching). Keeps a basil plant alive and productive for at least 2 months. Grows herbs in containers or in-ground."
        metrics:
          - "5+ herb varieties grown to harvest size in one season"
          - "Basil plant kept productive for 2+ months through regular pinching (no flowering allowed)"
          - "Correctly classifies 10 common herbs as annual or perennial when quizzed"
          - "Herbs harvested by cutting above a leaf node (not ripping or cutting at soil level) on 90%+ of harvests"
          - "At least 3 different culinary herbs used in cooking from the home garden"
        resources:
          - title: "Epic Gardening — Complete Herb Growing Guide"
            url: "https://www.youtube.com/watch?v=bRaFnhVOm1E"
            type: "video"
          - title: "Old Farmer's Almanac — Herb Growing Guide"
            url: "https://www.almanac.com/plants/herbs"
            type: "article"
          - title: "RHS — Growing Herbs"
            url: "https://www.rhs.org.uk/herbs"
            type: "article"
          - title: "Gardener's Supply — Herb Gardening Guide"
            url: "https://www.rhs.org.uk/herbs"
            type: "article"
        practice:
          - "Plant a kitchen herb container with basil, parsley, and chives; place in a sunny spot and water consistently"
          - "Practice pinching basil: every time a stem has 3 sets of leaves, pinch off the top set to encourage branching"
          - "Harvest each herb by cutting just above a leaf node and observe the new growth that sprouts from that node"
        projects:
          - "Grow 5+ herb varieties and use at least 3 of them in cooking over the course of the season"
          - "Keep a basil plant productive for 2+ months by regular pinching before it can flower"
        tips:
          - "Pinch basil flower buds off immediately — once basil flowers, the leaves become bitter and the plant stops producing new foliage"
          - "Rosemary, thyme, and oregano are Mediterranean herbs that prefer well-drained, somewhat dry soil — do not overwater them"
      - level: intermediate
        criteria: "Grows 10+ herb varieties including perennials that overwinter. Prevents bolting in cilantro and basil through succession planting and variety selection. Dries and preserves herbs for year-round use. Manages a dedicated herb garden or herb spiral. Propagates herbs from cuttings (rosemary, basil, mint)."
        metrics:
          - "10+ herb varieties grown including 3+ perennials that successfully overwinter"
          - "Herbs preserved by 2+ methods (drying, freezing in oil, making herb butter) totaling enough for 3+ months of off-season use"
          - "Cilantro maintained for 6+ weeks without bolting through slow-bolt variety selection and shade management"
          - "5+ herb plants propagated from cuttings with 70%+ success rate"
          - "Dedicated herb garden area or herb spiral designed and planted with logical groupings by water and sun needs"
        resources:
          - title: "Epic Gardening — How to Dry and Preserve Herbs"
            url: "https://www.youtube.com/watch?v=jjXjPO5FDg4"
            type: "video"
          - title: "Savvy Gardening — Growing Herbs Indoors"
            url: "https://www.rhs.org.uk/herbs"
            type: "article"
          - title: "RHS — Harvesting and Preserving Herbs"
            url: "https://www.rhs.org.uk/herbs"
            type: "article"
        practice:
          - "Dry a batch of herbs using 3 methods: air drying (hanging), oven (170 F for 1-2 hours), and freezing in olive oil in ice cube trays"
          - "Propagate rosemary from cuttings: take 10 four-inch cuttings, strip lower leaves, dip in rooting hormone, plant in moist perlite"
          - "Design an herb spiral on paper grouping plants by water needs: dry-loving herbs at top, moisture-loving at bottom"
        projects:
          - "Preserve enough herbs by drying and freezing to supply your kitchen for 3+ months of off-season use"
          - "Build and plant an herb spiral or dedicated herb bed organized by sun and water requirements"
        tips:
          - "Harvest herbs in the morning after dew has dried but before the heat of the day — essential oils are most concentrated at this time"
          - "Freeze herbs in olive oil in ice cube trays for the best flavor preservation — dried herbs lose volatile oils that freezing retains"
      - level: advanced
        criteria: "Grows 20+ herb varieties including medicinal and less common culinary herbs (lemongrass, epazote, shiso). Designs herb gardens for others. Grows herbs year-round using indoor growing or season extension. Creates herb products (teas, tinctures, salves, infused oils). Teaches herb growing workshops."
        metrics:
          - "20+ herb varieties grown including 5+ less common or medicinal herbs"
          - "Herbs grown year-round with indoor or greenhouse production maintaining fresh herbs in every month"
          - "3+ herb-derived products created (herbal tea blends, infused oils, herb salves, or tinctures)"
          - "Herb garden designed and installed for 2+ other households or community spaces"
          - "1+ herb growing workshop taught with positive participant feedback"
        resources:
          - title: "Garden Answer — Herb Garden Design Ideas"
            url: "https://www.youtube.com/watch?v=L3PvL6M1bFY"
            type: "video"
          - title: "Penn State Extension — Herb Gardening"
            url: "https://extension.psu.edu/lawn-and-garden"
            type: "article"
          - title: "Old Farmer's Almanac — Herb Chart"
            url: "https://www.almanac.com/content/herb-chart-planting-growing-and-harvesting"
            type: "article"
        practice:
          - "Grow 3 less common herbs you have never tried (e.g., lemongrass, lovage, shiso) and document their cultural requirements"
          - "Create a custom herbal tea blend from garden-grown herbs: dry, blend, package, and taste-test"
          - "Set up indoor herb growing under lights for winter production of basil, parsley, and cilantro"
        projects:
          - "Design and install an herb garden for a community space, school, or another gardener"
          - "Create 3+ herb products from your garden harvest (tea blends, infused oils, herb butter, etc.)"
        tips:
          - "Lemongrass is easy to start from a grocery store stalk — place the base in water until roots form, then plant in a warm, sunny spot"
          - "When designing herb gardens for others, always ask what they cook most often — a cook who makes Italian food needs different herbs than one who cooks Thai"
      - level: expert
        criteria: "Recognized as an herb garden authority. Teaches comprehensive herb workshops. Manages herb garden programs for botanical gardens, community spaces, or educational institutions. Writes or speaks about herb cultivation. Mentors herb growers from beginner to self-sufficiency."
        metrics:
          - "Taught 5+ herb workshops or classes at garden clubs, extension programs, or community centers"
          - "Managed an herb garden program for an institution or community space for 2+ growing seasons"
          - "Mentored 5+ gardeners in herb growing from beginner to productive, self-sufficient herb gardens"
          - "Published or presented 1+ articles or talks on herb cultivation"
          - "Identified as a go-to herb resource by local gardening community (invited to speak, consulted on plant selection)"
        resources:
          - title: "Herb Society of America — Resources"
            url: "https://www.herbsociety.org/"
            type: "article"
          - title: "Extension Master Gardener — Teaching Resources"
            url: "https://mastergardener.extension.org/"
            type: "article"
          - title: "RHS — Herb Growing Advice"
            url: "https://www.rhs.org.uk/herbs"
            type: "article"
        practice:
          - "Prepare and deliver a workshop on growing and using culinary herbs for a garden club or community center"
          - "Create a written herb growing guide tailored to your local climate, covering variety selection, planting dates, and preservation"
        projects:
          - "Manage an institutional herb garden (botanical garden, school, community center) for a full growing season"
          - "Teach a multi-session herb growing course covering planting, propagation, harvest, and preservation"
        tips:
          - "The most effective herb workshops include a hands-on tasting component — people remember flavors better than lectures"
          - "Pair herb workshops with a culinary component (make pesto, brew tea) to keep engagement high"
    tags: ["culinary", "hands-on", "measurable"]

  # -- FLOWER & ORNAMENTAL GARDENING ---------------------------------------------
  - id: "creative-arts/gardening/flower-ornamental"
    title: "Flower & Ornamental Gardening"
    description: >
      Growing flowering plants and ornamentals for beauty, pollinator habitat,
      and cut flowers. Covers annuals, perennials, bulbs, shrubs, and ornamental
      grasses. Includes understanding bloom time, color theory in the garden,
      planting for continuous color (succession of bloom), cut flower growing
      and arranging, and creating pollinator-friendly gardens.

      Sub-skills covered: selecting plants for sun/shade conditions, understanding
      bloom seasons and planning for continuous color April through October,
      planting spring and fall bulbs, deadheading to extend bloom, dividing
      perennials, growing cut flowers (zinnias, dahlias, sunflowers, cosmos),
      basic cut flower conditioning and arranging, and selecting native plants
      for pollinator habitat.
    benchmarks:
      - level: beginner
        criteria: "Grows 5+ flowering varieties from seed or transplant. Understands the difference between annuals and perennials. Plants bulbs at correct depth and orientation. Deadheads spent blooms to extend flowering. Creates a basic flower bed or container arrangement with attention to height placement (tall in back, short in front)."
        metrics:
          - "5+ flowering varieties grown to bloom in one season"
          - "Bulbs planted at correct depth (generally 3x the bulb height) and right-side up"
          - "Deadheading performed weekly on blooming annuals, extending bloom period by 2+ weeks vs. non-deadheaded plants"
          - "Flower bed or container arrangement planted with 3+ heights (tall, medium, short) in logical placement"
          - "Correctly classifies 10 common flowers as annual or perennial when quizzed"
        resources:
          - title: "Garden Answer — Flower Gardening for Beginners"
            url: "https://www.youtube.com/watch?v=hLBPVXxM85A"
            type: "video"
          - title: "Old Farmer's Almanac — Flower Growing Guides"
            url: "https://www.almanac.com/plants/flowers"
            type: "article"
          - title: "RHS — Choosing Plants for Your Garden"
            url: "https://www.rhs.org.uk/plants/types"
            type: "article"
          - title: "Gardener's Supply — Flower Gardening"
            url: "https://www.rhs.org.uk/plants/types"
            type: "article"
        practice:
          - "Plant 5 easy-to-grow annuals from seed: zinnias, cosmos, marigolds, sunflowers, and nasturtiums"
          - "Plant spring bulbs (tulips, daffodils) in fall at 3x bulb height depth with pointed end up"
          - "Deadhead spent blooms on one flower variety weekly and compare bloom duration to a non-deadheaded control plant"
        projects:
          - "Create a flower bed or large container with 5+ flowering varieties arranged by height"
          - "Grow a bouquet garden and cut at least 5 homegrown flower arrangements over the season"
        tips:
          - "Zinnias are the perfect beginner cut flower — they germinate in days, bloom in weeks, and the more you cut them the more they bloom"
          - "When planting bulbs, if you cannot tell which end is up, plant them on their side — the sprout will find its way up"
      - level: intermediate
        criteria: "Designs a perennial garden with 3-season bloom. Grows 15+ flowering varieties. Successfully overwinters tender bulbs (dahlias, cannas, gladiolus). Creates a cutting garden with weekly bouquet production. Plans color combinations using complementary and analogous color schemes. Attracts and supports pollinators with intentional plant selection."
        metrics:
          - "Perennial garden plan with documented bloom sequence covering at least 3 seasons (spring, summer, fall)"
          - "15+ flowering varieties grown including 5+ perennials that return for 2+ years"
          - "Tender bulbs (dahlias, cannas, or gladiolus) successfully overwintered and replanted with 80%+ survival"
          - "Cut flower bouquets produced weekly for 8+ weeks during peak season"
          - "5+ pollinator species (bees, butterflies, hummingbirds) observed visiting the garden during peak bloom"
        resources:
          - title: "Garden Answer — Dahlia Growing Guide"
            url: "https://www.youtube.com/watch?v=IpZt_xEDVnE"
            type: "video"
          - title: "Savvy Gardening — Perennial Garden Design"
            url: "https://www.rhs.org.uk/garden-design"
            type: "article"
          - title: "RHS — Perennials"
            url: "https://www.rhs.org.uk/plants/types/perennials"
            type: "article"
          - title: "Xerces Society — Pollinator-Friendly Planting Guides"
            url: "https://www.xerces.org/pollinator-conservation/plant-lists"
            type: "article"
        practice:
          - "Create a bloom calendar: list every flowering plant in your garden with its bloom period and color, then identify gaps"
          - "Dig dahlia tubers after first frost, cure for 2 days, pack in peat moss, and store at 40-50 F"
          - "Design a pollinator border with 3+ native wildflower species that bloom in sequence from spring through fall"
        projects:
          - "Design and plant a 3-season perennial border with documented bloom from April through October"
          - "Produce cut flower bouquets weekly for 8+ weeks from a dedicated cutting garden"
        tips:
          - "Plan your perennial garden on paper before buying a single plant — use a bloom calendar to ensure something is flowering every 2 weeks from spring to frost"
          - "Dahlias are the queen of the cutting garden but are frost-tender — dig tubers after the first hard frost, brush off soil, and store in a cool dark place at 40-50 F"
      - level: advanced
        criteria: "Designs complete ornamental landscapes with year-round interest (structure, texture, seasonal color). Grows 30+ flowering varieties including specialty plants (orchids, roses, alpine plants). Creates professional-quality floral arrangements. Designs and installs pollinator and native plant gardens. Understands advanced color theory, repetition, rhythm, and focal points in garden design."
        metrics:
          - "30+ flowering varieties grown across annuals, perennials, bulbs, and shrubs"
          - "Ornamental garden designed with 4-season interest (spring bloom, summer color, fall foliage, winter structure)"
          - "Professional-quality floral arrangements created for 3+ events or gifts"
          - "Native plant or pollinator garden designed and installed with 10+ regionally native species"
          - "2+ ornamental gardens designed for other households or community spaces"
        resources:
          - title: "Garden Answer — Garden Design Tours"
            url: "https://www.youtube.com/@gardenanswer"
            type: "video"
          - title: "RHS — Garden Design"
            url: "https://www.rhs.org.uk/garden-design"
            type: "article"
          - title: "NC State Extension — Ornamental Gardening"
            url: "https://content.ces.ncsu.edu/extension-gardener-handbook"
            type: "article"
        practice:
          - "Design an ornamental bed on paper showing plant placement, mature sizes, bloom times, and color relationships"
          - "Create a professional-quality floral arrangement using 5+ flower varieties, foliage, and proper conditioning techniques"
          - "Research and select 10+ native plants for your region that support pollinators and provide 4-season interest"
        projects:
          - "Design and install a 4-season ornamental garden with documented spring, summer, fall, and winter interest"
          - "Design and plant a native pollinator garden with 10+ regionally appropriate native species"
        tips:
          - "Year-round interest requires thinking beyond flowers — ornamental grasses for winter movement, evergreen structure, colored bark, and seed heads all add off-season beauty"
          - "Repetition is the most powerful design tool — repeat the same plant or color at regular intervals to create rhythm and unity in a garden bed"
      - level: expert
        criteria: "Recognized ornamental gardening authority. Designs gardens for public display (botanical gardens, garden tours). Judges flower shows. Teaches ornamental gardening and floral design. Mentors gardeners in plant selection and garden design. Published or featured garden."
        metrics:
          - "Garden featured on a garden tour, in a publication, or at a botanical garden display"
          - "Judged or exhibited at 2+ flower or garden shows"
          - "Taught 5+ ornamental gardening or floral design workshops"
          - "Mentored 5+ gardeners in ornamental design with each creating their own 3-season garden"
          - "Published or presented 1+ articles or talks on ornamental gardening or garden design"
        resources:
          - title: "American Horticultural Society"
            url: "https://ahsgardening.org/"
            type: "article"
          - title: "RHS — Shows and Events"
            url: "https://www.rhs.org.uk/shows-events"
            type: "article"
          - title: "Garden Conservancy — Open Days"
            url: "https://www.gardenconservancy.org/open-days"
            type: "article"
        practice:
          - "Open your garden for a local garden tour and prepare documentation of plant names, design choices, and maintenance practices"
          - "Prepare a flower show entry following the show schedule categories and judging criteria"
        projects:
          - "Enter and exhibit at a regional flower or garden show"
          - "Teach a multi-session ornamental gardening course covering design principles, plant selection, and seasonal interest"
        tips:
          - "Garden tours are the most powerful learning tool in ornamental gardening — visit 10 open gardens and you will internalize more design principles than any book can teach"
          - "When designing for public display, every plant must earn its place three ways: flower, foliage, and form — a plant that only looks good for 2 weeks of bloom is not worth the space"
    tags: ["ornamental", "design", "creative"]

  # -- WATERING & IRRIGATION ------------------------------------------------------
  - id: "creative-arts/gardening/watering-irrigation"
    title: "Watering & Irrigation"
    description: >
      Understanding plant water needs and delivering water efficiently. The most
      common cause of plant death in home gardens is improper watering — either
      too much or too little. Covers hand watering techniques, reading plant
      stress signals, drip irrigation, soaker hoses, sprinkler systems, rain
      barrels, and water conservation strategies.

      Sub-skills covered: understanding when to water (morning is best, check
      soil moisture at 1-inch depth before watering), deep watering vs. shallow
      frequent watering, recognizing overwatering symptoms (yellowing lower
      leaves, root rot) vs. underwatering symptoms (wilting, crispy leaf edges),
      installing drip irrigation with timers, calculating water needs based on
      soil type and weather, mulching for moisture retention, and rainwater
      harvesting.
    benchmarks:
      - level: beginner
        criteria: "Checks soil moisture before watering (finger test at 1-inch depth). Waters at the base of plants (not on foliage). Understands that deep infrequent watering is better than shallow frequent watering. Recognizes basic overwatering vs. underwatering symptoms. Waters in the morning. Keeps container plants alive through a full season."
        metrics:
          - "Soil moisture checked before watering on 90%+ of watering sessions (finger test at 1-inch depth)"
          - "Plants watered at the base (not overhead) on 90%+ of watering sessions"
          - "Container plants maintained alive through a full growing season with zero drought-kill losses"
          - "Correctly identifies overwatering vs. underwatering symptoms on 3 different plant examples"
          - "Watering performed before 10 AM on 80%+ of watering days"
        resources:
          - title: "Epic Gardening — How to Water Your Garden (The Right Way)"
            url: "https://www.youtube.com/watch?v=c5EhB5gqp7Y"
            type: "video"
          - title: "Old Farmer's Almanac — Watering Your Garden"
            url: "https://www.almanac.com/watering-garden-tips"
            type: "article"
          - title: "University of Florida Extension — Watering Your Garden"
            url: "https://gardeningsolutions.ifas.ufl.edu/care/watering/"
            type: "article"
        practice:
          - "Before every watering session, stick your finger 1 inch into the soil — only water if it is dry at that depth"
          - "Water your garden at the base of plants using a watering can or hose with a breaker nozzle, avoiding wetting foliage"
          - "Observe 3 plants showing stress symptoms and diagnose whether each is overwatered or underwatered"
        projects:
          - "Maintain all container and garden plants through a full growing season with zero drought-kill losses"
          - "Document watering frequency and method for 2 weeks, then adjust based on observations of plant health"
        tips:
          - "The finger test is the most reliable watering guide — stick your finger 1 inch into the soil; if it is dry, water deeply; if it is moist, wait"
          - "Overhead watering in the evening leaves foliage wet overnight, which promotes fungal diseases — always water at the base of plants in the morning"
      - level: intermediate
        criteria: "Installs and manages a basic drip irrigation or soaker hose system. Uses a timer for automated watering. Adjusts watering schedule based on weather, season, and plant growth stage. Mulches all beds for moisture conservation. Understands water needs by plant type (new transplants need more frequent water than established plants). Reduces water use by 20%+ vs. hand watering through efficient delivery."
        metrics:
          - "Drip irrigation or soaker hose system installed covering at least 100 sq ft of garden beds"
          - "Timer set and adjusted seasonally (more frequent in summer, less in spring/fall)"
          - "Water use reduced by 20%+ compared to hand watering (measured by water meter or timer run times)"
          - "All garden beds mulched with 2-4 inches of organic mulch for moisture retention"
          - "Zero overwatering incidents (no root rot, no consistently waterlogged soil) across all beds in one season"
        resources:
          - title: "Epic Gardening — Drip Irrigation Setup for Beginners"
            url: "https://www.youtube.com/watch?v=P2PafcTeyUU"
            type: "video"
          - title: "Gardener's Supply — Drip Irrigation"
            url: "https://www.rhs.org.uk/garden-jobs/watering"
            type: "article"
          - title: "RHS — Watering"
            url: "https://www.rhs.org.uk/garden-jobs/watering"
            type: "article"
          - title: "Old Farmer's Almanac — Mulching Guide"
            url: "https://www.almanac.com/how-to-mulch-your-garden"
            type: "article"
        practice:
          - "Install a drip irrigation line in one raised bed: lay mainline tubing, add emitters at each plant, connect to a hose bib timer"
          - "Apply 3 inches of mulch to all garden beds and monitor soil moisture over 2 weeks to see the difference"
          - "Adjust your watering timer schedule monthly based on temperature and rainfall"
        projects:
          - "Install a drip irrigation system in your primary garden beds with a timer for automated watering"
          - "Track water use over one month and document the reduction compared to your previous hand-watering approach"
        tips:
          - "Drip irrigation is the single best upgrade for a home garden — it saves water, reduces disease, and frees you from the daily watering chore"
          - "Run drip irrigation lines under mulch to minimize evaporation — the mulch plus drip combination can reduce water use by 50% vs. overhead sprinklers"
      - level: advanced
        criteria: "Designs and installs complete irrigation systems for multi-zone gardens. Implements rainwater harvesting (rain barrels, cisterns). Uses soil moisture sensors for precision watering. Understands ET (evapotranspiration) rates and calculates crop water needs. Designs irrigation for others. Manages water resources sustainably in drought-prone conditions."
        metrics:
          - "Multi-zone irrigation system designed and installed with separate zones for high-water and low-water plants"
          - "Rainwater harvesting system installed capturing 500+ gallons per year"
          - "Soil moisture sensors deployed in 2+ zones with automated adjustment of watering based on readings"
          - "Water budget calculated for garden based on ET rates and crop water needs"
          - "Irrigation system designed and installed for 2+ other gardens or community spaces"
        resources:
          - title: "Gardener's Supply — Rainwater Harvesting"
            url: "https://www.epa.gov/watersense"
            type: "article"
          - title: "Texas A&M Extension — Irrigation for Home Gardens"
            url: "https://agrilifeextension.tamu.edu/browse/water/"
            type: "article"
          - title: "RHS — Saving Water in the Garden"
            url: "https://www.rhs.org.uk/garden-jobs/watering"
            type: "article"
        practice:
          - "Install a rain barrel on a downspout and calculate the capture volume based on roof area and average rainfall"
          - "Set up a soil moisture sensor in one garden zone and track readings over 2 weeks to calibrate your watering schedule"
          - "Calculate the weekly water needs for your garden using ET rate data from your local extension or weather service"
        projects:
          - "Design and install a rainwater harvesting system capturing and using 500+ gallons per year for garden irrigation"
          - "Design a multi-zone irrigation system for a garden with separate schedules for vegetables, perennials, and containers"
        tips:
          - "A 1,000 sq ft roof in an area receiving 30 inches of rain per year can capture over 18,000 gallons — even a small rain barrel captures meaningful water"
          - "Soil moisture sensors connected to your irrigation timer eliminate guesswork — they are inexpensive ($30-50) and pay for themselves in water savings within one season"
      - level: expert
        criteria: "Designs irrigation systems professionally. Teaches water management workshops. Implements and advocates for water-wise gardening practices at the community level. Consults on water conservation for gardens and landscapes. Publishes or presents on irrigation and water management."
        metrics:
          - "Designed irrigation systems for 5+ gardens or community spaces with documented water savings"
          - "Taught 3+ water management or irrigation workshops"
          - "Community water conservation program implemented or advocated at municipal or neighborhood level"
          - "Water use in own garden below 50% of regional average for comparable garden size (measured and documented)"
          - "Published or presented 1+ articles or talks on garden water management"
        resources:
          - title: "Irrigation Association — Resources"
            url: "https://www.irrigation.org/"
            type: "article"
          - title: "Extension Master Gardener — Water Conservation Resources"
            url: "https://mastergardener.extension.org/"
            type: "article"
          - title: "EPA WaterSense — Outdoor Water Use"
            url: "https://www.epa.gov/watersense"
            type: "article"
        practice:
          - "Audit a neighbor's garden irrigation for efficiency and provide recommendations for reducing water waste"
          - "Prepare and deliver a water-wise gardening workshop for a local garden club"
        projects:
          - "Implement a community-level water conservation program for a neighborhood garden or HOA landscape"
          - "Teach a water management workshop series covering soil moisture, irrigation design, and rainwater harvesting"
        tips:
          - "The most impactful water conservation teaching focuses on soil health first — a soil with 5% organic matter holds 4x more water than one with 1%, making irrigation far less critical"
          - "Demonstrate the difference between drip and overhead irrigation with a side-by-side water use measurement — seeing the numbers changes behavior"
    tags: ["maintenance", "infrastructure", "measurable"]

  # -- PEST & DISEASE MANAGEMENT --------------------------------------------------
  - id: "creative-arts/gardening/pest-disease"
    title: "Pest & Disease Management"
    description: >
      Identifying, preventing, and managing garden pests and plant diseases
      using Integrated Pest Management (IPM) principles. IPM prioritizes
      prevention, monitoring, and the least-toxic control methods. Covers
      common insect pests (aphids, caterpillars, slugs, Japanese beetles),
      beneficial insects (ladybugs, lacewings, parasitic wasps), common
      diseases (powdery mildew, blight, root rot), cultural controls
      (spacing, sanitation, resistant varieties), biological controls,
      and organic vs. chemical intervention as a last resort.

      Sub-skills covered: scouting and monitoring (weekly walk-through looking
      at undersides of leaves), identifying beneficial vs. harmful insects,
      understanding the IPM pyramid (prevention > cultural > biological >
      chemical), using row covers and netting for physical exclusion,
      recognizing common disease symptoms (fungal spots, wilting, mildew),
      applying organic controls (neem oil, Bt, diatomaceous earth, horticultural
      soap) safely and effectively, and knowing when to remove a diseased plant
      to prevent spread.
    benchmarks:
      - level: beginner
        criteria: "Identifies 5+ common garden pests by sight. Identifies 3+ beneficial insects (ladybugs, lacewings, bees). Scouts the garden weekly checking undersides of leaves. Recognizes common disease symptoms (powdery mildew, yellowing leaves, leaf spots). Uses basic cultural controls: proper spacing, watering at the base, and removing diseased plant material."
        metrics:
          - "Correctly identifies 5+ common garden pests (aphids, caterpillars, slugs, whiteflies, Japanese beetles) by sight or from photos"
          - "Correctly identifies 3+ beneficial insects (ladybug, lacewing, honey bee, parasitic wasp) and explains their role"
          - "Garden scouted weekly for pests and disease with observations recorded in a garden journal"
          - "Recognizes powdery mildew, leaf spots, and wilting as disease symptoms (not nutrient deficiency) on 3+ occasions"
          - "Diseased plant material removed and disposed of (not composted) on 90%+ of occasions"
        resources:
          - title: "Epic Gardening — Common Garden Pests and How to Deal With Them"
            url: "https://www.youtube.com/watch?v=aTXGxJFmmAs"
            type: "video"
          - title: "Old Farmer's Almanac — Garden Pest Guide"
            url: "https://www.almanac.com/pest"
            type: "article"
          - title: "University of California IPM — Home Garden Pest Management"
            url: "https://ipm.ucanr.edu/"
            type: "article"
          - title: "RHS — Pest and Disease Identifier"
            url: "https://www.rhs.org.uk/problems"
            type: "article"
        practice:
          - "Scout your garden weekly: walk through slowly, turn over 10 leaves per bed, and record any pests or disease symptoms in your journal"
          - "Make a pest identification flashcard set with photos of 10 common pests and 5 beneficial insects"
          - "Remove any diseased leaves or plant material you find during scouting and dispose of it in the trash (not the compost)"
        projects:
          - "Create a pest and beneficial insect identification guide for your garden with photos and notes from your weekly scouting"
          - "Scout your garden weekly for one full month and document all pest and disease observations"
        tips:
          - "Most pest problems can be spotted early if you check the undersides of leaves weekly — this is where aphids, whiteflies, and caterpillar eggs are found"
          - "Do not kill every bug you see — learn to recognize beneficial insects first; a ladybug larva eats 400+ aphids in its lifetime"
      - level: intermediate
        criteria: "Implements Integrated Pest Management (IPM) as a framework. Uses row covers and physical barriers for pest exclusion. Applies organic controls (neem oil, Bt, insecticidal soap) correctly and safely. Attracts beneficial insects with companion plantings. Diagnoses common diseases and applies cultural or organic treatments. Understands disease triangle (host, pathogen, environment) and modifies conditions to prevent disease."
        metrics:
          - "IPM principles applied as primary pest management strategy with chemical intervention used as last resort on 90%+ of pest events"
          - "Row covers or netting used successfully to exclude pests from 2+ crop types (e.g., brassicas from cabbage worms, berries from birds)"
          - "Organic pest control products applied correctly (right product, right timing, right concentration) on 5+ occasions"
          - "Beneficial insect habitat established with 3+ companion plants (yarrow, dill, sweet alyssum) attracting visible beneficials"
          - "2+ plant diseases correctly diagnosed and treated with cultural or organic methods before plants are lost"
        resources:
          - title: "Epic Gardening — IPM for Home Gardeners"
            url: "https://www.youtube.com/watch?v=cT3Km5bFHYM"
            type: "video"
          - title: "University of California IPM — IPM for the Home Gardener"
            url: "https://ipm.ucanr.edu/"
            type: "article"
          - title: "Savvy Gardening — Companion Planting for Pest Control"
            url: "https://www.almanac.com/companion-planting-guide-vegetables"
            type: "article"
          - title: "RHS — Integrated Pest Management"
            url: "https://www.rhs.org.uk/problems"
            type: "article"
        practice:
          - "Install row covers over brassica plants at transplanting time and monitor for cabbage worm damage vs. uncovered controls"
          - "Plant sweet alyssum, dill, and yarrow near vegetable beds and observe beneficial insect visits over 4 weeks"
          - "Mix and apply neem oil spray following label directions on a plant with aphid infestation and monitor results over 1 week"
        projects:
          - "Implement a full IPM program for your garden: prevention, monitoring, physical barriers, biological controls, and organic sprays as needed"
          - "Establish a beneficial insect habitat strip with 3+ companion plants and document beneficial insect visits"
        tips:
          - "The IPM pyramid: prevention (resistant varieties, clean tools, proper spacing) > cultural controls (crop rotation, sanitation) > biological controls (beneficial insects) > organic sprays > synthetic chemicals as absolute last resort"
          - "Neem oil works best as a preventive spray applied in the evening when bees are not active — it disrupts insect feeding and reproduction but does not kill on contact"
      - level: advanced
        criteria: "Diagnoses complex pest and disease interactions. Manages garden with near-zero synthetic pesticide use. Establishes self-sustaining beneficial insect populations. Identifies disease pathogens (fungal, bacterial, viral) and prescribes appropriate treatments. Uses cover cropping and biodiversity as primary disease prevention strategies. Consults for other gardeners on pest and disease problems."
        metrics:
          - "Garden managed with zero synthetic pesticide applications for 2+ consecutive seasons"
          - "Self-sustaining beneficial insect populations established (visible predator-prey cycles) in the garden"
          - "5+ complex pest or disease problems correctly diagnosed and resolved for other gardeners"
          - "Disease incidence reduced year-over-year through proactive cultural and biological management (documented in garden journal)"
          - "Biodiversity index of garden increased through intentional companion planting and habitat features"
        resources:
          - title: "Cornell IPM — Diagnostic Tools"
            url: "https://nysipm.cornell.edu/"
            type: "article"
          - title: "University of California IPM — Advanced Pest Management"
            url: "https://ipm.ucanr.edu/"
            type: "article"
          - title: "Xerces Society — Beneficial Insects in the Garden"
            url: "https://www.xerces.org/pollinator-conservation/plant-lists"
            type: "article"
        practice:
          - "Diagnose a complex pest or disease problem for a fellow gardener using symptom analysis, environmental assessment, and pest identification"
          - "Conduct a garden biodiversity audit: count the number of plant species, insect species, and habitat features in your garden"
          - "Implement a cover cropping strategy specifically for disease suppression (e.g., mustard family cover crops for biofumigation)"
        projects:
          - "Manage your garden for 2+ consecutive seasons with zero synthetic pesticide use and document pest management outcomes"
          - "Consult on pest and disease problems for 5+ other gardeners with documented successful outcomes"
        tips:
          - "A diverse garden is a resilient garden — monocultures attract specialist pests; mixed plantings confuse them and harbor predators"
          - "Keep detailed pest and disease records year over year — patterns emerge that allow you to anticipate problems before they arrive"
      - level: expert
        criteria: "Recognized IPM authority in the local gardening community. Teaches pest and disease management workshops. Mentors gardeners in IPM practices. Publishes or presents on garden pest management. Partners with extension services on pest monitoring and education programs."
        metrics:
          - "Taught 5+ pest and disease management workshops with documented positive outcomes"
          - "Mentored 10+ gardeners in IPM with each successfully reducing pesticide use by 50%+ in their gardens"
          - "Partnered with local extension service on pest monitoring, reporting, or education program"
          - "Published or presented 1+ articles or talks on garden pest management"
          - "Identified as a go-to pest and disease diagnostic resource by local gardening community"
        resources:
          - title: "Extension Master Gardener — IPM Teaching Resources"
            url: "https://mastergardener.extension.org/"
            type: "article"
          - title: "Cooperative Extension System — Plant Diagnostic Labs"
            url: "https://www.extension.org/"
            type: "article"
          - title: "UC IPM — Master Gardener Resources"
            url: "https://ipm.ucanr.edu/training/"
            type: "article"
        practice:
          - "Prepare and deliver a workshop on identifying common garden pests using live specimens and magnifying lenses"
          - "Partner with your county extension office to participate in a pest monitoring or citizen science program"
        projects:
          - "Teach a comprehensive IPM workshop series for beginning gardeners"
          - "Develop a regional pest and disease identification guide for your local Master Gardener program"
        tips:
          - "The most effective IPM workshops use live specimens — bring in aphid-infested leaves, caterpillars, and beneficial insects in jars for hands-on identification"
          - "Partner with your local extension entomologist — they are eager for community partners who can help with pest monitoring and education"
    tags: ["management", "science", "measurable"]

  # -- PRUNING & PLANT MAINTENANCE ------------------------------------------------
  - id: "creative-arts/gardening/pruning-maintenance"
    title: "Pruning & Plant Maintenance"
    description: >
      Keeping plants healthy and productive through pruning, training, staking,
      and general garden maintenance. Covers pruning fundamentals (when, where,
      and why to cut), training plants on supports (trellising tomatoes, training
      fruit trees), weeding strategies, and seasonal garden maintenance tasks.

      Sub-skills covered: understanding pruning terminology (heading cut, thinning
      cut, node, internode, leader, lateral, scaffold branch), timing pruning for
      different plant types (prune spring-blooming shrubs after they bloom, summer
      bloomers in late winter), pruning roses, pruning fruit trees (open center
      vs. central leader), tomato pruning (removing suckers for indeterminate
      varieties), staking and trellising, weeding strategies (mulch, hand pulling,
      hoeing), and seasonal maintenance checklists (spring cleanup, fall garden
      put-to-bed).
    benchmarks:
      - level: beginner
        criteria: "Uses clean, sharp tools (bypass pruners, loppers). Makes cuts at the correct location (just above a node or branch collar). Prunes dead, damaged, and diseased wood (the 3 D's). Stakes or cages tomatoes. Weeds regularly (at least weekly during growing season). Performs basic spring and fall garden cleanup."
        metrics:
          - "Pruning tools cleaned and sharpened at least once per season"
          - "Pruning cuts made at correct location (above a node, at branch collar) on 90%+ of cuts"
          - "Dead, damaged, and diseased wood removed from all garden plants within 1 week of identification"
          - "Tomatoes staked or caged at planting time with supports remaining functional through the season"
          - "Weeding performed weekly during growing season with no weeds going to seed in garden beds"
        resources:
          - title: "Garden Answer — Pruning Basics for Beginners"
            url: "https://www.youtube.com/watch?v=7opnPBaP_w0"
            type: "video"
          - title: "Old Farmer's Almanac — Pruning Guide"
            url: "https://www.almanac.com/pruning-guide"
            type: "article"
          - title: "RHS — Pruning"
            url: "https://www.rhs.org.uk/pruning"
            type: "article"
          - title: "University of Missouri Extension — Pruning"
            url: "https://extension.missouri.edu/programs/master-gardener"
            type: "article"
        practice:
          - "Practice making heading cuts and thinning cuts on a shrub: heading cuts above an outward-facing bud, thinning cuts at the branch collar"
          - "Walk through the garden and identify all dead, damaged, and diseased wood; remove it with clean, sharp pruners"
          - "Install tomato cages or stakes at planting time and tie stems to supports as plants grow"
        projects:
          - "Prune 3+ shrubs or small trees, removing all dead, damaged, and diseased wood with correct cut placement"
          - "Maintain a weed-free garden for 4 consecutive weeks through weekly weeding and mulching"
        tips:
          - "The 3 D's of pruning: always remove Dead, Damaged, and Diseased wood first — this is never wrong regardless of timing or plant species"
          - "Clean your pruners with rubbing alcohol between plants to prevent spreading disease — especially after cutting diseased wood"
      - level: intermediate
        criteria: "Prunes shrubs and small trees for shape, airflow, and productivity. Knows pruning timing for different plant types (spring bloomers, summer bloomers, fruit trees). Prunes tomato suckers on indeterminate varieties. Trains vining crops on trellises. Uses mulch as primary weed suppression. Performs seasonal maintenance on schedule."
        metrics:
          - "Shrubs pruned at correct timing (spring bloomers pruned after bloom, summer bloomers in late winter) for 5+ species"
          - "Tomato suckers removed weekly on indeterminate varieties with plants maintaining single or double leader"
          - "Vining crops (cucumbers, peas, beans) trained on trellises with regular tying and directing"
          - "Mulch applied at 2-4 inch depth in all beds reducing weeding time by 50%+ vs. unmulched beds"
          - "Seasonal maintenance checklist completed in spring (cleanup, soil prep) and fall (garden put-to-bed, mulch, tool maintenance)"
        resources:
          - title: "Epic Gardening — How to Prune Tomatoes"
            url: "https://www.youtube.com/watch?v=9w-jwBuG1aE"
            type: "video"
          - title: "Savvy Gardening — Trellising Vegetables"
            url: "https://www.almanac.com/content/vertical-gardening"
            type: "article"
          - title: "RHS — Pruning Shrubs"
            url: "https://www.rhs.org.uk/pruning"
            type: "article"
          - title: "Old Farmer's Almanac — Fall Garden Checklist"
            url: "https://www.almanac.com/fall-garden-checklist"
            type: "article"
        practice:
          - "Create a pruning calendar for your garden listing every shrub and tree with its correct pruning window"
          - "Remove tomato suckers weekly: identify suckers (shoots growing from leaf axils), pinch off when small"
          - "Build and install a trellis for cucumbers or beans and train plants onto it as they grow"
        projects:
          - "Prune 5+ shrubs or trees at the correct time of year with documented before-and-after photos"
          - "Complete a full fall garden put-to-bed: remove spent plants, add compost, apply mulch, clean and oil tools"
        tips:
          - "The easiest rule for pruning timing: if it blooms before June, prune right after it blooms (buds form on old wood); if it blooms after June, prune in late winter (buds form on new wood)"
          - "Tomato suckers below the first flower cluster should always be removed — they divert energy from fruit production without contributing flowers"
      - level: advanced
        criteria: "Prunes fruit trees for maximum production using established systems (open center, central leader, espalier). Rejuvenates overgrown shrubs and trees. Trains espalier fruit trees. Prunes grapes and berries for optimal yield. Manages a comprehensive annual maintenance calendar for a diverse garden. Teaches pruning to others."
        metrics:
          - "Fruit trees pruned using a specific training system (open center, central leader, or espalier) with documented improved yield"
          - "2+ overgrown shrubs or trees successfully rejuvenated over 2-3 year renovation pruning plan"
          - "Espalier fruit tree trained on a flat plane with regular pruning maintaining the form for 2+ years"
          - "Berry bushes (blueberries, raspberries) pruned annually with documented yield improvement"
          - "Comprehensive annual maintenance calendar created and followed for the full garden"
        resources:
          - title: "RHS — Pruning Fruit Trees"
            url: "https://www.rhs.org.uk/pruning"
            type: "article"
          - title: "Oregon State Extension — Pruning and Training Fruit Trees"
            url: "https://extension.oregonstate.edu/gardening/techniques"
            type: "article"
          - title: "Garden Answer — Pruning Roses and Shrubs"
            url: "https://www.youtube.com/watch?v=TaJAKIluWGY"
            type: "video"
        practice:
          - "Prune an apple or pear tree to an open center or central leader form following a pruning guide"
          - "Start an espalier project: plant a fruit tree against a wall or fence and begin training branches to horizontal wires"
          - "Develop a 3-year renovation pruning plan for an overgrown shrub: remove 1/3 of the oldest stems each year"
        projects:
          - "Train a fruit tree in an espalier form on a wall or fence and maintain it for 2+ years"
          - "Rejuvenate an overgrown shrub or tree over a 2-3 year renovation plan with documented before-and-after results"
        tips:
          - "Renovation pruning overgrown shrubs is best done in 3 stages over 3 years: remove 1/3 of the oldest thickest stems each year — this avoids the shock of hard pruning while completely renewing the plant"
          - "An espalier fruit tree produces the same amount of fruit as a full-size tree in a fraction of the space — it is the ultimate technique for small gardens"
      - level: expert
        criteria: "Certified arborist or equivalent pruning authority. Teaches pruning workshops and demonstrations. Consults on tree care and maintenance for others. Manages pruning programs for orchards, botanical gardens, or community spaces. Published or recognized expert in plant training and maintenance."
        metrics:
          - "ISA Certified Arborist or equivalent credential obtained, or recognized as pruning authority by local community"
          - "Taught 5+ pruning workshops with hands-on demonstrations"
          - "Consulted on tree care and pruning for 10+ gardens, orchards, or community spaces"
          - "Managed pruning program for an orchard, botanical garden, or institutional landscape for 2+ years"
          - "Published or presented 1+ articles or talks on pruning techniques or tree care"
        resources:
          - title: "International Society of Arboriculture"
            url: "https://www.isa-arbor.com/"
            type: "article"
          - title: "Extension Master Gardener — Tree Care Resources"
            url: "https://mastergardener.extension.org/"
            type: "article"
          - title: "RHS — Tree Care"
            url: "https://www.rhs.org.uk/plants/types/trees"
            type: "article"
        practice:
          - "Lead a hands-on pruning demonstration at a local orchard, garden, or community space"
          - "Assess and develop a pruning plan for a neglected orchard or institutional landscape"
        projects:
          - "Teach a multi-session pruning workshop covering basics, fruit trees, ornamental shrubs, and renovation pruning"
          - "Manage a pruning program for a community orchard or botanical garden for a full year"
        tips:
          - "Hands-on pruning workshops are best held in late winter when plants are dormant and branching structure is visible — attendees can see exactly what they are cutting and why"
          - "Bring bad examples to workshops: show photos of flush cuts, stub cuts, and topping damage — people learn faster from mistakes than from correct examples"
    tags: ["maintenance", "hands-on", "measurable"]

  # -- SEASON EXTENSION (Cold Frames / Greenhouses) --------------------------------
  - id: "creative-arts/gardening/season-extension"
    title: "Season Extension (Cold Frames & Greenhouses)"
    description: >
      Techniques for extending the growing season beyond the natural frost-free
      period. Covers cold frames, row covers, hoop houses, unheated greenhouses,
      and heated greenhouses. Enables earlier spring planting, later fall harvests,
      and in some cases year-round growing.

      Sub-skills covered: understanding microclimates and how to create them,
      building and using cold frames (hardened off transplants, overwintering
      cold-hardy crops), selecting and using row cover fabrics (lightweight for
      pest exclusion, heavyweight for frost protection), building hoop houses
      from PVC or EMT conduit, managing greenhouse ventilation and temperature,
      and calculating heating costs for heated greenhouse growing.
    benchmarks:
      - level: beginner
        criteria: "Uses row covers or cloches to protect plants from light frost. Extends the season by 2-4 weeks in spring or fall. Understands the concept of microclimates (south-facing wall, raised bed, cold air drainage). Builds or uses a simple cold frame. Knows the difference between a hard freeze and a light frost."
        metrics:
          - "Row covers or cloches deployed to protect plants on 3+ frost nights saving plants from damage"
          - "Growing season extended by 2+ weeks in spring or fall using any season extension technique"
          - "Cold frame built or purchased and used to harden off transplants or extend fall harvest"
          - "Can explain the difference between a light frost (28-32 F) and a hard freeze (below 28 F) and which crops survive each"
          - "At least 1 crop harvested after the first fall frost using row cover or cold frame protection"
        resources:
          - title: "Epic Gardening — Season Extension for Beginners"
            url: "https://www.youtube.com/watch?v=hUFOMSMHNAc"
            type: "video"
          - title: "Old Farmer's Almanac — Cold Frames and Season Extension"
            url: "https://www.almanac.com/building-cold-frames"
            type: "article"
          - title: "Gardener's Supply — Season Extension"
            url: "https://extension.umn.edu/planting-and-growing-guides/extending-growing-season"
            type: "article"
          - title: "University of Minnesota Extension — Season Extension"
            url: "https://extension.umn.edu/planting-and-growing-guides/extending-growing-season"
            type: "article"
        practice:
          - "Cover a bed of lettuce or kale with row cover fabric before a forecasted frost and check for frost damage the next morning"
          - "Build a simple cold frame from a wooden frame and an old window: place against a south-facing wall"
          - "Monitor temperatures inside and outside a cold frame or row cover for 1 week to see the temperature difference"
        projects:
          - "Extend your fall harvest by 2+ weeks using row covers or a cold frame on cold-hardy crops (lettuce, spinach, kale)"
          - "Build a functional cold frame and use it to harden off spring transplants or overwinter cold-hardy greens"
        tips:
          - "A cold frame is just a bottomless box with a transparent lid — it can be as simple as a wood frame with an old window on top, placed against a south-facing wall"
          - "Heavyweight row cover (1.5 oz/sq yd) provides 6-8 degrees of frost protection — enough to extend the season by a month in most climates"
      - level: intermediate
        criteria: "Builds and manages a hoop house or caterpillar tunnel. Extends the growing season by 6-8 weeks (both spring and fall). Overwinters cold-hardy crops (spinach, mâche, carrots) under protection for winter harvest. Manages ventilation in enclosed structures to prevent overheating. Uses soil thermometers to time spring planting under protection."
        metrics:
          - "Hoop house or caterpillar tunnel built and operational covering at least 50 sq ft of growing space"
          - "Growing season extended by 6+ weeks total (3+ weeks earlier in spring, 3+ weeks later in fall)"
          - "Cold-hardy crops overwintered under cover and harvested in at least 2 winter months (December-February in northern hemisphere)"
          - "Ventilation managed to keep daytime temperature under 85 F inside structures on sunny days"
          - "Soil temperature monitored and used to time spring planting under cover (planting when soil reaches target temp for each crop)"
        resources:
          - title: "Epic Gardening — How to Build a Hoop House"
            url: "https://www.youtube.com/watch?v=SHr2yMKsvi4"
            type: "video"
          - title: "Savvy Gardening — Hoop House Gardening"
            url: "https://www.johnnyseeds.com/growers-library/"
            type: "article"
          - title: "Johnny's Selected Seeds — Caterpillar Tunnel Guide"
            url: "https://www.johnnyseeds.com/growers-library/"
            type: "article"
          - title: "Old Farmer's Almanac — Winter Gardening"
            url: "https://www.almanac.com/winter-gardening"
            type: "article"
        practice:
          - "Build a hoop house from PVC or EMT conduit and greenhouse plastic over one garden bed"
          - "Plant a fall crop of spinach, mâche, and carrots under cover in September and track how late into winter they survive"
          - "Monitor temperature inside your hoop house at noon and adjust ventilation to keep below 85 F"
        projects:
          - "Build a hoop house or caterpillar tunnel and use it to extend the season by 6+ weeks total"
          - "Overwinter cold-hardy crops and harvest greens in at least 2 winter months"
        tips:
          - "Ventilation is the most common hoop house mistake — on a sunny 40 F day, the inside of an unvented hoop house can exceed 100 F and cook your plants"
          - "The key crops for winter harvest under cover are cold-hardy greens: spinach, mâche, claytonia, and kale — they actually taste sweeter after frost exposure"
      - level: advanced
        criteria: "Manages an unheated or minimally heated greenhouse for year-round production. Produces food or flowers in all 12 months using season extension techniques. Designs season extension systems for other gardeners. Uses succession planting within protected structures. Integrates thermal mass (water barrels) for passive heating."
        metrics:
          - "Food or flowers produced in all 12 months of the year using season extension techniques"
          - "Greenhouse or protected growing space managed year-round with documented monthly harvests"
          - "Thermal mass (water barrels, stone) used for passive solar heating extending frost protection by 5+ degrees F"
          - "Season extension system designed for 2+ other gardens or community spaces"
          - "Succession planting executed within protected structures for continuous production"
        resources:
          - title: "Eliot Coleman — Four Season Harvest (Author's website)"
            url: "https://www.fourseasonfarm.com/"
            type: "article"
          - title: "Gardener's Supply — Greenhouse Growing Guide"
            url: "https://www.almanac.com/content/greenhouse-gardening-for-beginners"
            type: "article"
          - title: "Penn State Extension — High Tunnel Production"
            url: "https://extension.psu.edu/high-tunnel-production"
            type: "article"
        practice:
          - "Place 5-gallon water jugs painted black inside your cold frame or hoop house to absorb daytime heat and release it at night"
          - "Plan a year-round planting schedule for a greenhouse with specific crops for each month"
          - "Design a season extension plan for a fellow gardener based on their climate, budget, and goals"
        projects:
          - "Achieve 12-month food production using a combination of outdoor, cold frame, hoop house, and/or greenhouse growing"
          - "Design and install a season extension system for another gardener or community garden"
        tips:
          - "Five-gallon jugs filled with water and painted black are the cheapest thermal mass — place them along the north wall of a hoop house to absorb daytime heat and radiate it back at night"
          - "Year-round production is about planning, not technology — Eliot Coleman grows salad greens through Maine winters in unheated structures by choosing the right varieties and planting dates"
      - level: expert
        criteria: "Designs and manages commercial-scale season extension systems. Teaches season extension workshops. Publishes or presents on protected growing techniques. Consults on greenhouse and hoop house design. Mentors gardeners and farmers in year-round production."
        metrics:
          - "Designed or managed season extension systems at commercial or institutional scale"
