  # -- GARDEN DESIGN & LANDSCAPE PLANNING -----------------------------------------
  - id: "creative-arts/gardening/garden-design"
    title: "Garden Design & Landscape Planning"
    description: >
      Planning and designing gardens as complete, functional landscapes. Integrates
      all other gardening skills into a cohesive plan. Covers site analysis (sun,
      soil, water, existing features), design principles (unity, balance, proportion,
      rhythm, focalization), functional zones (food production, recreation, wildlife
      habitat, utility), hardscape elements (paths, patios, fences, raised beds),
      and long-term planning for perennial and tree establishment.

      Sub-skills covered: conducting a site analysis (sun mapping, soil testing,
      water drainage observation, wind patterns), drawing a base map and site
      plan, understanding design principles (scale, proportion, balance, rhythm,
      repetition, focal points), selecting plants for function and aesthetics,
      planning for mature plant size (the most common design mistake), creating
      functional zones, integrating hardscape and softscape, phased installation
      planning, and budgeting for garden projects.
    benchmarks:
      - level: beginner
        criteria: "Draws a basic garden plan on paper showing existing features, sun exposure, and planned plantings. Observes and records sun patterns in the garden (full sun, partial shade, full shade areas). Plans bed layout with attention to access, water sources, and aesthetics. Understands the concept of planting for mature size. Creates a simple garden bed with intentional plant placement."
        metrics:
          - "Garden plan drawn on paper showing property boundaries, structures, existing plants, sun zones, and planned beds"
          - "Sun mapping completed for the garden over the course of 1 day (record sun/shade at 8 AM, noon, and 4 PM)"
          - "Plants selected with awareness of mature size (no 20-foot shrubs planted in 4-foot spaces)"
          - "Garden bed created with intentional placement: taller plants in back (or center of island bed), shorter in front"
          - "Access paths planned to reach all garden areas without stepping on planting beds"
        resources:
          - title: "Garden Answer — Garden Design for Beginners"
            url: "https://www.youtube.com/watch?v=A3_EPxe8yg4"
            type: "video"
          - title: "Old Farmer's Almanac — Garden Planning Guide"
            url: "https://www.almanac.com/vegetable-garden-planner"
            type: "article"
          - title: "RHS — How to Design a Garden"
            url: "https://www.rhs.org.uk/garden-design"
            type: "article"
          - title: "University of Illinois Extension — Home Landscaping"
            url: "https://extension.illinois.edu/landscaping"
            type: "article"
        practice:
          - "Draw a base map of your garden area to scale on graph paper showing the house, fences, trees, and existing beds"
          - "Sun map your garden: on a sunny day, mark which areas are in full sun, partial shade, and full shade at morning, noon, and afternoon"
          - "Select 5 plants for a new bed and verify that their mature sizes fit the available space"
        projects:
          - "Create a to-scale garden plan on paper showing existing features, sun zones, and planned plantings for the next season"
          - "Design and plant a new garden bed with plants arranged by height, color, and mature size"
        tips:
          - "The most common garden design mistake is planting too close together — always plan for the MATURE size of plants, not their nursery pot size"
          - "Sun mapping is non-negotiable — a plant labeled 'full sun' will fail in shade no matter how good the soil is; map your sun first, then select plants"
      - level: intermediate
        criteria: "Designs a complete garden plan with distinct functional zones (food, flowers, relaxation, utility). Applies basic design principles (repetition, rhythm, balance, focal points). Creates a phased installation plan over multiple seasons. Integrates hardscape elements (paths, raised beds, seating areas). Plans for 3-season interest with bloom succession and foliage texture. Uses garden design software or apps."
        metrics:
          - "Complete garden design with 3+ functional zones drawn to scale with plant lists and spacing"
          - "Design principles applied: at least 2 instances each of repetition, focal points, and balanced massing in the plan"
          - "Phased installation plan written covering 2-3 seasons with priorities and budget for each phase"
          - "Hardscape elements (paths, raised beds, or seating) integrated into the garden plan"
          - "3-season bloom plan documented with specific plants providing interest in spring, summer, and fall"
        resources:
          - title: "RHS — Garden Design Principles"
            url: "https://www.rhs.org.uk/garden-design"
            type: "article"
          - title: "Savvy Gardening — Designing Vegetable Gardens"
            url: "https://savvygardening.com/vegetable-garden-design/"
            type: "article"
          - title: "Garden Answer — Landscape Design Tours"
            url: "https://www.youtube.com/@gardenanswer"
            type: "video"
          - title: "Old Farmer's Almanac — Garden Planner Tool"
            url: "https://gardenplanner.almanac.com/"
            type: "tool"
        practice:
          - "Redesign one area of your garden on paper with intentional use of 3 design principles (repetition, focal point, balance)"
          - "Create a phased installation plan for a new garden area: Phase 1 (hardscape, trees), Phase 2 (shrubs, perennials), Phase 3 (annuals, groundcovers)"
          - "Visit 3 well-designed gardens (public gardens, garden tours, or botanical gardens) and note design elements you want to adapt"
        projects:
          - "Create a complete garden master plan for your property with functional zones, plant lists, and a 3-year phased installation timeline"
          - "Design and install a hardscape element (path, patio, or raised bed system) integrated with plantings"
        tips:
          - "Design your garden in 3 phases: first install hardscape and trees (the bones), then shrubs and perennials (the structure), then annuals and groundcovers (the finishing layer)"
          - "Repetition is the simplest design trick with the biggest impact — repeat the same plant or color at regular intervals to create visual flow and unity"
      - level: advanced
        criteria: "Designs complete residential landscapes for others with professional-quality plans. Conducts thorough site analysis (soils, microclimate, drainage, utilities, views). Designs for ecological function (stormwater management, wildlife habitat, native plant communities). Creates designs with 4-season interest including winter structure. Manages design projects from concept through installation supervision."
        metrics:
          - "3+ residential garden designs completed for other households with professional-quality plan drawings"
          - "Thorough site analysis conducted for each design including soil tests, sun mapping, drainage patterns, and microclimate assessment"
          - "Designs include ecological function elements (rain gardens, pollinator habitat, native plant areas) in 90%+ of projects"
          - "4-season interest planned with documented winter structure elements (evergreens, bark, persistent seed heads)"
          - "1+ design project managed from concept through installation with client satisfaction documented"
        resources:
          - title: "RHS — Level 2 Certificate in Practical Horticulture"
            url: "https://www.rhs.org.uk/education-learning/qualifications-and-training"
            type: "article"
          - title: "American Society of Landscape Architects — Resources"
            url: "https://www.asla.org/"
            type: "article"
          - title: "Penn State Extension — Landscape Design"
            url: "https://extension.psu.edu/lawn-and-garden"
            type: "article"
        practice:
          - "Conduct a full site analysis for a neighbor's property: map sun, test soil, observe drainage, note views and screening needs"
          - "Design a rain garden for stormwater management using native plants appropriate for your region"
          - "Create a professional-quality garden plan with scaled drawing, plant legend, and installation notes"
        projects:
          - "Design a complete residential landscape for another household from site analysis through professional plan"
          - "Design and oversee the installation of a garden that includes ecological function (rain garden, pollinator habitat, or native plant area)"
        tips:
          - "The best garden designs solve problems — start by listing the problems (poor drainage, no privacy, too much maintenance, no wildlife) and design solutions before choosing plants"
          - "Always design for the view from the most-used window in the house — this is the view the homeowner sees most often and should be the most beautiful part of the garden"
      - level: expert
        criteria: "Professional landscape designer or recognized garden design authority. Designs public gardens, community spaces, or display gardens. Teaches garden design courses. Publishes or speaks on garden design. Mentors aspiring garden designers. Creates designs that are featured or awarded."
        metrics:
          - "Professional landscape design credential obtained (RHS diploma, landscape design certification, or equivalent)"
          - "Public garden, community space, or display garden designed and installed"
          - "Taught 5+ garden design courses or workshops"
          - "Design work featured in a publication, garden tour, or design award"
          - "Mentored 3+ aspiring garden designers from concept skills through completed projects"
        resources:
          - title: "Association of Professional Landscape Designers"
            url: "https://www.apld.org/"
            type: "article"
          - title: "RHS — Education and Qualifications"
            url: "https://www.rhs.org.uk/education-learning"
            type: "article"
          - title: "Garden Design Magazine"
            url: "https://www.gardendesign.com/"
            type: "article"
        practice:
          - "Submit a garden design to a local garden tour or design competition"
          - "Prepare and teach a garden design workshop covering site analysis, design principles, and plant selection"
        projects:
          - "Design a public or community garden from concept through installation"
          - "Teach a multi-session garden design course covering site analysis, design principles, plant selection, and plan drawing"
        tips:
          - "The gap between amateur and professional garden design is the site analysis — professionals spend 50%+ of their time understanding the site before drawing a single line"
          - "Build a portfolio of before-and-after photos from every project — this is more persuasive than any credential"
    tags: ["design", "planning", "creative"]

