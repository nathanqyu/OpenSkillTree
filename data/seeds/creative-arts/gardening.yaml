# OpenSkillTree — Seed Skill Tree: Gardening
#
# Domain:  Creative Arts / Horticulture / Gardening
# Author:  OpenSkillTree Team (first pass)
# Version: 0.1.0
#
# Benchmark levels reference: Master Gardener certification, RHS qualifications
#   beginner     = Grows first successful crop; learns basic soil and watering
#   intermediate = Maintains a productive garden through a full growing season
#   advanced     = Year-round production; designs gardens for others
#   expert       = Master Gardener certified; teaches; mentors community gardens
#
# Teaching order based on university extension curricula and Master Gardener programs:
#   Soil science & composting -> seed starting & propagation -> vegetable gardening ->
#   herb gardening -> flower & ornamental gardening -> watering & irrigation ->
#   pest & disease management -> pruning & plant maintenance -> season extension ->
#   garden design & landscape planning.
# This sequence mirrors the Extension Master Gardener training: understand the
# growing medium first, then learn to start plants, then apply those skills to
# edibles, ornamentals, and finally design and year-round planning.

tree:
  id: "creative-arts/gardening"
  title: "Gardening"
  description: >
    A complete skill map for gardening — the practice and art of cultivating plants
    for food, beauty, and ecological health. Covers soil science, seed starting,
    vegetable and herb production, ornamental gardening, irrigation, pest management,
    pruning, season extension, and garden design. Progresses from planting a first
    seed to designing productive landscapes and mentoring community gardens.
  domain: "Creative Arts"
  visibility: "public"

nodes:
  # -- SOIL SCIENCE & COMPOSTING (foundation of all gardening) --------------------
  - id: "creative-arts/gardening/soil-composting"
    title: "Soil Science & Composting"
    description: >
      The foundation of every garden is the soil. This node covers understanding
      soil texture (sand, silt, clay), soil structure, organic matter content,
      pH, and nutrient availability (NPK — nitrogen, phosphorus, potassium).
      Includes learning to read a soil test report, amending soil based on results,
      and building a composting system to recycle organic waste into rich humus.

      Sub-skills covered: soil texture identification (ribbon test, jar test),
      reading and interpreting soil test results, adjusting pH with lime or sulfur,
      understanding cation exchange capacity (CEC), building and maintaining a
      compost pile (greens-to-browns ratio of roughly 1:3 by volume), hot composting
      vs. cold composting, vermicomposting with red wigglers, using cover crops
      as green manure, and applying compost and mulch for moisture retention and
      weed suppression.

      Drills to practice: (1) Jar test — fill a mason jar with garden soil and
      water, shake vigorously, let settle for 24 hours, and measure the sand,
      silt, and clay layers to determine soil texture. (2) pH test — use a home
      pH test kit on three different spots in your garden. (3) Compost pile
      monitoring — check internal temperature with a compost thermometer weekly,
      aiming for 130-160 F in a hot pile. (4) Soil amendment calculation — given
      a soil test report, calculate the pounds of lime or fertilizer needed per
      100 square feet.
    benchmarks:
      - level: beginner
        criteria: "Identifies soil type by feel (ribbon test). Performs a basic soil pH test. Knows the three primary macronutrients (NPK) and what each supports (N=leaves, P=roots/flowers, K=overall vigor). Starts a simple compost pile or bin with correct greens-to-browns layering. Understands that soil is alive — contains billions of microorganisms per teaspoon."
        metrics:
          - "Correctly identifies soil texture (sandy, loamy, or clay) via ribbon test on 3 different soil samples"
          - "Soil pH test performed and result recorded within 0.5 units of a lab test for the same sample"
          - "Compost pile built with roughly 1:3 greens-to-browns ratio by volume and reaching 100+ F within 2 weeks"
          - "Can name the 3 primary macronutrients (NPK) and explain the role of each when quizzed"
          - "At least 1 soil test (home kit or extension lab) completed and results recorded for the garden area"
        resources:
          - title: "Epic Gardening — Understanding Your Soil (The Basics)"
            url: "https://www.youtube.com/watch?v=zx71LGr0Wuo"
            type: "video"
          - title: "University of Minnesota Extension — Soil Testing"
            url: "https://extension.umn.edu/yard-and-garden"
            type: "article"
          - title: "Old Farmer's Almanac — How to Compost"
            url: "https://www.almanac.com/composting-101"
            type: "article"
          - title: "RHS — Soil Types and How to Improve Them"
            url: "https://www.rhs.org.uk/soil-composts-mulches/soil-types"
            type: "article"
        practice:
          - "Perform the jar test on your garden soil: fill a quart mason jar 1/3 with soil, add water, shake, and measure layers after 24 hours"
          - "Test soil pH in 3 different spots using a home test kit and record results"
          - "Start a compost bin: layer 3 inches of browns (leaves, cardboard) then 1 inch of greens (kitchen scraps, grass clippings), repeat"
        projects:
          - "Complete a soil jar test and correctly classify your soil as sandy, loamy, or clay based on the sand/silt/clay percentages"
          - "Build a functional compost pile or bin that reaches 100+ F within 2 weeks of construction"
        tips:
          - "Do not skip the soil test — it costs $15-25 through your local extension office and saves you hundreds in wasted fertilizer"
          - "The ribbon test is quick: take moist soil, squeeze it between thumb and finger, and push it out into a ribbon — clay makes a long ribbon, sand crumbles immediately, loam falls apart at 1-2 inches"
      - level: intermediate
        criteria: "Reads and interprets a full extension lab soil test report (pH, NPK, organic matter %, CEC, micronutrients). Calculates amendment quantities from test recommendations. Maintains a hot compost pile that reaches 130-160 F and produces finished compost in 2-3 months. Understands the role of soil biology — mycorrhizal fungi, beneficial bacteria, and earthworms. Applies mulch strategically for moisture retention and weed suppression."
        metrics:
          - "Interprets a lab soil test and correctly calculates amendment quantities (lime, fertilizer) for a 100 sq ft bed"
          - "Hot compost pile maintains 130-160 F for 3+ consecutive days and produces finished compost within 3 months"
          - "Organic matter content of garden beds increased by at least 1% over one growing season (verified by soil test)"
          - "Mulch applied at 2-4 inch depth on all garden beds, with no mulch touching plant stems"
          - "Can explain the carbon-to-nitrogen ratio concept and why a 25-30:1 C:N ratio is ideal for composting"
        resources:
          - title: "Epic Gardening — How to Read a Soil Test"
            url: "https://www.youtube.com/watch?v=VNSmvMU-Hy8"
            type: "video"
          - title: "Oregon State Extension — Soil Health Guide"
            url: "https://extension.oregonstate.edu/gardening/soil-compost"
            type: "article"
          - title: "Gardener's Supply Company — Composting Guide"
            url: "https://www.rhs.org.uk/soil-composts-mulches/composting"
            type: "article"
          - title: "RHS — Making Compost"
            url: "https://www.rhs.org.uk/soil-composts-mulches/composting"
            type: "article"
        practice:
          - "Monitor compost pile temperature weekly with a compost thermometer; turn the pile when temperature drops below 110 F"
          - "Practice calculating amendment rates: given a soil test that says pH is 5.5 and target is 6.5, calculate pounds of lime per 100 sq ft"
          - "Apply 3 inches of mulch to a garden bed and observe moisture retention over 1 week vs. an unmulched bed"
        projects:
          - "Send a soil sample to your local extension lab, receive results, interpret the report, and amend one garden bed according to recommendations"
          - "Produce finished compost from a hot pile in under 3 months, verified by the squeeze test (dark, crumbly, earthy smell)"
        tips:
          - "Turn your hot compost pile when the internal temperature drops below 110 F — this reintroduces oxygen and restarts microbial activity"
          - "Never add lime and nitrogen fertilizer at the same time — the lime causes nitrogen to volatilize as ammonia gas; wait 2 weeks between applications"
      - level: advanced
        criteria: "Designs soil management plans for multiple garden zones (raised beds, in-ground, containers) with different crop needs. Uses cover crops for nitrogen fixation and soil structure improvement. Implements no-till or minimal-till practices. Creates specialized compost (fungal-dominant for perennials, bacterial-dominant for annuals). Manages soil biology intentionally — inoculates with mycorrhizae, brews compost tea."
        metrics:
          - "Soil management plan written for 3+ distinct garden zones with different amendment schedules based on crop needs"
          - "Cover crop established in at least 2 beds during off-season, terminated and incorporated before spring planting"
          - "Compost tea brewed and applied at least 4 times during the growing season with measurable plant growth improvement"
          - "Soil organic matter above 5% in primary growing beds (verified by lab test)"
          - "Zero synthetic fertilizer needed — all nutrient needs met through compost, cover crops, and organic amendments"
        resources:
          - title: "Epic Gardening — Cover Crops for the Home Garden"
            url: "https://www.youtube.com/watch?v=GVaQkofSmt0"
            type: "video"
          - title: "Penn State Extension — Cover Crops for Home Gardens"
            url: "https://extension.psu.edu/lawn-and-garden"
            type: "article"
          - title: "USDA NRCS — Soil Health"
            url: "https://www.nrcs.usda.gov/conservation-basics/natural-resource-concerns/soils/soil-health"
            type: "article"
        practice:
          - "Plant a fall cover crop mix (crimson clover + winter rye) in 2 empty beds and monitor growth through winter"
          - "Brew a batch of actively aerated compost tea: 5 gallons water, 2 cups compost, 1 tablespoon molasses, aerate for 24 hours"
          - "Implement no-till bed preparation: lay 6 inches of compost on top of existing soil without turning it over"
        projects:
          - "Create a written soil management plan for your entire garden with zone-specific amendment schedules and cover crop rotations"
          - "Achieve 5%+ organic matter in your primary growing beds verified by a lab soil test"
        tips:
          - "Fungal-dominant compost (woody materials, slow decomposition) benefits perennials and trees; bacterial-dominant compost (green materials, fast hot composting) benefits annual vegetables"
          - "Never leave soil bare — cover it with mulch, cover crops, or plantings at all times to prevent erosion and feed soil biology"
      - level: expert
        criteria: "Teaches soil science workshops for community gardens and extension programs. Diagnoses complex soil problems (compaction, salinity, contamination) and prescribes remediation. Designs soil-building programs for degraded or urban sites. Publishes or presents on soil management. Mentors others in regenerative soil practices."
        metrics:
          - "Taught 3+ soil science workshops or classes with documented positive feedback from participants"
          - "Successfully remediated 2+ problem soils (compacted, saline, or low-organic-matter) with measurable improvement in lab tests"
          - "Mentored 5+ gardeners in soil management with each achieving at least intermediate-level soil health metrics"
          - "Soil health scores (Cornell Comprehensive Assessment of Soil Health or equivalent) in the top quartile for region"
          - "Published or presented 1+ articles or talks on soil management at a gardening conference, extension event, or community forum"
        resources:
          - title: "Cornell Soil Health — Comprehensive Assessment of Soil Health"
            url: "https://soilhealth.cals.cornell.edu/"
            type: "article"
          - title: "Extension Master Gardener Program — Teaching Resources"
            url: "https://mastergardener.extension.org/"
            type: "article"
          - title: "USDA Web Soil Survey"
            url: "https://websoilsurvey.nrcs.usda.gov/"
            type: "tool"
        practice:
          - "Prepare and deliver a 30-minute soil science presentation for a local garden club or community garden"
          - "Diagnose a soil problem in a fellow gardener's plot using observation, soil tests, and plant symptom analysis"
        projects:
          - "Design and implement a soil remediation plan for a degraded or contaminated urban garden site"
          - "Teach a multi-session soil science workshop series for beginning gardeners through your local extension program"
        tips:
          - "When teaching soil science, start with the jar test — it is the single most engaging hands-on activity for beginners and immediately makes soil tangible"
          - "Keep a soil journal for every bed: record amendments, test results, and crop performance year over year — patterns emerge over 3-5 years that transform your soil management"
    tags: ["foundation", "science", "measurable"]

  # -- SEED STARTING & PROPAGATION -----------------------------------------------
  - id: "creative-arts/gardening/seed-starting"
    title: "Seed Starting & Propagation"
    description: >
      The skills needed to grow plants from seeds, cuttings, and divisions rather
      than buying transplants. Covers seed biology (germination requirements: moisture,
      temperature, light/darkness), reading seed packets, indoor seed starting under
      lights, hardening off transplants, direct sowing, and vegetative propagation
      methods (stem cuttings, root division, layering).

      Sub-skills covered: reading seed packet information (days to maturity, spacing,
      depth, germination temperature), calculating seed starting dates from last frost
      date, using seed starting mix vs. potting soil, bottom watering, providing
      adequate light (16 hours/day from grow lights or a south-facing window), thinning
      seedlings, hardening off over 7-10 days, stem cutting propagation (softwood,
      semi-hardwood, hardwood), root division of perennials, and seed saving basics.
    benchmarks:
      - level: beginner
        criteria: "Reads a seed packet and understands the information (depth, spacing, days to maturity, germination temperature). Starts seeds indoors under lights or on a windowsill with proper seed starting mix. Achieves 50%+ germination rate on easy crops (tomatoes, basil, lettuce, zinnias). Transplants seedlings outdoors after hardening off. Direct-sows easy crops (beans, peas, radishes) at correct depth and spacing."
        metrics:
          - "50%+ germination rate on at least 3 different easy-to-start varieties"
          - "Seedlings started indoors survive transplanting outdoors with less than 20% mortality after hardening off"
          - "Seed starting dates calculated correctly from local last frost date for 5+ crops"
          - "Direct-sown seeds planted at correct depth (within 0.25 inches of packet recommendation) and spacing"
          - "At least 10 seedlings successfully grown from seed to transplant size in one season"
        resources:
          - title: "Epic Gardening — Seed Starting for Beginners"
            url: "https://www.youtube.com/watch?v=ex3JkM13fOw"
            type: "video"
          - title: "Old Farmer's Almanac — Starting Seeds Indoors"
            url: "https://www.almanac.com/starting-seeds-indoors"
            type: "article"
          - title: "University of Maryland Extension — Starting Seeds Indoors"
            url: "https://extension.umd.edu/resource/starting-seeds-indoors"
            type: "article"
          - title: "Garden Answer — How I Start Seeds Indoors"
            url: "https://www.youtube.com/watch?v=sLGaR1dCQ2E"
            type: "video"
        practice:
          - "Start 3 varieties of easy crops (e.g., tomatoes, basil, lettuce) indoors 6-8 weeks before last frost date"
          - "Practice reading seed packets: for each packet, write down depth, spacing, days to maturity, and ideal germination temperature"
          - "Direct-sow a row of radishes or beans at correct depth and spacing according to packet instructions"
        projects:
          - "Grow 10+ seedlings from seed to transplant size under grow lights, achieving 50%+ germination rate"
          - "Harden off and transplant indoor-started seedlings outdoors with less than 20% transplant mortality"
        tips:
          - "The number one killer of indoor seedlings is overwatering — bottom-water by placing trays in a shallow dish of water and letting the soil wick moisture up from below"
          - "If seedlings are tall and leggy with thin stems, they need more light — move grow lights to 2-4 inches above the seedlings or increase to 16 hours per day"
      - level: intermediate
        criteria: "Achieves 75%+ germination rates across a wide range of crops including difficult varieties (peppers, eggplant, parsley). Uses heat mats for warm-season crops. Understands stratification and scarification for seeds that require it. Propagates perennials by division. Takes successful softwood stem cuttings from herbs and easy perennials. Manages a seed starting schedule for succession planting."
        metrics:
          - "75%+ germination rate on 8+ varieties including 2+ difficult crops (peppers, eggplant, or parsley)"
          - "Succession planting schedule written and executed with 3+ plantings of at least 1 crop (lettuce, radish, or beans) at 2-3 week intervals"
          - "5+ softwood stem cuttings successfully rooted from herbs (basil, mint, rosemary)"
          - "3+ perennial plants successfully divided and transplanted with all divisions surviving"
          - "Seedling damping-off rate below 5% across all indoor starts"
        resources:
          - title: "Epic Gardening — Advanced Seed Starting Tips"
            url: "https://www.youtube.com/watch?v=hI_6X2HFEJY"
            type: "video"
          - title: "Savvy Gardening — Succession Planting Guide"
            url: "https://savvygardening.com/succession-planting/"
            type: "article"
          - title: "RHS — How to Take Softwood Cuttings"
            url: "https://www.rhs.org.uk/propagation/softwood-cuttings"
            type: "article"
          - title: "Penn State Extension — Plant Propagation by Stem Cuttings"
            url: "https://extension.psu.edu/lawn-and-garden"
            type: "article"
        practice:
          - "Start peppers or eggplant on a heat mat at 80-85 F and track germination rate vs. a control batch without a heat mat"
          - "Take 10 softwood cuttings from basil or mint: cut 4-inch stem tips, remove lower leaves, dip in rooting hormone, place in moist perlite"
          - "Create a succession planting calendar for 3 fast-maturing crops with plantings every 2-3 weeks"
        projects:
          - "Achieve 75%+ germination on 8+ varieties including at least 2 difficult crops, documented with a germination log"
          - "Execute a full succession planting schedule for one season with 3+ plantings of at least one crop"
        tips:
          - "Use a heat mat for warm-season crops (tomatoes, peppers, eggplant) — soil temperature of 75-85 F dramatically improves germination speed and rate"
          - "Prevent damping-off disease by ensuring good air circulation (small fan on low), avoiding overwatering, and using sterile seed starting mix"
      - level: advanced
        criteria: "Propagates plants by all major methods: seed, stem cuttings (softwood, semi-hardwood, hardwood), root cuttings, layering, grafting, and division. Saves seeds from open-pollinated varieties maintaining genetic purity. Breeds or selects plant varieties for local adaptation. Manages a greenhouse or indoor propagation setup with automated lighting and watering. Achieves 90%+ germination rates on easy crops."
        metrics:
          - "90%+ germination rate on easy crops and 75%+ on difficult crops across 15+ varieties"
          - "Seeds saved from 5+ open-pollinated varieties with documented isolation or hand-pollination to maintain purity"
          - "Plants propagated by 4+ different methods (seed, stem cutting, division, layering) in a single season"
          - "Greenhouse or indoor propagation space manages 100+ seedlings simultaneously with organized scheduling"
          - "Grafted 5+ tomato or fruit tree plants successfully with 80%+ graft take rate"
        resources:
          - title: "Seed Savers Exchange — Seed Saving Guide"
            url: "https://www.seedsavers.org/learn"
            type: "article"
          - title: "RHS — Grafting"
            url: "https://www.rhs.org.uk/propagation/softwood-cuttings"
            type: "article"
          - title: "NC State Extension — Plant Propagation"
            url: "https://content.ces.ncsu.edu/extension-gardener-handbook"
            type: "article"
        practice:
          - "Graft 5 tomato plants onto disease-resistant rootstock using a tube grafting method"
          - "Save seeds from 3 open-pollinated tomato varieties: ferment to remove gel, dry on screens, and store in paper envelopes"
          - "Propagate a woody shrub by layering: select a low branch, wound the underside, pin it to the ground, and cover with soil"
        projects:
          - "Build and manage a seed starting operation producing 100+ transplants for your garden and to share with neighbors"
          - "Save seeds from 5+ open-pollinated varieties with proper isolation techniques and achieve 80%+ viability the following year"
        tips:
          - "When saving tomato seeds, ferment them for 2-3 days in their own gel and water — this kills seed-borne diseases and removes the germination-inhibiting gel coating"
          - "Label everything obsessively — it is impossible to identify unlabeled seedlings once they are 2 weeks old"
      - level: expert
        criteria: "Teaches propagation workshops. Manages a community seed library. Conducts variety trials and publishes results. Mentors gardeners in seed saving and propagation. Develops locally adapted varieties through selective breeding over multiple seasons."
        metrics:
          - "Taught 3+ propagation workshops or classes with positive participant evaluations"
          - "Managed a seed library or seed swap with 50+ varieties and 20+ participants"
          - "Conducted and documented 2+ variety trials comparing performance of 5+ cultivars for local conditions"
          - "Mentored 5+ gardeners in propagation with each successfully propagating plants independently"
          - "Developed or selected 1+ locally adapted variety through 3+ generations of selection"
        resources:
          - title: "Extension Master Gardener — Volunteer Teaching Resources"
            url: "https://mastergardener.extension.org/"
            type: "article"
          - title: "Organic Seed Alliance — Seed Saving Resources"
            url: "https://seedalliance.org/publications/"
            type: "article"
          - title: "Gardener's Supply — Seed Starting Guide"
            url: "https://www.almanac.com/content/starting-seeds-indoors"
            type: "article"
        practice:
          - "Organize a community seed swap event with labeling standards, germination testing, and variety descriptions"
          - "Design and execute a side-by-side variety trial for 5+ tomato or pepper varieties"
        projects:
          - "Establish and maintain a community seed library with 50+ varieties and documented seed saving protocols"
          - "Teach a multi-session propagation workshop series covering seed starting, cuttings, division, and grafting"
        tips:
          - "Variety trials require at least 3 replicates of each variety to produce meaningful data — randomize plot placement to control for microclimate variation"
          - "A community seed library thrives on engagement, not perfection — start small with 10 easy-to-save varieties and grow from there"
    tags: ["foundation", "hands-on", "measurable"]

  # -- VEGETABLE GARDENING -------------------------------------------------------
  - id: "creative-arts/gardening/vegetable-gardening"
    title: "Vegetable Gardening"
    description: >
      Growing food crops from planting to harvest. Covers garden bed preparation
      (raised beds, in-ground, containers), crop selection based on climate zone
      and season, planting schedules, spacing, companion planting, crop rotation,
      fertilizing, and harvesting at peak ripeness. The core skill for anyone who
      wants to grow their own food.

      Sub-skills covered: understanding USDA hardiness zones and first/last frost
      dates, planning a garden layout on paper, building or preparing raised beds,
      cool-season vs. warm-season crop calendars, succession planting for
      continuous harvest, basic companion planting (tomatoes/basil, corn/beans/squash),
      crop rotation principles (avoid planting the same family in the same spot
      for 3-4 years), side-dressing and foliar feeding, recognizing harvest
      readiness indicators, and post-harvest handling.
    benchmarks:
      - level: beginner
        criteria: "Grows 3+ vegetable varieties from transplant or direct seed to harvest. Knows their USDA zone and frost dates. Prepares a basic garden bed (raised or in-ground). Plants at correct spacing. Harvests at least one crop at appropriate ripeness. Understands cool-season vs. warm-season crop categories."
        metrics:
          - "3+ vegetable varieties grown from planting to harvest in one season"
          - "USDA hardiness zone and local frost dates correctly identified and recorded"
          - "Garden bed prepared with amended soil and plants spaced within 2 inches of recommended spacing"
          - "At least 5 lbs of food harvested from the garden in the first season"
          - "Can classify 10 common vegetables as cool-season or warm-season correctly"
        resources:
          - title: "Epic Gardening — Beginner's Guide to Vegetable Gardening"
            url: "https://www.youtube.com/watch?v=s_TLaB6MoPA"
            type: "video"
          - title: "Old Farmer's Almanac — Vegetable Gardening for Beginners"
            url: "https://www.almanac.com/vegetable-gardening-for-beginners"
            type: "article"
          - title: "University of Illinois Extension — First Vegetable Garden"
            url: "https://extension.illinois.edu/veggies"
            type: "article"
          - title: "Garden Answer — Raised Bed Gardening Basics"
            url: "https://www.youtube.com/watch?v=3-3QoPqmkFo"
            type: "video"
        practice:
          - "Sketch a garden plan on paper showing bed locations, what you will plant, and spacing for each crop"
          - "Plant at least 3 easy vegetables (tomatoes, lettuce, beans or zucchini) and track growth weekly in a garden journal"
          - "Look up your USDA zone and local average last frost date and write them in your garden journal"
        projects:
          - "Grow 3+ vegetable varieties from planting to harvest and record total harvest weight"
          - "Build or prepare one raised bed (at least 4x8 feet) filled with quality soil and plant a spring or summer crop"
        tips:
          - "Start small — a single 4x8 raised bed can produce a surprising amount of food and is much more manageable than a large plot"
          - "Tomatoes, zucchini, lettuce, green beans, and herbs are the most forgiving first crops — start with these before attempting melons, corn, or artichokes"
      - level: intermediate
        criteria: "Manages a productive garden with 10+ vegetable varieties across cool and warm seasons. Implements crop rotation on a 3-4 year cycle. Practices succession planting for continuous harvest. Uses companion planting principles. Side-dresses heavy feeders mid-season. Harvests 50+ lbs of food per season from a home garden."
        metrics:
          - "10+ vegetable varieties grown successfully across spring, summer, and fall plantings"
          - "Crop rotation plan documented and followed for all beds over 2+ years"
          - "Succession plantings of at least 2 crops (e.g., lettuce and beans) maintaining continuous harvest for 8+ weeks"
          - "50+ lbs of food harvested per season from the home garden"
          - "Garden journal maintained with planting dates, harvest dates, varieties, and yields for all crops"
        resources:
          - title: "Epic Gardening — Crop Rotation Explained"
            url: "https://www.youtube.com/watch?v=NqVrG0Rjfho"
            type: "video"
          - title: "Savvy Gardening — Companion Planting Guide"
            url: "https://www.almanac.com/companion-planting-guide-vegetables"
            type: "article"
          - title: "Old Farmer's Almanac — Crop Rotation"
            url: "https://www.almanac.com/crop-rotation-101-tips-vegetable-garden"
            type: "article"
          - title: "Gardener's Supply — Raised Bed Gardening"
            url: "https://www.almanac.com/raised-garden-beds"
            type: "article"
        practice:
          - "Create a crop rotation map for your garden beds showing what plant family goes where for the next 4 years"
          - "Implement succession planting: sow a new row of lettuce every 2 weeks from early spring through fall"
          - "Side-dress tomatoes and peppers with compost or organic fertilizer when first fruits set"
        projects:
          - "Maintain a productive garden producing 50+ lbs of food across spring, summer, and fall crops"
          - "Document a full year of gardening in a journal with planting dates, varieties, harvest weights, and lessons learned"
        tips:
          - "Crop rotation is about plant families, not individual crops — tomatoes, peppers, and eggplant are all Solanaceae, so rotating tomatoes with peppers does not count as rotation"
          - "Track your harvest weight with a kitchen scale — most gardeners are surprised to learn they are growing more than they realize"
      - level: advanced
        criteria: "Year-round food production using season extension techniques. Grows 25+ varieties including challenging crops (melons, sweet potatoes, artichokes). Produces 200+ lbs of food per year from a home garden. Designs vegetable gardens for others based on their space, climate, and preferences. Preserves surplus through canning, freezing, or fermentation."
        metrics:
          - "25+ vegetable varieties grown successfully in one calendar year"
          - "200+ lbs of food harvested per year (tracked with a harvest log)"
          - "Food produced in 10+ months of the year using season extension techniques"
          - "Designed and planned a vegetable garden for at least 2 other households"
          - "Surplus preserved by 2+ methods (canning, freezing, fermenting, dehydrating) totaling 20+ lbs"
        resources:
          - title: "Epic Gardening — Year-Round Vegetable Gardening"
            url: "https://www.youtube.com/watch?v=s_TLaB6MoPA"
            type: "video"
          - title: "Savvy Gardening — Growing Year-Round"
            url: "https://www.fourseasonfarm.com/"
            type: "article"
          - title: "NC State Extension — Vegetable Gardening"
            url: "https://content.ces.ncsu.edu/extension-gardener-handbook"
            type: "article"
        practice:
          - "Grow a challenging crop you have never tried before (sweet potatoes, artichokes, or melons) and document the process"
          - "Design a vegetable garden plan for a friend or neighbor based on their available space, sun exposure, and food preferences"
          - "Preserve 10+ lbs of surplus harvest by canning, freezing, or fermenting"
        projects:
          - "Produce 200+ lbs of food from your garden in one year, verified by a harvest log"
          - "Design a complete vegetable garden for another household including bed layout, variety selection, and planting schedule"
        tips:
          - "The jump to year-round production requires thinking in seasons, not just summer — plan your fall and winter crops in June and July"
          - "A kitchen scale next to the back door makes harvest tracking effortless — weigh everything as you bring it in"
      - level: expert
        criteria: "Master Gardener certified or equivalent. Manages community garden programs. Teaches vegetable gardening classes. Conducts variety trials and publishes results. Mentors beginning gardeners from first seed to sustained production. Designs market garden or CSA production plans."
        metrics:
          - "Master Gardener certification obtained or equivalent advanced horticulture credential"
          - "Taught 5+ vegetable gardening classes or workshops with documented positive feedback"
          - "Mentored 10+ beginning gardeners from initial planting through their first full harvest season"
          - "Community garden program managed with 20+ participating plots"
          - "Variety trial results published or presented at a gardening conference or extension event"
        resources:
          - title: "Extension Master Gardener Program"
            url: "https://mastergardener.extension.org/"
            type: "article"
          - title: "USDA Community Garden Resources"
            url: "https://www.nal.usda.gov/"
            type: "article"
          - title: "Old Farmer's Almanac — Growing Guides"
            url: "https://www.almanac.com/gardening/growing-guides"
            type: "article"
        practice:
          - "Prepare and deliver a 1-hour vegetable gardening workshop for beginning gardeners at a local library, school, or community center"
          - "Conduct a variety trial comparing 5+ tomato cultivars for yield, disease resistance, and flavor"
        projects:
          - "Obtain Master Gardener certification through your state extension program (typically 40-50 hours of training + volunteer hours)"
          - "Launch or manage a community garden with at least 10 participating gardeners"
        tips:
          - "The best way to teach vegetable gardening is to garden alongside the learner — abstract classroom instruction does not stick; hands in soil does"
          - "Community gardens succeed or fail based on clear governance — establish plot rules, maintenance expectations, and communication channels before the first seed goes in the ground"
