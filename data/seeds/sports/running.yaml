relationships:
  # -- Foundation layer ----------------------------------------------------------
  - source: "sports/running/form-and-cadence"
    target: "sports/running/base-building"
    type: "enables"
    note: "Good form is required before accumulating volume — running with poor form at high mileage leads to injury"

  - source: "sports/running/form-and-cadence"
    target: "sports/running/hill-training"
    type: "enables"
    note: "Uphill and downhill form are extensions of flat-ground running mechanics"

  - source: "sports/running/form-and-cadence"
    target: "sports/running/speed-work"
    type: "enables"
    note: "Efficient form is a prerequisite for running fast — poor form at high speeds causes injury"

  # -- Aerobic base feeds everything --------------------------------------------
  - source: "sports/running/base-building"
    target: "sports/running/long-runs"
    type: "enables"
    note: "The weekly long run is built on top of a consistent aerobic base — you must be running regularly before extending distance"

  - source: "sports/running/base-building"
    target: "sports/running/speed-work"
    type: "requires"
    note: "Speed work should only be introduced after a solid aerobic base — without it, intervals cause injury and limited improvement"

  - source: "sports/running/base-building"
    target: "sports/running/hill-training"
    type: "enables"
    note: "Hill training requires aerobic fitness and musculoskeletal durability built during base building"

  # -- Hill training bridges base and speed -------------------------------------
  - source: "sports/running/hill-training"
    target: "sports/running/speed-work"
    type: "enables"
    note: "Hill training builds the strength and power foundation that makes flat-ground speed work safer and more effective"

  # -- Endurance and speed feed race strategy ------------------------------------
  - source: "sports/running/long-runs"
    target: "sports/running/race-strategy"
    type: "requires"
    note: "Race strategy for distances over 10K requires experience with long runs — you cannot pace a marathon without having practiced the distance"

  - source: "sports/running/speed-work"
    target: "sports/running/race-strategy"
    type: "requires"
    note: "Knowing your tempo, interval, and race paces is essential for setting realistic race-day targets"

  # -- Supporting skills --------------------------------------------------------
  - source: "sports/running/base-building"
    target: "sports/running/recovery"
    type: "enables"
    note: "As training load increases, recovery practices become essential — beginners at low mileage need less structured recovery"

  - source: "sports/running/base-building"
    target: "sports/running/nutrition"
    type: "enables"
    note: "Fueling requirements scale with training volume — nutrition strategy becomes critical as mileage increases"

  - source: "sports/running/form-and-cadence"
    target: "sports/running/strength-training"
    type: "complementary"
    note: "Strength training reinforces good running form by building the muscles that maintain posture, hip stability, and foot strike mechanics"

  - source: "sports/running/recovery"
    target: "sports/running/strength-training"
    type: "complementary"
    note: "Strength training is a primary injury prevention tool — the two skills work together to keep the runner healthy"

  # -- Mental toughness is the capstone -----------------------------------------
  - source: "sports/running/long-runs"
    target: "sports/running/mental-toughness"
    type: "enables"
    note: "Long runs are the primary training ground for mental toughness — sustained effort over hours builds mental resilience"

  - source: "sports/running/race-strategy"
    target: "sports/running/mental-toughness"
    type: "enables"
    note: "Executing a race plan under pressure requires mental toughness — strategy without mental discipline falls apart on race day"

  - source: "sports/running/speed-work"
    target: "sports/running/mental-toughness"
