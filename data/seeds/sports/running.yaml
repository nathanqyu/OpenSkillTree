        practice:
          - "10 min: Pre-race visualization — close your eyes and mentally run the entire race course, including the hard parts, seeing yourself executing your plan and finishing strong"
          - "During long runs, practice segmenting — instead of thinking about the total distance, focus only on getting to the next mile marker or landmark"
          - "After a bad race or workout, write a debrief: what happened, what you learned, and what you will do differently next time"
        projects:
          - "Visualize your goal race at least 5 times in the 2 weeks before race day and write down how it affects your confidence"
          - "Bounce back from a bad race by completing a strong workout within 10 days and writing a constructive debrief"
        tips:
          - "Pre-race nerves are a sign that you care about your performance — reframe anxiety as excitement and channel that energy into a strong start"
          - "In a long race, never think about how far you still have to go — only think about the mile you are in right now"
      - level: advanced
        criteria: "Can push through the marathon 'wall' (miles 18-22) through mental strategies. Uses association (tuning into body signals) and dissociation (distraction techniques) strategically. Has a resilience practice for dealing with injuries and setbacks. Maintains motivation across multi-year training blocks. Can race at maximum effort and tolerate high levels of physiological discomfort."
        metrics:
          - "Maintains pace through marathon miles 18-22 (does not slow more than 10 seconds per mile compared to miles 8-16)"
          - "Completes a VO2max interval session at RPE 9/10 without cutting the workout short"
          - "Trains consistently through a setback (injury, life stress) and returns to pre-setback fitness within 6 weeks"
          - "Has maintained a training streak of 12+ months without a motivation-related layoff"
          - "Races a 5K or 10K at a pace that produces significant discomfort and does not back off in the final kilometer"
        resources:
          - title: "Strength Running — Breaking Through the Marathon Wall"
            url: "https://marathonhandbook.com/the-long-run/"
            type: "article"
          - title: "Runner's World — The Psychology of Endurance"
            url: "https://marathonhandbook.com/speed-training-for-runners/"
            type: "article"
        practice:
          - "In hard workouts, practice switching between association (monitoring breathing, cadence, form) and dissociation (counting, music, mantras) to find what helps you push through"
          - "Monthly mental toughness workout: choose one session per month where you commit to hitting every split no matter how it feels — this is deliberate practice for race day"
          - "Journaling: after every hard workout or race, write about the mental challenges you faced and how you handled them"
        projects:
          - "Run a marathon and maintain pace through the wall (miles 18-22) using pre-practiced mental strategies"
          - "Maintain a 12-month unbroken training streak (defined as completing at least 80% of planned workouts per week)"
        tips:
          - "The wall is not purely physical — it is a mental crisis triggered by fatigue. Runners who have practiced pushing through discomfort in training handle the wall far better than those who have not."
      - level: expert
        criteria: "Mental toughness is a trained skill at the same level as physical fitness. Can access a flow state during racing. Has a meditation or mindfulness practice that supports training and recovery. Competes at the highest level available and performs at or near physical potential on race day. Views setbacks as data, not failures. Has sustained elite-level training and racing motivation for 5+ years."
        metrics:
          - "Race performance is within 1% of predicted capability based on training data (executing at full potential)"
          - "Reports accessing flow state during races at least 2 times per competitive season"
          - "Completes a meditation or mindfulness practice of 10+ minutes at least 4 times per week"
          - "Has sustained competitive racing and training for 5+ consecutive years without burnout"
          - "Rebounds from a major setback (injury, DNF, missed goal) and sets a new PR within 12 months"
        resources:
          - title: "Strength Running — The Mindset of Elite Runners"
            url: "https://marathonhandbook.com/how-to-run-a-5k/"
            type: "article"
        tips:
          - "At the expert level, the body and mind are one system — meditation, visualization, and mental rehearsal are as important as the miles in your legs"
