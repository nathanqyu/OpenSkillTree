# OpenSkillTree — Seed Skill Tree: Strength Training
#
# Domain:  Sports / Strength Sports / Strength Training
# Author:  OpenSkillTree Team (first pass)
# Version: 0.1.0
#
# Rating reference: Wilks Score for normalized strength, strengthlevel.com standards
# (based on 153M+ logged lifts), ExRx/Symmetric Strength standards
# Benchmark levels loosely map to:
#   beginner     ≈ Wilks < 200   (learning movement patterns, building base)
#   intermediate ≈ Wilks 200–300 (consistent training, building strength)
#   advanced     ≈ Wilks 300–400 (competitive strength, sophisticated programming)
#   expert       ≈ Wilks 400+    (elite strength, coaching-level knowledge; 500+ world-class)
#
# Secondary reference: NSCA CSCS framework, NASM OPT Model phases
#
# Teaching order based on NSCA exercise progression guidelines,
# Starting Strength / Practical Programming methodology, and
# NASM OPT Model corrective-to-power continuum:
#   Movement fundamentals → compound barbell lifts → core & stability →
#   accessory work → mobility & recovery → nutrition → programming &
#   periodization → conditioning → Olympic lifting foundations →
#   competition & testing.

tree:
  id: "sports/strength-training"
  title: "Strength Training"
  description: >
    A complete skill map for strength training — covering the foundational
    movement patterns, barbell lifts, programming knowledge, and competition
    skills needed to progress from untrained beginner to competitive strength
    athlete. Draws on powerlifting, general strength, and sport-science
    principles. Useful for self-directed lifters, personal trainers, and
    strength coaches building structured development programs.
  domain: "Sports"
  visibility: "public"

nodes:
  # ── FOUNDATION ──────────────────────────────────────────────────────────────
  - id: "sports/strength-training/movement-fundamentals"
    title: "Movement Fundamentals"
    description: >
      The foundation of all strength training. Starts with gym orientation:
      understanding barbell and plate types (standard 25 lb vs. Olympic 45 lb/20 kg),
      loading/unloading plates safely, using J-hooks and safety pins/straps, spotter
      communication (basic verbal cues like "it's all you" and "take it"), and gym
      etiquette (re-racking weights, wiping equipment, not curling in the squat rack).
      Then progresses to mastery of the five basic human movement patterns — squat,
      hip hinge, horizontal push, vertical pull, and loaded carry — with bodyweight
      before adding external load. Begin with the bodyweight squat (box squat if needed),
      hip hinge using a dowel along the spine (contact at head, upper back, and sacrum),
      push-up progression (wall → incline → floor → deficit), dead hang progressing to
      scapular pull-ups, and farmer carry with dumbbells. Use the Functional Movement
      Screen (FMS) or a basic overhead squat assessment to identify limitations before
      loading. Spend 2-4 weeks on bodyweight proficiency before touching a barbell.
    benchmarks:
      - level: beginner
        criteria: "Understands gym equipment (barbell types, plate loading, safety pins, J-hooks). Communicates with a spotter using standard verbal cues. Performs bodyweight squat to parallel, hip hinge with dowel maintaining 3 points of contact, push-up from floor with locked-out elbows, and dead hang. Passes basic movement screen (FMS or overhead squat assessment) without pain. Can identify the 5 fundamental patterns (squat, hinge, push, pull, carry) and name one exercise for each."
        metrics:
          - "Bodyweight squat to parallel (hip crease below knee) for 20 reps unloaded with heels flat"
          - "Holds dead hang from pull-up bar for 30 seconds with packed shoulders (active hang)"
          - "Loads and unloads a barbell safely on a squat rack with correct collar use in under 60 seconds"
          - "10 floor push-ups with chest touching the ground and full lockout at top"
          - "Hip hinge with dowel: 3 points of contact maintained for 10 reps without coaching cues"
          - "FMS composite score of 14+ (out of 21) with no asymmetries scoring 1"
        resources:
          - title: "Alan Thrall — How to Squat with Proper Form (Bodyweight to Barbell)"
            url: "https://www.youtube.com/watch?v=UFs6E3Ti1jg"
            type: "video"
          - title: "Jeff Nippard — The 5 Fundamental Movement Patterns Explained"
            url: "https://www.youtube.com/watch?v=R6gZoAzAhCg"
            type: "video"
          - title: "Starting Strength — How to Set Up a Squat Rack Safely"
            url: "https://www.youtube.com/watch?v=sXXnLstL80A"
            type: "video"
        practice:
          - "10 min: Bodyweight squat practice — 3 sets of 15, focus on depth (hip crease below knee) with heels flat"
          - "10 min: Hip hinge with dowel — 3 sets of 10, maintain contact at head, upper back, and sacrum"
          - "5 min: Push-up progression — wall push-ups if needed, incline, then floor; 3 sets of max reps at appropriate level"
          - "5 min: Dead hang practice — 3 attempts of max hold time, target 30 seconds"
        projects:
          - "Perform 20 consecutive bodyweight squats to parallel with heels flat"
          - "Hold a dead hang for 30 seconds with packed shoulders"
          - "Load and unload a barbell safely with collars in under 60 seconds"
        tips:
          - "Don't skip the bodyweight phase — spend 2-4 weeks mastering bodyweight patterns before touching a barbell; rushing to add weight on bad form builds bad habits that are hard to fix later"
          - "Learn to set up safety pins BEFORE you need them — set them at the correct height for squats and bench press so you know how to bail safely"
      - level: intermediate
        criteria: "Goblet squat with controlled tempo demonstrating full depth and upright torso, Romanian deadlift with neutral spine and hamstring stretch at bottom, overhead press with full lockout and no excessive back arch. Demonstrates bilateral and unilateral patterns without compensation. Can perform split squat, single-leg RDL, and half-kneeling press with stable positioning. Understands the difference between mobility and stability limitations."
        metrics:
          - "Goblet squat 3x10 at 25% bodyweight with 3-second eccentric and 1-second pause at bottom"
          - "Single-leg Romanian deadlift 3x8 each side without loss of balance or hip rotation"
          - "Bulgarian split squat 3x8 each leg with 20% bodyweight (goblet hold) and rear knee 1 inch from floor"
          - "Half-kneeling Pallof press 3x8 each side without torso rotation or lateral shift"
        resources:
          - title: "Jeff Nippard — Goblet Squat Technique and Progressions"
            url: "https://www.youtube.com/watch?v=CkFzgR55gho"
            type: "video"
          - title: "Alan Thrall — Romanian Deadlift Form Guide"
            url: "https://www.youtube.com/watch?v=jEy_czb3RKA"
            type: "video"
        practice:
          - "15 min: Goblet squat tempo work — 3x10 with 3-second lowering phase and 1-second pause at the bottom"
          - "10 min: Single-leg RDL balance drill — 3x8 each side with light dumbbell, focus on hip hinge without rotation"
          - "10 min: Bulgarian split squat practice — 3x8 each leg with bodyweight or light goblet hold"
        projects:
          - "Goblet squat 25% bodyweight for 3x10 with 3-second eccentric and pause at bottom"
          - "Single-leg RDL 3x8 each side without losing balance or hip rotation"
        tips:
          - "If you cannot do a single-leg RDL without losing balance, start by keeping your back toes on the ground for balance — gradually lift them as you get stronger"
          - "Understand the difference between mobility and stability: if you cannot reach a position even when assisted, it is a mobility problem; if you can reach it but cannot control it under load, it is a stability problem"
      - level: advanced
        criteria: "Moves fluidly between all patterns under moderate load (0.5-0.75x bodyweight). Can coach others through movement corrections using internal and external cueing strategies. Recognizes and corrects own compensations in real time during working sets. Understands compensatory movement patterns (e.g., knee valgus from weak glute medius, butt wink from hip anatomy vs. hamstring tightness, forward lean from ankle mobility vs. quad weakness)."
        metrics:
          - "Overhead squat with empty barbell (45 lb/20 kg) for 10 reps with full depth and upright torso"
          - "Successfully cues and corrects 5 common faults in others: knee valgus, butt wink, forward lean, elbow flare on bench, and back rounding on deadlift"
          - "Pistol squat (single-leg squat) to full depth for 3 reps each side bodyweight"
          - "Performs all 5 fundamental patterns with 0.5x bodyweight load for 5+ reps without form breakdown"
        resources:
          - title: "Stronger by Science — Understanding Compensatory Movement Patterns"
            url: "https://www.strongerbyscience.com/how-to-squat/"
            type: "article"
        tips:
          - "Use external cues over internal cues when coaching — 'push the floor away' works better than 'extend your knees' because external cues produce faster motor learning"
      - level: expert
        criteria: "Performs high-skill loaded movements (Turkish get-up, windmill, single-leg squat, L-sit) with control under significant load. Can design corrective exercise sequences for diverse populations including post-rehab athletes, seniors, and youth. Understands biomechanical principles (force vectors, moment arms, leverage) and applies them to movement coaching. Can administer and interpret FMS, SFMA, or equivalent screening systems."
        metrics:
          - "Turkish get-up with 50% bodyweight for 3 reps each side with 3-second pauses at each position"
          - "Designs individualized corrective programs based on movement screening for 5+ distinct dysfunction patterns (ankle dorsiflexion deficit, hip internal rotation deficit, thoracic extension deficit, scapular dyskinesis, core stability deficit)"
          - "Windmill with 25% bodyweight overhead for 5 reps each side with straight legs"
          - "Administers and interprets a complete FMS or SFMA screen in under 15 minutes with reliable scoring"
        resources:
          - title: "Starting Strength — Turkish Get-Up Technique and Coaching"
            url: "https://www.youtube.com/watch?v=0bWRPC49-KI"
            type: "video"
        tips:
          - "The Turkish get-up is the ultimate movement screen — if an athlete can perform it smoothly under load, they have adequate mobility, stability, and coordination for virtually any training program"
    tags: ["foundation", "movement", "screening"]

  # ── COMPOUND BARBELL LIFTS ────────────────────────────────────────────────
  - id: "sports/strength-training/compound-barbell-lifts"
    title: "Compound Barbell Lifts"
    description: >
      The core barbell movements that form the backbone of strength
      development — back squat, bench press, conventional or sumo deadlift,
      and overhead press (OHP). These four lifts recruit the most muscle mass
      and produce the greatest systemic strength adaptations. Emphasis on safe
      technique, proper bracing (big breath into the belly, brace against the
      belt or obliques, hold through the rep), appropriate grip and stance width,
      and progressive overload. Start with Starting Strength, StrongLifts 5x5,
      or GZCLP as a novice program — all use linear progression (add 5 lb/2.5 kg
      per session for upper body, 10 lb/5 kg for lower body). The four lifts
      follow the 4:3:2:1 strength ratio — Deadlift:Squat:Bench:Press = 4:3:2:1 —
      as a benchmark for balanced development. For example, a lifter pressing
      135 lb should aim for roughly 270 bench, 405 squat, and 540 deadlift over
      time. Learn bail-out techniques for every lift: dump the bar backward on
      squats (with safety pins set correctly), roll of shame on bench (or use
      safety arms), and simply dropping the deadlift. A novice linear progression
      typically stalls after 3-9 months when you can no longer add weight every
      session despite adequate sleep (7-9 hours) and nutrition (1.6-2.2 g protein
      per kg bodyweight) — this is the signal to move to intermediate programming.
      Common novice stall points for an average male are squat 225-315 lb, bench
      155-225 lb, deadlift 275-405 lb, and press 115-155 lb.
    benchmarks:
      - level: beginner
        criteria: "Performs all four lifts with acceptable technique at light-to-moderate loads. Understands safety procedures including rack setup, spotter use, and bail-out techniques for each lift. Follows a novice linear progression program (Starting Strength, StrongLifts, or GZCLP) and adds weight every session. Demonstrates proper bracing, bar path, and range of motion on all four lifts. Understands the 4:3:2:1 ratio (Deadlift:Squat:Bench:Press) as a balance target."
        metrics:
          - "Back squat 0.75x bodyweight for 5 reps with hip crease below the knee (parallel or deeper)"
          - "Bench press 0.5x bodyweight for 5 reps with bar touching chest and full lockout, controlled bar path over mid-chest"
          - "Deadlift 1.0x bodyweight for 5 reps with neutral spine from floor to lockout (hips and knees fully extended)"
          - "Overhead press 0.35x bodyweight for 5 reps with full lockout overhead and no excessive back lean"
          - "Lift ratios within 20% of the 4:3:2:1 target (Deadlift:Squat:Bench:Press)"
          - "Completes 8+ weeks of linear progression adding weight every session on all four lifts"
        resources:
          - title: "Alan Thrall — How to Squat (Complete Guide)"
            url: "https://www.youtube.com/watch?v=UFs6E3Ti1jg"
            type: "video"
          - title: "Alan Thrall — How to Bench Press (Complete Guide)"
            url: "https://www.youtube.com/watch?v=BYKScL2sgCs"
            type: "video"
          - title: "Alan Thrall — How to Deadlift (Complete Guide)"
            url: "https://www.youtube.com/watch?v=wYREQkVtvEc"
            type: "video"
          - title: "Starting Strength — The Novice Linear Progression"
            url: "https://www.youtube.com/watch?v=wqsZ7DE9fw8"
            type: "video"
        practice:
          - "60 min (3x/week): Follow a novice linear progression program (Starting Strength 3x5 or StrongLifts 5x5) exactly as written"
          - "10 min pre-session: Practice bracing technique — big belly breath, brace obliques, hold for 5 seconds, release, repeat 10 times"
          - "5 min: Film one working set per session and review form immediately after"
        projects:
          - "Complete 8 consecutive weeks of linear progression adding weight every session"
          - "Squat 0.75x bodyweight, bench 0.5x bodyweight, deadlift 1.0x bodyweight, and press 0.35x bodyweight for 5 reps each"
        tips:
          - "Don't change programs — pick Starting Strength, StrongLifts, or GZCLP and follow it exactly for at least 12 weeks; program hopping is the number one reason beginners stall"
          - "Film your lifts — you cannot see your own form; film one set per session from a side angle and compare it to coaching videos to catch issues early"
      - level: intermediate
        criteria: "Consistent technique under working loads. Has exhausted novice linear progression (can no longer add weight every session despite adequate sleep and 1.6-2.2 g/kg protein). Follows a structured intermediate program (Texas Method, 5/3/1, GZCL, or similar). Tracks all lifts in a training log. Understands cue systems for each lift (e.g., 'spread the floor' for squats, 'bend the bar' for bench, 'push the floor away' for deadlifts). Wilks score in the 200-300 range."
        metrics:
          - "Back squat 1.25-1.5x bodyweight for 1 rep"
          - "Bench press 1.0-1.25x bodyweight for 1 rep"
          - "Deadlift 1.5-1.75x bodyweight for 1 rep"
          - "Overhead press 0.65-0.8x bodyweight for 1 rep"
          - "Wilks score 200-300 (based on powerlifting total of squat + bench + deadlift)"
          - "All four lifts tracked with RPE/RIR for every working set over 12+ weeks"
        resources:
          - title: "Jeff Nippard — The Best Intermediate Strength Programs Compared"
            url: "https://www.youtube.com/watch?v=5RtVbWCX5y0"
            type: "video"
          - title: "Stronger by Science — Bench Press Guide (Form, Programming, and Sticking Points)"
            url: "https://www.strongerbyscience.com/how-to-bench/"
            type: "article"
          - title: "Starting Strength — When to Switch from Novice to Intermediate Programming"
            url: "https://www.youtube.com/watch?v=5cY9DKGwrjg"
            type: "video"
        practice:
          - "4x/week: Follow a structured intermediate program (5/3/1, Texas Method, or GZCL) with every set logged with RPE/RIR"
          - "10 min/session: Cue practice — focus on one cue per lift per session (e.g., 'spread the floor' for squats) and evaluate whether it improved your set"
          - "Weekly: Review training log for RPE trends — if RPE is drifting up on the same weight, plan a deload"
        projects:
          - "Squat 1.25x bodyweight, bench 1.0x bodyweight, and deadlift 1.5x bodyweight for 1 rep"
          - "Track every working set with RPE/RIR for 12 consecutive weeks"
        tips:
          - "Don't ego-lift at the intermediate stage — use a training max (90% of true 1RM) and leave reps in the tank on most sets; sustainable progress comes from submaximal training"
          - "Log every session including RPE — if the same weight feels harder over 2-3 weeks (RPE drift), it is time for a deload, not more volume"
      - level: advanced
        criteria: "Lifts at competitive standards with a Wilks score of 300-400. Executes each lift with minimal technical breakdown under near-maximal loads (95%+ 1RM). Understands individual leverages (limb length, torso proportions) and has made informed stance and grip adjustments — chosen between high bar vs. low bar squat, conventional vs. sumo deadlift, and competition bench grip width. Uses specialty bars (SSB, trap bar, cambered bar) for targeted development. Executes planned peaking cycles that produce PRs."
        metrics:
          - "Back squat 1.75-2.0x bodyweight for 1 rep"
          - "Bench press 1.5x bodyweight for 1 rep"
          - "Deadlift 2.0-2.5x bodyweight for 1 rep"
          - "Overhead press 1.0x bodyweight for 1 rep"
          - "Wilks score 300-400 (based on powerlifting total)"
          - "Lift ratios within 10% of the 4:3:2:1 target, indicating balanced development"
          - "Completes a 12-16 week periodized program that produces PRs on at least 2 of 4 lifts"
        resources:
          - title: "Stronger by Science — The Complete Strength Training Guide"
            url: "https://www.strongerbyscience.com/complete-strength-training-guide/"
            type: "article"
        tips:
          - "Experiment with stance and grip adjustments based on YOUR body proportions — long femurs may benefit from low bar or wider stance squats; long arms from sumo deadlift; these are individual decisions, not universal rules"
      - level: expert
        criteria: "Elite-level proficiency in all four lifts with a Wilks score of 400+ (500+ is world-class). Technique holds under maximal attempts at 98-100% 1RM. Can coach all lifts to a high standard and identify subtle form breakdowns at speed (e.g., detecting 5 degrees of knee cave or a slight bar drift on video review). Understands and applies biomechanical analysis to optimize individual technique. Has competed at regional or national level."
        metrics:
          - "Back squat 2.5x+ bodyweight for 1 rep"
          - "Bench press 2.0x+ bodyweight for 1 rep"
          - "Deadlift 2.75-3.0x+ bodyweight for 1 rep"
          - "Overhead press 1.2x+ bodyweight for 1 rep"
          - "Powerlifting total (squat + bench + deadlift) yields Wilks score 400+ (elite) or 500+ (world-class)"
          - "Lift ratios within 5% of the 4:3:2:1 target across all four lifts"
          - "Competition PRs within 2% of best gym lifts, demonstrating platform consistency"
        resources:
          - title: "Starting Strength — Coaching the Lifts at the Elite Level"
            url: "https://www.youtube.com/watch?v=rxD321l2svE"
            type: "video"
        tips:
          - "At the elite level, technique refinement never stops — film every heavy single and review it for bar path deviations measured in centimeters; small technical improvements at 95%+ 1RM translate to kilos on the total"
    tags: ["barbell", "squat", "bench", "deadlift", "measurable"]

  # ── CORE & STABILITY ──────────────────────────────────────────────────────
  - id: "sports/strength-training/core-stability"
    title: "Core & Stability Training"
    description: >
      Core stability underpins every loaded movement — the torso must
      transmit force between the lower and upper body without energy leaks.
      Covers four categories of core training: (1) anti-extension (planks, ab wheel
      rollouts, body saws), (2) anti-rotation (Pallof press, single-arm farmer carry,
      bird dogs), (3) anti-lateral flexion (suitcase carry, side plank, single-arm
      overhead press), and (4) hip flexion with neutral spine (hanging leg raises,
      dead bugs, reverse crunches). Also covers intra-abdominal bracing (Valsalva
      maneuver: big belly breath, brace obliques and abs as if about to be punched,
      hold through the rep) and loaded carry variations (farmer, suitcase, overhead,
      front rack). A weak core is the most common limiter in squat and deadlift
      progress — if your squat stalls and your back rounds before your legs give out,
      core strength is likely the bottleneck. The core also protects the spine under
      heavy load; poor bracing is the most common source of lower-back injury in
      strength training. Train core 2-4 times per week with 2-3 exercises per session,
      progressing from isometric holds to dynamic movements to loaded variations.
      Learn to use a lifting belt as a bracing tool (not a crutch): the belt provides
      a surface to brace against, amplifying intra-abdominal pressure by 20-40%.
      Introduce belt use once squat exceeds 1.0x bodyweight or deadlift exceeds 1.25x
      bodyweight.
    benchmarks:
      - level: beginner
        criteria: "Demonstrates basic bracing against a belt or hand pressure — can create and hold intra-abdominal pressure for a 5-second rep. Holds front plank and side plank for time with neutral spine (no sagging or piking). Understands the difference between bracing (pushing out against all sides of the midsection) and sucking in (drawing the navel to the spine, which reduces stability). Performs dead bugs and bird dogs with controlled opposite-limb extension and no spinal movement."
        metrics:
          - "Front plank hold for 60 seconds with neutral spine and no hip sag"
          - "Side plank hold for 45 seconds each side with hips stacked and no rotation"
          - "Dead bug 3x8 each side with arms and legs moving without any lumbar extension (back stays flat)"
          - "Farmer carry with 0.5x bodyweight total (0.25x per hand) for 30 meters with upright posture"
          - "Demonstrates Valsalva brace that resists partner's push from front, side, and back"
        resources:
          - title: "Alan Thrall — How to Brace Your Core for Heavy Lifting"
            url: "https://www.youtube.com/watch?v=PLHY2-nt-y4"
            type: "video"
          - title: "Jeff Nippard — The Best Core Exercises (Science-Based)"
            url: "https://www.youtube.com/watch?v=eLCBC6fjtQU"
            type: "video"
        practice:
          - "10 min: Front plank holds — 3 attempts of max hold, target 60 seconds with neutral spine"
          - "10 min: Dead bug drill — 3x8 each side, focus on keeping your lower back pressed flat into the floor"
          - "5 min: Bracing practice — take a big belly breath, brace your abs as if you are about to be punched, hold 5 seconds, repeat 10 times"
        projects:
          - "Hold a front plank for 60 seconds with neutral spine and no hip sag"
          - "Farmer carry 0.5x bodyweight total for 30 meters with upright posture"
        tips:
          - "Don't suck your belly in when bracing — push your abs OUT in all directions (front, sides, and back) to create intra-abdominal pressure; sucking in reduces stability"
          - "If your squat stalls and your back rounds before your legs give out, your core is the bottleneck — prioritize direct core work"
      - level: intermediate
        criteria: "Braces effectively with a belt under moderate barbell loads (squat at 1.0-1.25x BW). Performs anti-rotation exercises (Pallof press) and loaded carries with good posture under fatigue. Uses the belt correctly — positioned over the obliques, not on the hip bones, and braces out against it rather than relying on it passively. Performs hanging leg raises with control (no swinging). Core endurance sufficient to maintain brace through sets of 5 on heavy compounds."
        metrics:
          - "Pallof press 3x10 each side at 20% bodyweight cable resistance with zero torso rotation"
          - "Farmer carry with 0.75x bodyweight total for 40 meters without postural breakdown"
          - "Ab wheel rollout from knees for 3x10 with full extension and no hip sag on the return"
          - "Hanging knee raise 3x12 with controlled tempo (no kipping or swinging)"
          - "Maintains brace integrity through a set of 5 back squats at 1.25x bodyweight"
        resources:
          - title: "Jeff Nippard — Ab Wheel Rollout Progression (Beginner to Advanced)"
            url: "https://www.youtube.com/watch?v=6DUbeqa9g3M"
            type: "video"
          - title: "Stronger by Science — Belt Use and Bracing Under Load"
            url: "https://www.strongerbyscience.com/the-belt-bible/"
            type: "article"
        practice:
          - "10 min: Pallof press — 3x10 each side, focus on resisting rotation with zero torso movement"
          - "10 min: Ab wheel rollouts from knees — 3x10, control the return and avoid hip sag"
          - "10 min: Farmer carry with heavier weight — 0.75x bodyweight total for 40 meters, stay upright"
        projects:
          - "Perform ab wheel rollouts from knees for 3x10 with full extension and controlled return"
          - "Maintain brace integrity through a full set of 5 squats at 1.25x bodyweight"
        tips:
          - "Position your belt over the obliques, not on the hip bones — brace OUT against the belt rather than relying on it passively; the belt amplifies your brace, it does not replace it"
          - "Train all four core categories: anti-extension (planks, ab wheel), anti-rotation (Pallof press), anti-lateral flexion (suitcase carry), and hip flexion (hanging knee raises)"
      - level: advanced
        criteria: "Maintains brace integrity through heavy squats (1.75x+ BW) and deadlifts (2.0x+ BW) with no visible core breakdown on video review. Performs ab wheel rollout from standing — one of the most demanding anti-extension exercises. Demonstrates trunk stability under asymmetric and rotational loading. Core strength is no longer a limiting factor on any compound lift. Can perform L-sits and front levers (partial or full)."
        metrics:
          - "Standing ab wheel rollout for 5 reps with full extension and controlled return"
          - "Suitcase carry with 0.5x bodyweight single-hand for 30 meters without visible lateral lean"
          - "Hanging straight-leg raise (toes to bar) for 8 reps with controlled tempo"
          - "L-sit hold on parallettes or dip bars for 15 seconds"
          - "Maintains brace through a set of 3 deadlifts at 2.0x bodyweight with no lumbar rounding"
        resources:
          - title: "Jeff Nippard — Standing Ab Wheel Rollout Progression"
            url: "https://www.youtube.com/watch?v=uYBOBBv9GzY"
            type: "video"
        tips:
          - "The standing ab wheel rollout is the gold standard of anti-extension exercises — if you can do 5 clean reps from standing, your anti-extension core strength is no longer a limiting factor"
      - level: expert
        criteria: "Core bracing is automatic and invisible under maximal loads (2.5x+ BW squat, 3.0x+ BW deadlift). Can teach bracing and belt use to beginners through advanced lifters, diagnosing core-related weaknesses from video. Performs advanced stability work (dragon flags, heavy yoke walks, front levers). Understands and can explain the biomechanics of spinal loading (Stuart McGill's 'Big 3', moment arms on the spine, shear vs. compression forces)."
        metrics:
          - "Dragon flag for 5 controlled reps with full extension and no leg bend"
          - "Yoke walk 2x bodyweight for 15 meters without stumble or excessive forward lean"
          - "Front lever hold (full body horizontal) for 5 seconds or tuck front lever for 15 seconds"
          - "Can identify core-related technique breakdowns on video and prescribe corrective core exercises for 5+ distinct patterns (e.g., squat good-morning, deadlift rounding, bench arch collapse)"
        resources:
          - title: "Stronger by Science — Stuart McGill's Big 3 and Spinal Stability"
            url: "https://www.strongerbyscience.com/core-training/"
            type: "article"
        tips:
          - "Master Stuart McGill's Big 3 (curl-up, side plank, bird dog) as diagnostic tools — if an athlete cannot perform these pain-free, they need corrective work before heavy loading"
    tags: ["core", "stability", "bracing", "foundation"]

  # ── ACCESSORY & ISOLATION ─────────────────────────────────────────────────
  - id: "sports/strength-training/accessory-isolation"
    title: "Supporting Exercises"
    description: >
      Supplementary exercises that address weak points in the main lifts,
      build muscle in lagging areas, and reduce injury risk through balanced
      development. Organized into categories by function: (1) horizontal pull
      (barbell rows, cable rows, dumbbell rows — these balance bench press volume
      and protect shoulder health), (2) vertical pull (pull-ups, chin-ups, lat
      pulldowns — essential for lat development and deadlift lockout), (3) single-leg
      work (lunges, Bulgarian split squats, step-ups — address bilateral imbalances
      and build hip stability), (4) direct arm work (curls, tricep extensions — triceps
      support bench lockout, biceps protect the elbow under heavy pulling), (5) shoulder
      health (face pulls, band pull-aparts, lateral raises — maintain rotator cuff
      balance against heavy pressing), and (6) posterior chain (GHR, back extensions,
      hip thrusts — build the glutes and hamstrings for squat and deadlift). A key
      principle is maintaining a 1:1 or better push-to-pull volume ratio (sets of
      pushing exercises vs. sets of pulling exercises per week) to prevent shoulder
      impingement. Choose accessories based on where your main lifts break down: if
      you fail squats by pitching forward, strengthen the upper back with rows; if
      you miss bench at lockout, do close-grip bench and tricep work; if deadlifts
      stall off the floor, do deficit deadlifts and quad accessories. Use higher rep
      ranges (8-15 reps) for most accessories to drive hypertrophy with lower joint
      stress.
    benchmarks:
      - level: beginner
        criteria: "Performs basic accessory movements with controlled form through full range of motion. Understands the purpose of each exercise relative to the main lifts — can explain which main lift each accessory supports. Performs face pulls and band pull-aparts every training session for shoulder health. Follows a program with 2-4 accessory exercises per session at 3x8-12 rep ranges."
        metrics:
          - "Barbell row 0.5x bodyweight for 3x10 with chest touching the bar and controlled eccentric"
          - "Walking lunges 3x12 each leg with bodyweight only, maintaining knee tracking over toes"
          - "Face pulls 3x15-20 with external rotation at top — performed every upper body session"
          - "Lat pulldown 3x10 at 0.4x bodyweight with full stretch at top and squeeze at bottom"
          - "Dumbbell curl 3x12 at 10-15% bodyweight per hand with no swinging"
        resources:
          - title: "Jeff Nippard — Best Accessory Exercises for Beginners"
            url: "https://www.youtube.com/watch?v=R6gZoAzAhCg"
            type: "video"
          - title: "Alan Thrall — Face Pulls: The Most Important Exercise You Are Not Doing"
            url: "https://www.youtube.com/watch?v=rep-qVOkqgk"
            type: "video"
        practice:
          - "10 min: Barbell rows — 3x10 with controlled eccentric, chest touches the bar at top"
          - "5 min: Face pulls — 3x15-20 with external rotation at the top; do these EVERY upper body session"
          - "10 min: Walking lunges — 3x12 each leg bodyweight, focus on knee tracking over toes"
        projects:
          - "Perform face pulls every upper body session for 8 consecutive weeks"
          - "Barbell row 0.5x bodyweight for 3x10 with controlled form"
        tips:
          - "Do face pulls EVERY upper body session — they protect your shoulders from the wear of heavy pressing and cost almost no recovery"
          - "Use higher rep ranges (8-15 reps) for accessories — this drives muscle growth with lower joint stress than heavy sets of 3-5"
      - level: intermediate
        criteria: "Selects accessories based on identified weaknesses in the main lifts — can analyze a failed squat/bench/deadlift and choose the correct accessory to address the sticking point. Performs pull-ups and dips unassisted. Uses progressive overload on accessory movements (adds weight or reps week to week). Tracks accessory work in training log alongside main lifts. Maintains 1:1 push-to-pull volume ratio weekly."
        metrics:
          - "Strict pull-ups for 10 reps at bodyweight with chin clearing the bar and full dead hang at bottom"
          - "Parallel bar dips for 12 reps at bodyweight with full depth (upper arm parallel to floor)"
          - "Dumbbell Romanian deadlift 3x12 at 30% bodyweight per hand with 3-second eccentric and hamstring stretch at bottom"
          - "Barbell row 0.7x bodyweight for 3x8 with torso at 45 degrees or lower"
          - "Face pulls 3x15-20 with 15%+ bodyweight — performed 3-4 times per week"
          - "Tracks and maintains 1:1 or better weekly push-to-pull volume ratio (e.g., 15 sets push, 15+ sets pull)"
        resources:
          - title: "Jeff Nippard — Pull-Up Progressions (From 0 to 10 Reps)"
            url: "https://www.youtube.com/watch?v=fO3dKSQayfg"
            type: "video"
          - title: "Stronger by Science — Weak Point Training for Powerlifters"
            url: "https://www.strongerbyscience.com/weakpoint/"
            type: "article"
        practice:
          - "Pull-up progression: Band-assisted pull-ups or negatives 3x max, working toward 10 unassisted reps"
          - "Dip progression: Bench dips or assisted dips 3x max, working toward 12 unassisted parallel bar dips"
          - "Track push-to-pull ratio weekly — count all pushing and pulling sets and ensure 1:1 or better"
        projects:
          - "Perform 10 strict pull-ups at bodyweight"
          - "Maintain a 1:1 push-to-pull volume ratio for 12 consecutive weeks"
        tips:
          - "Choose accessories based on where your main lifts break down: fail squats by pitching forward? Strengthen upper back with rows. Miss bench at lockout? Do close-grip bench and tricep work"
          - "Maintain at least a 1:1 push-to-pull ratio — most lifters push too much and pull too little, leading to shoulder problems"
      - level: advanced
        criteria: "Systematically targets weak links in competition lifts using variation selection — close-grip bench for lockout weakness, pause squats for hole strength, deficit deadlifts for off-the-floor speed, pin press for mid-range bench sticking point. Uses varied rep ranges (5-8 for strength accessories, 8-12 for hypertrophy, 12-20 for pump and recovery) and tempos (3-1-1-0 for hypertrophy, 1-3-1-0 for pause work). Balances push/pull volume ratios. Programs accessories in mesocycle blocks that align with main lift goals."
        metrics:
          - "Weighted pull-ups with 25% bodyweight added for 5 reps with full range of motion"
          - "Weighted dips with 25% bodyweight added for 8 reps"
          - "Barbell row exceeds 0.75x bodyweight for 5 reps while maintaining strict horizontal torso"
          - "Bulgarian split squat 3x8 each leg at 0.5x bodyweight (barbell on back) with rear knee 1 inch from floor"
          - "Maintains 1:1 or better push-to-pull volume ratio across weekly programming with documented tracking"
          - "Can identify the sticking point in a failed lift on video and prescribe 3 appropriate accessories to address it"
        resources:
          - title: "Jeff Nippard — How to Identify and Fix Weak Points in Your Lifts"
            url: "https://www.youtube.com/watch?v=deDlhPmT2SY"
            type: "video"
        tips:
          - "Film failed attempts and analyze WHERE the lift breaks down — off the chest on bench means pec weakness (use pause bench or DB press); at lockout means triceps (use close-grip bench or board press)"
      - level: expert
        criteria: "Accessory selection is precisely matched to individual biomechanical needs based on video analysis, strength curves, and competition lift patterns. Understands EMG data and muscle activation research to inform exercise choice (e.g., selecting incline dumbbell press over flat for upper pec development based on Contreras et al. research). Can design complete accessory programs for different training phases — higher volume and variety during hypertrophy blocks, reduced and specific during peaking. Understands and applies concepts like stimulus-to-fatigue ratio, mechanical tension vs. metabolic stress, and lengthened partial training."
        metrics:
          - "Designs phase-specific accessory blocks for hypertrophy (4-6 week, 10-20 sets per muscle group per week), strength (3-4 week, competition-specific variations), and peaking (1-2 week, minimal accessories) that demonstrably improve main lift performance"
          - "Barbell row exceeds 1.0x bodyweight for 5 reps while maintaining strict horizontal torso"
          - "Weighted pull-ups with 50%+ bodyweight added for 3 reps"
          - "Can cite research-backed exercise selections for any muscle group and explain the biomechanical rationale"
        resources:
          - title: "Stronger by Science — Hypertrophy Training Guide"
            url: "https://www.strongerbyscience.com/hypertrophy-range-fact-and-fiction/"
            type: "article"
        tips:
          - "Understand the stimulus-to-fatigue ratio when selecting accessories — choose exercises that produce maximum muscle stimulus with minimum systemic fatigue; for example, a leg press creates less fatigue than a squat for equivalent quad stimulus"
    tags: ["accessory", "hypertrophy", "weak-points"]

  # ── MOBILITY & RECOVERY ───────────────────────────────────────────────────
  - id: "sports/strength-training/mobility-recovery"
    title: "Mobility & Recovery"
    description: >
      Adequate mobility enables correct positions under load; recovery
      determines how much training volume can be productively absorbed.
      The three most common mobility restrictions in lifters are: (1) ankle
      dorsiflexion (limits squat depth — test by kneeling 5 inches from a wall
      and driving the knee forward; the knee should touch), (2) hip flexion and
      external rotation (limits squat depth and sumo deadlift width — test with
      the 90/90 stretch position), and (3) thoracic extension (limits front rack,
      overhead press, and bench arch — test by lying face-down and lifting arms
      overhead). Address each with targeted drills: ankle — banded ankle
      distraction, calf raises with pause at bottom, elevated heel goblet squats;
      hip — 90/90 switches, pigeon stretch, frog stretch, Cossack squats; thoracic
      — foam roller extensions, open books, wall slides. Warm-up protocol should
      follow the RAMP model: Raise (5 min light cardio), Activate (band work for
      glutes and shoulders), Mobilize (targeted drills for that session's lifts),
      Potentiate (build-up sets). Recovery hierarchy by importance: (1) sleep 7-9
      hours per night with consistent bed/wake times, (2) nutrition — 1.6-2.2 g/kg
      protein and adequate calories, (3) stress management — chronic stress elevates
      cortisol and impairs recovery, (4) active recovery — light walking, swimming,
      or cycling on off days at conversational pace, (5) soft-tissue work — foam
      rolling and massage as needed. Chronic immobility and under-recovery are the
      two most common reasons intermediate lifters plateau.
    benchmarks:
      - level: beginner
        criteria: "Performs a structured warm-up (RAMP model) before every training session — never touches a barbell cold. Understands the difference between mobility (active range of motion under control) and flexibility (passive range of motion). Achieves minimum positions for safe barbell training: squat to parallel with heels flat, arms overhead without rib flare, hip hinge with neutral spine. Identifies own primary mobility limitation (ankle, hip, or thoracic) and performs 1-2 targeted drills daily."
        metrics:
          - "Overhead squat assessment passes with arms at ear level and heels on ground (no heel rise)"
          - "Sleeps 7+ hours per night on training days, tracked for 4+ consecutive weeks"
          - "Ankle dorsiflexion test: knee touches wall from 5 inches (12.7 cm) on both sides"
          - "Performs a structured 10-minute warm-up before every training session for 8+ consecutive weeks"
          - "Can name own primary mobility limitation and demonstrate 2 drills to address it"
        resources:
          - title: "Alan Thrall — The Only Warm-Up You Need Before Lifting"
            url: "https://www.youtube.com/watch?v=BH11j4kSQ8E"
            type: "video"
          - title: "Jeff Nippard — Mobility for Lifters: The 3 Tests You Need"
            url: "https://www.youtube.com/watch?v=E81GN-3A8XM"
            type: "video"
        practice:
          - "10 min before every session: RAMP warm-up — 5 min light cardio, 2 min band activation (glutes, shoulders), 3 min targeted mobility for that session's lifts"
          - "5 min daily: Ankle dorsiflexion drill — banded ankle distraction, 2 min each side"
          - "5 min daily: Hip 90/90 stretch — hold 60 seconds each side"
        projects:
          - "Perform a structured 10-minute warm-up before every training session for 8 consecutive weeks"
          - "Pass the ankle dorsiflexion test (knee touches wall from 5 inches) on both sides"
        tips:
          - "Never touch a barbell cold — always warm up with the RAMP protocol; cold muscles and joints under load is the fastest path to injury"
          - "Identify YOUR primary limitation (ankle, hip, or thoracic) and do 5 minutes of targeted drills for it EVERY DAY, not just on training days"
      - level: intermediate
        criteria: "Uses targeted mobility drills for individual limitations (hip, ankle, thoracic spine) with measurable progress tracked over time. Implements a post-training recovery routine including static stretching (held 60-120 seconds per position) and foam rolling of trained muscle groups. Tracks sleep quality and adjusts training load based on recovery markers (subjective rating, HRV if available, morning bodyweight trends). Understands when to use heel-elevated shoes vs. working on ankle mobility. Performs soft-tissue work on quads, adductors, lats, and pecs using foam roller or lacrosse ball."
        metrics:
          - "Full-depth overhead squat with 45 lb/20 kg barbell without heel elevation"
          - "Consistently logs 7-9 hours sleep with subjective recovery rating above 7/10 on training days"
          - "Ankle dorsiflexion test: knee touches wall from 6+ inches (15 cm) on both sides"
          - "Hip 90/90 position held for 60 seconds each side with torso upright and both knees at 90 degrees"
          - "Adjusts training intensity or volume on at least 2 occasions per 12-week block based on recovery data"
        resources:
          - title: "Jeff Nippard — Sleep and Recovery for Lifters (Evidence-Based)"
            url: "https://www.youtube.com/watch?v=tP-yJL0t9l8"
            type: "video"
          - title: "Stronger by Science — Recovery: The Most Underrated Variable"
            url: "https://www.strongerbyscience.com/grow-like-a-new-lifter-again/"
            type: "article"
        practice:
          - "Daily: Track sleep hours and subjective recovery rating (1-10) in your training log"
          - "Post-training: 10 min static stretching of trained muscle groups (hold each position 60-120 seconds)"
          - "2x/week: Foam rolling of quads, adductors, lats, and pecs — 2 min per area"
        projects:
          - "Log 7-9 hours of sleep with recovery rating above 7/10 on training days for 8 consecutive weeks"
          - "Pass the ankle dorsiflexion test from 6+ inches on both sides"
        tips:
          - "Sleep is the number one recovery tool — 7-9 hours per night with consistent bed/wake times beats every supplement, foam roller, and recovery gadget combined"
          - "Use heel-elevated shoes as a BRIDGE while you work on ankle mobility, not as a permanent crutch — continue doing ankle dorsiflexion work even if you lift in elevated shoes"
      - level: advanced
        criteria: "Maintains mobility under heavy training loads (1.75x+ BW squat, 2.0x+ BW deadlift) without mobility degrading as training stress increases. Uses self-myofascial release, banded distraction, and PNF stretching (contract-relax method) systematically. Periodizes recovery work alongside training phases — more recovery work during high-volume accumulation blocks, less during peaking. Manages training through minor aches without worsening them. Understands the difference between pain and discomfort and adjusts training accordingly."
        metrics:
          - "Maintains full squat depth and overhead position across an entire 12-16 week training block without regression"
          - "Zero training sessions missed due to preventable soft-tissue issues per 12-week block"
          - "Demonstrates PNF stretching protocol for hip flexors, hamstrings, and shoulders"
          - "Successfully auto-regulates training around minor aches — modifies exercises rather than skipping sessions (e.g., switching to SSB squat during a shoulder flare-up)"
          - "Completes every warm-up in under 15 minutes while addressing all relevant mobility demands"
        resources:
          - title: "Stronger by Science — Managing Training Around Pain"
            url: "https://www.strongerbyscience.com/pain-in-training/"
            type: "article"
        tips:
          - "Modify exercises around minor aches instead of skipping sessions entirely — a shoulder flare-up means switching to SSB squats instead of back squats, not taking a week off"
      - level: expert
        criteria: "Designs mobility and recovery programs for others based on individual assessment. Understands pain science (the biopsychosocial model — pain is not a reliable indicator of tissue damage, fear avoidance, graded exposure) and knows when to refer to medical professionals (red flags: unexplained weight loss, night pain, neurological symptoms, trauma). Integrates active recovery, deload protocols (planned every 4-6 weeks; reduced volume by 40-60%, maintain intensity), and lifestyle factors (sleep hygiene, stress management, work schedule) into a comprehensive system."
        metrics:
          - "Designs individualized mobility protocols that measurably improve squat depth or deadlift start position within 4 weeks for 5+ clients, verified by video comparison"
          - "Maintains injury-free training across 2+ consecutive years of high-volume programming (16+ sets per muscle group per week)"
          - "Can correctly identify 3+ red-flag symptoms that require medical referral vs. training modification"
          - "Designs deload protocols for athletes at different training levels that preserve performance while allowing recovery"
        resources:
          - title: "Stronger by Science — Pain Science for Strength Athletes"
            url: "https://www.strongerbyscience.com/pain-science/"
            type: "article"
        tips:
          - "Learn pain science: pain is not a reliable indicator of tissue damage; fear avoidance and catastrophizing are bigger obstacles to recovery than the injury itself in most cases"
    tags: ["mobility", "recovery", "injury-prevention", "longevity"]

  # ── NUTRITION ─────────────────────────────────────────────────────────────
  - id: "sports/strength-training/nutrition"
    title: "Nutrition for Strength"
    description: >
      Nutrition provides the raw materials for muscle repair, energy for
      training, and the caloric environment for body composition goals.
      Without adequate nutrition, strength progress stalls regardless of
      programming quality — you cannot out-train a bad diet. The hierarchy
      of nutritional priorities for strength: (1) total calories — a surplus
      of 250-500 kcal/day above maintenance supports muscle gain; maintenance
      or slight deficit for body recomposition; deficit of 500-750 kcal/day for
      fat loss (lose no more than 0.5-1% bodyweight per week to preserve muscle),
      (2) protein — the single most important macronutrient; target 1.6-2.2 g per
      kg bodyweight daily, spread across 3-5 meals with 0.3-0.5 g/kg per meal
      for optimal muscle protein synthesis; good sources include chicken breast
      (31 g/100 g), Greek yogurt (10 g/100 g), eggs (6 g each), whey protein
      (25 g/scoop), and lean beef (26 g/100 g), (3) carbohydrates — fuel for
      training; 3-5 g/kg/day for moderate training, 5-7 g/kg/day during high-volume
      blocks; prioritize around training (60-90 min before and within 2 hours after),
      (4) fats — minimum 0.5 g/kg/day for hormonal health; do not go below 20% of
      total calories, (5) hydration — minimum 0.5 oz per pound bodyweight daily;
      more during training (16-24 oz per hour of training). Evidence-based supplements
      with strong research support: creatine monohydrate (5 g daily, no loading needed,
      the most studied supplement in history), caffeine (3-6 mg/kg 30-60 min pre-training
      for performance), and vitamin D (1000-5000 IU daily if blood levels are below
      30 ng/mL). Everything else (BCAAs, glutamine, testosterone boosters, fat burners)
      has weak or no evidence for trained individuals already eating adequate protein.
    benchmarks:
      - level: beginner
        criteria: "Tracks daily caloric intake and consistently hits a protein target of 1.6 g/kg bodyweight. Understands the relationship between caloric balance and body composition (surplus = gain weight, deficit = lose weight, protein preserves muscle in both). Eats a meal containing 30-50 g protein within 2 hours of training. Can identify protein content of common foods without looking it up (within 20% accuracy). Uses a food scale and tracking app (MyFitnessPal, MacroFactor, or similar) for at least the first 4 weeks to calibrate portion awareness."
        metrics:
          - "Consistently consumes 1.6-2.2 g protein per kg bodyweight daily for 4+ consecutive weeks, verified by food log"
          - "Tracks calories accurately within 10% of actual intake for 7 consecutive days (verified by comparing estimated vs. weighed portions)"
          - "Correctly estimates protein content of 10 common foods (chicken breast, eggs, Greek yogurt, milk, rice, oats, beef, whey, beans, tofu) within 20% accuracy"
          - "Drinks minimum 0.5 oz water per pound bodyweight daily, tracked for 2+ weeks"
          - "Eats a meal with 30-50 g protein and 40-60 g carbohydrates within 2 hours post-training"
        resources:
          - title: "Jeff Nippard — The Complete Nutrition Guide for Lifters"
            url: "https://www.youtube.com/watch?v=OqRvmJ2eyBA"
            type: "video"
          - title: "Stronger by Science — How Much Protein Do You Need?"
            url: "https://www.strongerbyscience.com/reflecting-on-five-years/"
            type: "article"
        practice:
          - "Week 1-2: Track all food with MyFitnessPal or MacroFactor for 14 consecutive days to calibrate portion awareness"
          - "Daily: Hit protein target of 1.6-2.2 g/kg bodyweight — plan meals around protein sources first, then fill in carbs and fats"
          - "Post-training: Eat a meal containing 30-50 g protein within 2 hours of finishing"
        projects:
          - "Track protein intake daily for 4 consecutive weeks and hit 1.6-2.2 g/kg bodyweight on 90%+ of days"
          - "Correctly estimate protein content of 10 common foods within 20% accuracy without looking them up"
        tips:
          - "Don't overthink nutrition at the beginner level — the single most important thing is getting enough protein (1.6-2.2 g/kg bodyweight); everything else is secondary"
          - "Use a food scale for the first 2-4 weeks to learn what portions actually look like — most people drastically underestimate calorie intake"
      - level: intermediate
        criteria: "Adjusts calories based on training phase — surplus of 250-500 kcal/day during hypertrophy/growth blocks, maintenance during strength blocks, slight deficit during cuts. Uses creatine monohydrate (5 g daily) consistently. Times carbohydrate intake around training (largest carb meals pre- and post-workout). Understands macronutrient ratios and adjusts carbs and fats based on training demands while keeping protein constant at 1.6-2.2 g/kg. Can prepare 5+ high-protein meals without a recipe."
        metrics:
          - "Manages body composition within 5% bodyweight range across a 12-week training block while maintaining or improving lifts"
          - "Consumes 5 g creatine monohydrate daily for 8+ consecutive weeks without missing days"
          - "Hits protein target of 1.6-2.2 g/kg daily with 90%+ compliance over a 12-week block"
          - "Carbohydrate intake of 3-5 g/kg/day during training phases, with 40%+ of daily carbs consumed within the peri-workout window (2 hours before through 2 hours after)"
          - "Caffeine usage at 3-6 mg/kg pre-training on heavy sessions with no use within 8 hours of bedtime"
        resources:
          - title: "Jeff Nippard — Creatine: Everything You Need to Know"
            url: "https://www.youtube.com/watch?v=Z9mlsyV7Hek"
            type: "video"
          - title: "Stronger by Science — The Science of Nutrition for Strength"
            url: "https://www.strongerbyscience.com/nutrition/"
            type: "article"
        practice:
          - "Daily: Take 5 g creatine monohydrate — no loading phase needed, just consistency"
          - "Weekly: Meal prep 5+ high-protein meals for the week to ensure consistent intake"
          - "Training days: Time largest carb meals within 2 hours before and after training"
        projects:
          - "Take 5 g creatine monohydrate daily for 8 consecutive weeks without missing a day"
          - "Manage body composition within 5% bodyweight range across a 12-week training block while maintaining or improving lifts"
        tips:
          - "Creatine monohydrate is the most researched supplement in history with overwhelming evidence of benefit — take 5 g daily, every day, with no loading phase or cycling needed"
          - "Avoid caffeine within 8 hours of bedtime — caffeine has a 5-6 hour half-life and even if you fall asleep, it reduces sleep quality and therefore recovery"
      - level: advanced
        criteria: "Periodizes nutrition alongside training blocks — higher calories and carbs during high-volume accumulation phases, controlled deficit during weight cuts, precise macro targets during peaking. Executes successful weight cuts for competition (3-5% bodyweight over 8-12 weeks for a chronic cut, or 2-3% water cut in the final 24 hours for a 24-hour weigh-in) without significant strength loss. Understands supplement research hierarchy and distinguishes evidence-based (creatine, caffeine, vitamin D) from marketing claims (BCAAs for trained individuals, testosterone boosters, fat burners). Can calculate maintenance calories from bodyweight trends and adjust dynamically."
        metrics:
          - "Completes a weight cut of 3-5% bodyweight over 8-12 weeks for competition while retaining 95%+ of peak strength on all three lifts"
          - "Correctly identifies evidence tier (strong, moderate, weak, none) for 10 common supplements: creatine, caffeine, vitamin D, whey protein, BCAAs, glutamine, ZMA, beta-alanine, citrulline, ashwagandha"
          - "Calculates own maintenance calories within 5% accuracy using 3-week bodyweight and intake data"
          - "Protein intake never drops below 2.0 g/kg even during a caloric deficit"
          - "Successfully refeeds after competition: regains competition-day bodyweight within 48 hours through strategic carbohydrate and sodium loading"
        resources:
          - title: "Stronger by Science — Evidence-Based Supplement Guide"
            url: "https://www.strongerbyscience.com/supplement-guide/"
            type: "article"
        tips:
          - "During a weight cut, never drop protein below 2.0 g/kg — reduce calories from carbs and fats first; protein preserves muscle mass during a deficit"
      - level: expert
        criteria: "Designs nutrition plans for athletes across weight classes and training phases with precise macro targets for each phase. Understands metabolic adaptation (metabolic rate decreases during prolonged dieting beyond what bodyweight loss predicts) and implements reverse dieting protocols (gradually increasing calories by 100-200 kcal/week after a cut to restore metabolic rate while minimizing fat regain). Can manage water and sodium manipulation for weigh-in sports (water loading at 8-10 L/day for 3 days, then cutting to 0.5 L the day before weigh-in, while reducing sodium from 5+ g/day to near zero). Understands nutrient periodization research and applies it to competition prep."
        metrics:
          - "Designs and executes a full meet-prep nutrition plan including 8-12 week chronic cut, 24-hour water cut, and post-weigh-in refeed that results in competition bodyweight within 0.5 kg of target class limit"
          - "Maintains or improves body composition across a full competitive season of 3+ meets spanning 6+ months"
          - "Successfully implements reverse diet for 3+ athletes post-competition, restoring maintenance calories within 10% of pre-diet levels while keeping bodyweight within 3% of competition weight"
          - "Designs phase-specific nutrition plans with distinct macro targets for accumulation (surplus), intensification (maintenance), and peaking (slight deficit or maintenance) phases"
        resources:
          - title: "Jeff Nippard — Reverse Dieting: The Science and Practice"
            url: "https://www.youtube.com/watch?v=1zm2YtZnAy8"
            type: "video"
        tips:
          - "After a competition cut, reverse diet by adding 100-200 kcal/week back to gradually restore metabolic rate — jumping straight to pre-diet calories causes rapid fat regain"
    tags: ["nutrition", "protein", "body-composition", "supplements"]

  # ── PROGRAMMING & PERIODIZATION ───────────────────────────────────────────
  - id: "sports/strength-training/programming-periodization"
    title: "Training Program Design"
    description: >
      The systematic planning of training variables — volume, intensity,
      frequency, exercise selection, and rest periods — across time to
      produce continuous adaptation. Programming knowledge is the single
      biggest differentiator between lifters who plateau and those who
      progress long-term. The progression of programming complexity mirrors
      training advancement: (1) Novice linear progression (3-9 months) — add
      weight every session; programs like Starting Strength (3x5), StrongLifts
      (5x5), or GZCLP; train 3 days/week; add 5 lb/2.5 kg upper body and
      10 lb/5 kg lower body per session; typical stall points for average males
      are squat 225-315 lb, bench 155-225 lb, deadlift 275-405 lb, press
      115-155 lb. (2) Intermediate periodization (1-3 years) — weekly progress
      using Texas Method (volume/recovery/intensity days), 5/3/1 (monthly
      progression with submaximal training maxes), or daily undulating
      periodization (DUP — alternate hypertrophy, strength, and power days);
      understand volume landmarks from Dr. Mike Israetel: MV (maintenance
      volume, ~6-8 sets/muscle/week), MEV (minimum effective volume, ~8-12),
      MAV (maximum adaptive volume, ~12-20), MRV (maximum recoverable volume,
      ~20-25). (3) Advanced block periodization (3+ years) — accumulation
      blocks (high volume, moderate intensity, 4-6 weeks), transmutation
      blocks (moderate volume, high intensity, 3-4 weeks), and realization/
      peaking blocks (low volume, maximal intensity, 1-2 weeks). Key concepts:
      RPE (Rate of Perceived Exertion, Borg CR-10 scale: RPE 7 = ~3 reps in
      reserve, RPE 8 = ~2 reps in reserve, RPE 9 = ~1 rep, RPE 10 = max
      effort), RIR (Reps in Reserve — direct count), percentage-based training
      (working off a training max, typically 90% of true 1RM), and autoregulation
      (adjusting daily load based on performance and fatigue). Deload every 4-6
      weeks by reducing volume 40-60% while maintaining intensity.
    benchmarks:
      - level: beginner
        criteria: "Follows a structured novice linear progression program (Starting Strength, StrongLifts, or GZCLP) consistently for 12+ weeks. Understands sets, reps, RPE/RIR, and progressive overload (adding weight every session). Logs every training session with exercise, sets, reps, and weight. Understands the difference between volume (sets x reps), intensity (percentage of 1RM or RPE), and frequency (sessions per week per lift). Adds weight according to program protocol without skipping sessions or freelancing."
        metrics:
          - "Completes 12 consecutive weeks of a linear progression program with every session logged (exercise, weight, sets, reps)"
          - "Correctly defines and applies RPE or RIR to working sets within 1 point of accuracy on 80%+ of sets"
          - "Adds weight every session according to program protocol: 5 lb upper body, 10 lb lower body (or 2.5 kg/5 kg)"
          - "Reaches novice stall points (squat 225+ lb, bench 155+ lb, deadlift 275+ lb, press 115+ lb for average male) before transitioning to intermediate programming"
          - "Can explain why they chose their program and what they would switch to when linear progression stalls"
        resources:
          - title: "Starting Strength — How to Run the Novice Linear Progression"
            url: "https://www.youtube.com/watch?v=YfOI8BdrntQ"
            type: "video"
          - title: "Jeff Nippard — RPE Training Explained (How to Use It)"
            url: "https://www.youtube.com/watch?v=deDlhPmT2SY"
            type: "video"
        practice:
          - "Every session: Log exercise, sets, reps, weight, and RPE for every working set"
          - "Every session: Add weight according to program protocol — 5 lb upper body, 10 lb lower body"
          - "Weekly: Review training log to confirm weights are going up on all four lifts"
        projects:
          - "Complete 12 consecutive weeks of a linear progression program with every session logged"
          - "Reach novice stall points before transitioning to intermediate programming"
        tips:
          - "Follow the program EXACTLY as written — do not add exercises, change rep schemes, or skip sessions; the novice linear progression works if you do not modify it"
          - "Learn RPE early: RPE 7 means 3 reps left in the tank, RPE 8 means 2, RPE 9 means 1, RPE 10 means max; practice rating your sets to build this skill"
      - level: intermediate
        criteria: "Designs or selects an intermediate program with weekly or daily undulation (Texas Method, 5/3/1, GZCL, DUP, or similar). Understands volume landmarks: MV (maintenance volume: ~6-8 sets/muscle/week), MEV (minimum effective volume: ~8-12), MAV (maximum adaptive volume: ~12-20), MRV (maximum recoverable volume: ~20-25). Implements planned deloads every 4-6 weeks (reduce volume 40-60%, maintain intensity at 85-90% of working loads). Uses a training max (90% of true 1RM) for percentage-based programming. Trains each main lift 2x/week with at least one variation day. Wilks score progresses through the 200-300 range."
        metrics:
          - "Completes a 16-week intermediate program including 2+ planned deloads with continued progress (PR on at least 1 lift)"
          - "Adjusts training volume based on fatigue indicators: RPE drift (same weight feels harder across a block), sleep quality drop, elevated resting heart rate, or persistent joint soreness"
          - "Correctly identifies own MEV and MAV for major muscle groups based on 2+ training blocks of data"
          - "Deloads proactively (scheduled) rather than reactively (forced by injury or burnout) for 80%+ of deload weeks"
          - "Uses a training max set at 90% of true 1RM and progresses it based on performance, not ego"
        resources:
          - title: "Jeff Nippard — 5/3/1 Program Explained (Jim Wendler's Method)"
            url: "https://www.youtube.com/watch?v=DVjLwzMAJSM"
            type: "video"
          - title: "Stronger by Science — Volume Landmarks and Training Volume"
            url: "https://www.strongerbyscience.com/the-new-approach-to-training-volume/"
            type: "article"
        practice:
          - "Every 4-6 weeks: Plan and execute a deload week (reduce volume 40-60%, maintain intensity at 85-90%)"
          - "Monthly: Assess own MEV and MAV for major muscle groups based on training log data"
          - "Daily: Rate RPE on every working set and compare to planned RPE — recalibrate if consistently off by more than 1 point"
        projects:
          - "Complete a 16-week intermediate program with 2+ planned deloads and PR on at least 1 lift"
          - "Identify own MEV and MAV for major muscle groups based on 2+ training blocks of data"
        tips:
          - "Deload PROACTIVELY every 4-6 weeks rather than waiting until you feel terrible — scheduled deloads prevent burnout and injury"
          - "Understand volume landmarks: MV (~6-8 sets/muscle/week) maintains, MEV (~8-12) starts growth, MAV (~12-20) is the sweet spot, MRV (~20-25) is the most you can recover from"
      - level: advanced
        criteria: "Designs block-periodized programs with accumulation (high volume 12-20 sets/muscle/week, moderate intensity 65-75% 1RM, 4-6 weeks), transmutation (moderate volume 8-12 sets, high intensity 80-90% 1RM, 3-4 weeks), and realization/peaking phases (low volume 4-6 sets, maximal intensity 90-100% 1RM, 1-2 weeks). Manages multiple training variables simultaneously across 3-4 training days/week. Understands and can implement multiple periodization models: linear, undulating (daily and weekly), block, and conjugate (Westside). Familiar with established methodologies: Sheiko (high frequency, submaximal volume), RTS (RPE-based autoregulation), Juggernaut (wave loading), and Westside (max effort + dynamic effort). Wilks score progresses through the 300-400 range."
        metrics:
          - "Designs and executes a 12-16 week peaking program that produces a competition PR on total (squat + bench + deadlift)"
          - "Explains the theoretical basis and practical implementation of 3+ periodization models (e.g., linear, DUP, block, conjugate) including when each is most appropriate"
          - "Manages training stress across a block using objective markers (bar speed, RPE accuracy, volume load trends) and makes mid-block adjustments"
          - "Successfully transitions between accumulation, transmutation, and realization phases with appropriate volume and intensity changes"
          - "Programs for 2+ training days per lift with distinct purposes (e.g., heavy singles day + volume back-off day for squat)"
        resources:
          - title: "Stronger by Science — Block Periodization for Strength Athletes"
            url: "https://www.strongerbyscience.com/block-periodization/"
            type: "article"
        tips:
          - "During peaking, reduce volume but maintain intensity — the mistake most lifters make is dropping both; keep singles at 90-95% while cutting total sets by 40-60%"
      - level: expert
        criteria: "Creates individualized programs for athletes at all levels from novice through elite. Adjusts programming in real time based on autoregulation data (RPE, bar velocity, HRV, wellness questionnaires). Understands and applies current sport-science research to program design — reads and interprets primary literature from JSCR, EJSS, and Sports Medicine. Has a documented coaching track record with multiple athletes. Can design programs for special populations (masters lifters, post-rehab athletes, weight-class athletes cutting weight). Wilks score of athletes coached reaches 400+ level."
        metrics:
          - "Coaches 5+ athletes through successful peaking cycles with 80%+ achieving competition PRs on total"
          - "Publishes or presents original programming methodology with documented athlete outcomes (n=10+)"
          - "Athletes coached achieve Wilks scores of 300+ (intermediate), 400+ (advanced), or improve by 20+ Wilks points over a training year"
          - "Designs programs across 3+ distinct athlete profiles (novice, intermediate, advanced) with documented rationale for all programming decisions"
          - "Adjusts programming mid-cycle based on velocity-based training data or autoregulation metrics with documented outcomes"
        resources:
          - title: "Stronger by Science — Autoregulation and VBT in Programming"
            url: "https://www.strongerbyscience.com/autoregulation/"
            type: "article"
        tips:
          - "Read primary literature from JSCR and Sports Medicine to stay current — the field evolves rapidly and popular sources often lag behind research by 3-5 years"
    tags: ["programming", "periodization", "coaching", "cognitive"]

  # ── CONDITIONING ──────────────────────────────────────────────────────────
  - id: "sports/strength-training/conditioning"
    title: "Conditioning & Work Capacity"
    description: >
      General physical preparedness (GPP) and cardiovascular fitness support
      recovery between sets, enable higher training volumes, and improve
      overall health. Conditioning must be dosed carefully to avoid
      interfering with strength adaptations — this is called the interference
      effect (concurrent training research shows excessive cardio volume or
      high-impact cardio can reduce strength and hypertrophy gains). The best
      conditioning modalities for strength athletes are low-impact options that
      do not create additional eccentric muscle damage: (1) LISS (Low-Intensity
      Steady-State) — walking (incline treadmill, outdoor), cycling (stationary
      or outdoor), swimming, or elliptical at conversational pace (heart rate
      120-140 bpm or 60-70% max HR) for 20-40 minutes, 2-4 sessions/week; this
      is the foundation and should comprise 80% of conditioning work, (2) sled
      work — sled pushes, sled drags, and sled pulls are ideal because they are
      concentric-only (no eccentric component), meaning minimal muscle soreness;
      use for conditioning intervals (e.g., 40-meter pushes with 1-2 min rest) or
      steady-state drags, (3) loaded carries — farmer walks, yoke carries, and
      sandbag carries build conditioning and core stability simultaneously, (4) HIIT
      — high-intensity interval training using the assault bike, rower, or ski erg;
      limit to 1-2 sessions/week and separate from heavy training days by 6+ hours
      or place on light training days. Avoid running as primary conditioning for
      strength athletes — the eccentric impact creates additional recovery demands.
      Monitor conditioning's impact on strength: if main lifts are regressing or RPE
      is drifting upward on the same weights, reduce conditioning volume first.
    benchmarks:
      - level: beginner
        criteria: "Performs 2-3 sessions of low-intensity cardio per week (walking, cycling, or elliptical at conversational pace, HR 120-140 bpm) without impacting strength training. Recovers between heavy compound sets within 3-5 minutes (heart rate drops below 120 bpm). Understands that conditioning supports strength training recovery rather than replacing it. Does not perform HIIT on the same day as heavy squats or deadlifts."
        metrics:
          - "Completes 30 minutes of walking or cycling at conversational pace (HR 120-140 bpm) 3x per week for 8+ consecutive weeks"
          - "Resting heart rate below 80 bpm measured first thing in the morning"
          - "Heart rate recovers to below 120 bpm within 3 minutes after a set of 5 squats at 0.75x bodyweight"
          - "Can sustain 20 minutes of continuous activity (walking, cycling) without stopping, at 60-70% max heart rate"
          - "No reduction in main lift progression (still adding weight per session) despite adding conditioning"
        resources:
          - title: "Alan Thrall — Cardio for Strength Athletes (What, When, and How Much)"
            url: "https://www.youtube.com/watch?v=su80oUpZxh8"
            type: "video"
          - title: "Jeff Nippard — The Truth About Cardio and Gaining Muscle"
            url: "https://www.youtube.com/watch?v=3Y2vxKsaK9A"
            type: "video"
        practice:
          - "3x/week: 30 minutes of walking or cycling at conversational pace (HR 120-140 bpm)"
          - "After each lifting session: 10-15 minutes of walking as active recovery"
          - "Weekly: Check resting heart rate first thing in the morning to track cardiovascular health"
        projects:
          - "Complete 30 minutes of walking or cycling at conversational pace 3x/week for 8 consecutive weeks"
          - "Achieve a resting heart rate below 80 bpm while maintaining strength progression"
        tips:
          - "Walking is the best conditioning for beginners — it builds cardiovascular health without interfering with strength gains; just walk 30 minutes 3 times a week"
          - "Do NOT run as your primary conditioning — the eccentric impact creates additional recovery demands that can slow your strength progress; use walking, cycling, or elliptical instead"
      - level: intermediate
        criteria: "Incorporates structured conditioning that supports training without causing excessive fatigue or interference with strength gains. Uses sled work and loaded carries as primary conditioning tools (concentric-only, low eccentric damage). Manages the interference effect by separating HIIT from heavy training by 6+ hours and keeping HIIT to 1-2 sessions/week maximum. Monitors resting heart rate trends weekly to assess recovery. Performs conditioning on light training days or separate sessions."
        metrics:
          - "Sled push 1x bodyweight for 40 meters in under 30 seconds"
          - "Resting heart rate below 70 bpm while maintaining strength progression on all four main lifts"
          - "Sled drag 0.75x bodyweight for 10 minutes continuously without stopping"
          - "Assault bike or rower intervals: 8 rounds of 20 seconds all-out / 40 seconds rest"
          - "Completes 3 conditioning sessions per week for 12+ weeks without any reduction in main lift working weights"
        resources:
          - title: "Stronger by Science — Concurrent Training: Cardio and Strength"
            url: "https://www.strongerbyscience.com/concurrent-training/"
            type: "article"
          - title: "Alan Thrall — Sled Work for Strength Athletes"
            url: "https://www.youtube.com/watch?v=yi5zarQFyn0"
            type: "video"
        practice:
          - "2x/week: Sled pushes — 40 meters at 1x bodyweight, 6 rounds with 90 seconds rest"
          - "1x/week: HIIT on assault bike or rower — 8 rounds of 20 seconds all-out / 40 seconds rest"
          - "Monitor: If main lift RPE drifts up by 1+ point on the same weight, reduce conditioning volume first"
        projects:
          - "Sled push 1x bodyweight for 40 meters in under 30 seconds"
          - "Complete 3 conditioning sessions per week for 12 weeks without any reduction in main lift working weights"
        tips:
          - "Sled work is ideal for strength athletes because it is concentric-only — no eccentric component means minimal muscle soreness and faster recovery compared to running"
          - "Separate HIIT from heavy training by 6+ hours — doing HIIT and heavy squats in the same session will compromise both"
      - level: advanced
        criteria: "Periodizes conditioning alongside strength training phases — higher conditioning volume during accumulation (GPP) blocks, reduced during peaking. High work capacity enables completion of high-volume training blocks (20+ working sets per session) without excessive fatigue carrying into the next session. Performs strongman conditioning events (tire flip, atlas stone, sandbag carry, prowler push) competently. Can complete a high-volume squat session with short rest periods due to superior cardiovascular fitness."
        metrics:
          - "Completes a 10-set squat session (sets of 5 at 75% 1RM) with all sets within RPE 7-8 and rest periods under 3 minutes"
          - "Tire flip (3x+ bodyweight tire) for 10 flips, atlas stone load to 48-inch platform at 0.75x bodyweight, or sandbag carry at 1x bodyweight for 50 meters — performed for conditioning without technique breakdown"
          - "Resting heart rate below 65 bpm while training at Wilks 300+ strength levels"
          - "Prowler push: 1.5x bodyweight for 6 x 40-meter sprints with 90-second rest"
          - "Conditioning volume adjusted across training phases: 4 sessions/week during GPP, 2 sessions/week during peaking"
        resources:
          - title: "Stronger by Science — GPP and Conditioning for Powerlifters"
            url: "https://www.strongerbyscience.com/conditioning/"
            type: "article"
        tips:
          - "Periodize conditioning alongside strength — higher volume during GPP/accumulation blocks, reduced during peaking; if you maintain the same conditioning volume year-round, it will interfere during intensity phases"
      - level: expert
        criteria: "Conditioning supports elite training volumes (25+ sets per session) and competition schedules (multiple meets per year). Designs conditioning programs for strength athletes at all levels that improve recovery and work capacity without compromising maximal strength. Demonstrates exceptional work capacity — can sustain high-quality training across 5-6 sessions per week. Understands concurrent training research and applies it to program design. Resting heart rate remains in the athletic range despite prioritizing strength over cardiovascular fitness."
        metrics:
          - "Maintains resting heart rate below 60 bpm alongside Wilks 400+ strength levels"
          - "Completes a full competition day (9 attempts across 3 lifts over 6-8 hours) without performance degradation from fatigue (third attempt quality matches first attempt quality)"
          - "Designs conditioning programs for 5+ strength athletes that demonstrably improve work capacity (measured by session completion quality) without reducing main lift performance"
          - "Sustains 5-6 training sessions per week across a 16-week block with no missed sessions due to fatigue or under-recovery"
          - "Heart rate recovery: drops from 170+ bpm to below 120 bpm within 60 seconds after an all-out 30-second effort"
        resources:
          - title: "Jeff Nippard — Work Capacity for Strength Athletes"
            url: "https://www.youtube.com/watch?v=OPEDjl88P-4"
            type: "video"
        tips:
          - "Elite work capacity means your cardiovascular system supports high-volume training without compromising strength — if you can complete a 10-set squat session at 75% 1RM with 3-minute rests and all sets under RPE 8, your conditioning is sufficient"
    tags: ["conditioning", "GPP", "work-capacity", "cardiovascular"]

  # ── OLYMPIC LIFTING FOUNDATIONS ───────────────────────────────────────────
  - id: "sports/strength-training/olympic-lifting"
    title: "Olympic Lifting Foundations"
    description: >
      The snatch, clean, and jerk develop explosive power, rate of force
      development, and full-body coordination that transfer to all strength
      sports and athletics. These lifts require excellent mobility (overhead
      squat depth for snatch, front rack flexibility for clean, split position
      for jerk), precise timing, and barbell proficiency that build on top of
      the compound lift base. The teaching progression follows a top-down
      approach: (1) Start with the front squat and overhead squat to build
      receiving positions, (2) learn the muscle clean and muscle snatch (slow,
      no dip) to understand the bar path, (3) progress to hang power positions
      (above the knee) with emphasis on the "jump and shrug" or triple extension
      (simultaneous extension of ankles, knees, and hips), (4) move to hang
      positions below the knee to practice the transition/scoop, (5) pull from
      the floor once positions 1-4 are solid. For the jerk, progress from push
      press (no foot movement) to push jerk (slight dip and foot slide) to split
      jerk (full split catch). Key positions to master: the first pull (floor to
      knee, controlled, shoulders over the bar), the transition (bar passes the
      knee, knees re-bend under the bar), the second pull (explosive hip extension,
      the "power position"), and the catch (receiving the bar in the bottom of a
      front squat for cleans or overhead squat for snatches). Use lifting shoes
      with a raised heel (0.75-1 inch) for all Olympic lifting — they improve
      ankle dorsiflexion and receiving position depth. Hook grip (thumb under
      fingers on the bar) is essential for cleans and snatches above moderate
      weight. Train Olympic lifts first in the session when fresh — they are the
      most technique-sensitive movements. Keep reps low (1-3 per set) even during
      learning; fatigue degrades technique rapidly in these lifts.
    benchmarks:
      - level: beginner
        criteria: "Performs power clean from the hang position and front squat with acceptable technique. Understands the triple extension concept (simultaneous extension of ankles, knees, and hips). Demonstrates a proper front rack position (elbows high, bar resting on deltoids, fingertip grip acceptable). Uses hang variations (above-knee and below-knee) before pulling from the floor. Can perform an overhead squat with an empty barbell. Uses hook grip for cleans. Wears lifting shoes with raised heel."
        metrics:
          - "Power clean from hang position (above knee) at 0.5x bodyweight for 3 reps with full front rack position (elbows high, bar on deltoids)"
          - "Front squat 0.75x bodyweight for 5 reps with upright torso (minimal forward lean) and clean grip or cross-arm grip"
          - "Overhead squat with empty barbell (45 lb/20 kg) for 5 reps at full depth with bar over mid-foot"
          - "Muscle clean with empty barbell for 5 reps demonstrating the bar path (close to body, elbows rotate around the bar)"
          - "Hook grip maintained on cleans at 0.5x bodyweight without releasing during the catch"
        resources:
          - title: "Alan Thrall — How to Power Clean (Complete Beginner Guide)"
            url: "https://www.youtube.com/watch?v=mPsxlNjv7Aw"
            type: "video"
          - title: "Starting Strength — The Front Squat for Olympic Lifting"
            url: "https://www.youtube.com/watch?v=m4ytaCJZpl0"
            type: "video"
        practice:
          - "15 min: Muscle clean with empty barbell — 5 sets of 3, focus on keeping the bar close to the body"
          - "10 min: Front squat practice — 3x5 with emphasis on upright torso and high elbows"
          - "5 min: Hook grip practice — hold the bar in hook grip for 30 seconds, release, repeat 5 times"
        projects:
          - "Power clean 0.5x bodyweight from the hang position for 3 reps with proper front rack"
          - "Overhead squat with empty barbell for 5 reps at full depth"
        tips:
          - "Learn the muscle clean before the power clean — the muscle clean teaches the correct bar path (close to the body, elbows rotate around the bar) without the speed that masks technique errors"
          - "Hook grip hurts at first — tape your thumbs for the first few weeks and push through the discomfort; it becomes painless within 2-3 weeks of consistent use"
      - level: intermediate
        criteria: "Performs power clean and power snatch from the floor with consistent technique — bar stays close to the body through all pull phases, catches in a partial squat with stable receiving position. Understands the three pull phases (first pull: floor to knee; transition: knee to hip; second pull: explosive extension). Push press and push jerk executed with proper timing (dip, drive, press/catch). Can perform hang snatch and hang clean from below the knee. Demonstrates the 'scarecrow' position in the snatch pull. Uses power position drills to refine the second pull."
        metrics:
          - "Power clean from floor at 0.75x bodyweight for 1 rep with bar contact at the hip, full extension, and clean rack position"
          - "Power snatch from floor at 0.5x bodyweight for 1 rep with overhead lockout and stable receiving position (knees above parallel)"
          - "Push press at 0.6x bodyweight for 3 reps with proper dip-drive timing (no press-out or excessive back lean)"
          - "Hang clean (below knee) at 0.65x bodyweight for 3 reps with smooth transition through the knee"
          - "Snatch grip behind-the-neck press in overhead squat position (Sots press) with empty barbell for 5 reps"
        resources:
          - title: "Alan Thrall — Power Snatch from the Floor Tutorial"
            url: "https://www.youtube.com/watch?v=9xQp2sldyts"
            type: "video"
          - title: "Starting Strength — The Three Pulls of the Clean"
            url: "https://www.youtube.com/watch?v=7yI4V8E77qI"
            type: "video"
        practice:
          - "15 min: Hang clean below the knee — 5 sets of 3, focus on smooth transition through the knee"
          - "10 min: Power position drills — hip-level hang cleans emphasizing explosive triple extension"
          - "10 min: Push press and push jerk — 3x3 each, focus on dip-drive timing"
        projects:
          - "Power clean from the floor at 0.75x bodyweight for 1 rep with clean bar path"
          - "Power snatch from the floor at 0.5x bodyweight for 1 rep with stable overhead lockout"
        tips:
          - "Keep reps low (1-3 per set) even during learning — fatigue degrades Olympic lift technique rapidly, and practicing with bad form builds bad habits"
          - "Always train Olympic lifts FIRST in the session when you are fresh — they are the most technique-sensitive movements and suffer most from fatigue"
      - level: advanced
        criteria: "Performs full squat clean and full squat snatch with competent technique — catches the bar in the bottom position of a deep front squat (clean) or deep overhead squat (snatch) with control and no crash. Executes the split jerk with proper footwork (front shin vertical, rear knee slightly bent, weight balanced between feet) and recovers to standing with the bar overhead. Can teach the full Olympic lift progressions to others using the top-down teaching method. Understands common faults (early arm bend, swinging the bar away, starfishing, not finishing the pull) and can self-correct."
        metrics:
          - "Full squat clean at 1.0x bodyweight for 1 rep caught in bottom of front squat with minimal crash (controlled descent into receiving position)"
          - "Full snatch at 0.7x bodyweight for 1 rep caught in deep overhead squat with bar over mid-foot and elbows locked"
          - "Split jerk at 0.85x bodyweight for 1 rep with front shin vertical, stable overhead position, and controlled recovery to standing"
          - "Can perform a clean complex (1 clean pull + 1 hang clean + 1 clean from floor + 1 front squat + 1 jerk) at 0.75x bodyweight"
          - "Teaches the power clean progression (muscle clean → hang power clean → power clean from floor) to a novice who achieves acceptable technique within 3 sessions"
        resources:
          - title: "Starting Strength — Full Squat Clean and Jerk Tutorial"
            url: "https://www.youtube.com/watch?v=mPsxlNjv7Aw"
            type: "video"
        tips:
          - "The most common fault in the clean is an early arm bend — the arms should stay straight until the hips fully extend; think of your arms as ropes and your hips as the engine"
      - level: expert
        criteria: "Executes all Olympic lifts at competitive standards with precise timing and minimal energy leakage. Demonstrates explosive power output measurable through bar velocity (>1.5 m/s on power clean second pull). Can program Olympic lifting progressions for athletes across sports (weightlifters, CrossFit athletes, field sport athletes). Understands the biomechanical differences between weightlifting technique schools (Chinese, Russian, American) and can apply each. Manages training loads for Olympic lifts using percentage-based and RPE systems appropriate for these movements."
        metrics:
          - "Clean and jerk at 1.25x bodyweight for 1 rep (clean caught in deep front squat, jerk caught in balanced split with stable overhead position)"
          - "Snatch at 0.9x bodyweight for 1 rep in competition or testing conditions with white lights (or equivalent judge approval)"
          - "Programs and coaches Olympic lifting progressions for 3+ athletes who achieve measurable power output improvements (vertical jump increase of 2+ inches or clean PR improvement of 10%+ over 12 weeks)"
          - "Clean pull bar velocity exceeds 1.5 m/s at the second pull measured by bar tracking (GymAware, OpenBarbell, or similar)"
          - "Can demonstrate and explain differences between Chinese-style (close feet, upright torso) and Russian-style (wider feet, more horizontal back) pulling mechanics"
        resources:
          - title: "Starting Strength — Comparing Weightlifting Technique Schools"
            url: "https://www.youtube.com/watch?v=pwZeSfgHmKs"
            type: "video"
        tips:
          - "At the expert level, understand that technique schools (Chinese vs. Russian vs. American) reflect different anthropometric optimization — there is no universally 'best' technique, only the best technique for a given body type"
    tags: ["olympic", "explosive", "power", "technical"]

  # ── COMPETITION & TESTING ─────────────────────────────────────────────────
  - id: "sports/strength-training/competition-testing"
    title: "Competition & Testing"
    description: >
      The skill of demonstrating maximal strength in a controlled setting —
      whether a powerlifting meet, strongman competition, or structured
      1RM testing day. Competition is a distinct skill from training; many
      strong lifters underperform on the platform without practice because
      they have not rehearsed the specific demands: obeying commands, managing
      adrenaline, timing warm-ups, and selecting attempts strategically.
      Key areas: (1) Meet preparation — register 8-12 weeks out, confirm
      weight class and federation rules (IPF, USAPL, USPA, RPS each have
      different equipment and drug-testing policies), arrange travel and
      accommodation, pack meet-day bag (singlet, belt, wrist wraps, knee
      sleeves, chalk, deadlift socks, change of clothes, food, water).
      (2) Peaking protocol — run a 1-2 week taper: reduce volume by 40-60%
      while maintaining intensity at 90-95% of planned openers; take last
      heavy session 7-10 days before the meet; take 2-3 full rest days before
      competition. (3) Attempt selection strategy — opener (1st attempt): a
      weight you can triple on your worst day, typically 90-92% of your best
      recent single; this should be an easy confidence builder and get you on
      the board; second attempt: a weight you are confident hitting, typically
      95-97% of your goal; third attempt: your PR attempt or stretch goal.
      Adjust 2nd and 3rd attempts based on how the opener moves. (4) Warm-up
      room management — time your warm-ups so your last warm-up set is 5-8
      minutes (roughly 3-5 lifters) before your platform attempt; use the
      flight sheet and count lifters to estimate timing. (5) Commands — for
      IPF/USAPL bench press: "start" (begin), "press" (after bar touches
      chest and is motionless), "rack" (return to rack); for squat: "squat"
      (begin), "rack" (after standing up); deadlift has no start command (lift
      when ready), "down" (after lockout). (6) Scoring systems — Wilks Score
      normalizes strength relative to bodyweight (under 200 = beginner,
      200-300 = intermediate, 300-400 = advanced, 400-500 = elite, 500+ =
      world-class); DOTS and IPF GL are newer alternatives used by different
      federations.
    benchmarks:
      - level: beginner
        criteria: "Completes a structured 1RM test day with proper warm-up protocol (work up in planned jumps: empty bar, 40%, 60%, 75%, 85%, 92%, 100%). Understands RPE-based max estimation (RPE 10 = absolute max, RPE 9.5 = might have had 0.5 more reps). Follows basic attempt selection logic: opener at 90-92% of estimated max (a weight you can triple), second at 95-97%, third as a PR attempt. Understands federation rules for their chosen organization. Can perform all three lifts to competition standards (squat depth, bench pause, deadlift lockout)."
        metrics:
          - "Completes a 3-lift max testing session with all attempts at legal depth (squat: hip crease below knee), proper pause (bench: bar motionless on chest), and full lockout (deadlift: hips and knees extended, shoulders behind the bar)"
          - "Opener attempt selected at 90-92% of estimated max and completed successfully with at least RPE 8 or lower"
          - "Warm-up follows a planned progression: empty bar → 40% → 60% → 75% → 85% → 92% → opener, with appropriate rest between each"
          - "Knows the equipment rules (belt width, knee sleeve length, wrist wrap length) for their chosen federation"
          - "Wilks score under 200 calculated from test-day total"
        resources:
          - title: "Alan Thrall — How to Test Your 1 Rep Max Safely"
            url: "https://www.youtube.com/watch?v=0856Q79n12A"
            type: "video"
          - title: "Starting Strength — Attempt Selection for Your First Meet"
            url: "https://www.youtube.com/watch?v=UJahL5EmY0o"
            type: "video"
        practice:
          - "Test day: Follow a planned warm-up progression — empty bar, 40%, 60%, 75%, 85%, 92%, 100% with 3-5 min rest between attempts"
          - "Practice commands: Have a partner call 'squat', 'press', 'rack', and 'down' while you lift"
          - "Pre-test: Practice all three lifts to competition standards (squat depth, bench pause, deadlift lockout)"
        projects:
          - "Complete a structured 3-lift max testing session with all lifts at legal standards"
          - "Select openers at 90-92% of estimated max and hit them all successfully"
        tips:
          - "Your opener should be a weight you can triple on your worst day — it is a confidence builder, not a PR attempt; save heroics for the third attempt"
          - "Practice the bench press pause in training — get used to holding the bar motionless on your chest before the 'press' command; this is the most common mistake in competition"
      - level: intermediate
        criteria: "Competes in a sanctioned local meet or well-organized mock meet. Executes all referee commands correctly: bench press 'start', 'press', 'rack'; squat 'squat', 'rack'; deadlift waits for 'down' signal. Manages warm-up timing in a shared warm-up room using the flight sheet and lifter count. Goes 7/9 or better on attempts (hits at least 7 of 9 lifts). Manages pre-competition nutrition: eats a familiar meal 2-3 hours before lifting, brings snacks (simple carbs between attempts). Handles competition nerves without it significantly impacting performance."
        metrics:
          - "Completes a sanctioned powerlifting meet going at least 7/9 on attempts with no lifts missed due to commands or depth"
          - "Warm-up timing puts last warm-up set 5-8 minutes before first platform attempt, tracked by counting lifters in the flight"
          - "Wilks score 200-300 achieved in sanctioned competition"
          - "All bench press commands executed correctly (no racking early, no pressing before 'press' command)"
          - "Competition total within 95%+ of best gym total (demonstrates ability to perform under meet conditions)"
          - "Eats and hydrates between lifts according to a pre-planned competition nutrition strategy"
        resources:
          - title: "Jeff Nippard — Your First Powerlifting Meet: Complete Guide"
            url: "https://www.youtube.com/watch?v=OPEDjl88P-4"
            type: "video"
          - title: "Stronger by Science — Competition Day Strategy"
            url: "https://www.strongerbyscience.com/peaking/"
            type: "article"
        practice:
          - "Pre-meet: Run a mock meet 4 weeks out — 3 lifts, 3 attempts each, with a handler calling commands"
          - "Warm-up timing: Practice counting lifters in a flight to estimate your timing (last warm-up 5-8 min before platform)"
          - "Competition nutrition: Test your meet-day meal plan during a heavy training session to ensure it works"
        projects:
          - "Complete a sanctioned local powerlifting meet going at least 7/9 on attempts"
          - "Time warm-ups so last warm-up set is 5-8 minutes before first platform attempt"
        tips:
          - "Bring a meet-day bag with everything you need: singlet, belt, wrist wraps, knee sleeves, chalk, deadlift socks, change of clothes, food (simple carbs like candy, bananas), and water"
          - "Do NOT try new things on meet day — eat familiar foods, use your usual warm-up routine, and lift in the same equipment you train in"
      - level: advanced
        criteria: "Consistently performs at or above gym PRs on the competition platform — the adrenaline and structure of competition produces a performance boost rather than anxiety-driven regression. Uses strategic attempt selection to maximize total: conservative opener to get on the board, calculated second to build the total, aggressive third for PRs. Executes a full 12-16 week peaking cycle leading into competition with planned taper (volume drops 40-60%, intensity maintained at 90-95% of openers). Manages weight cut (chronic: 8-12 week diet to get within 3-5% of class limit; acute: 24-hour water cut of 2-3% if needed for 24-hour weigh-in) and post-weigh-in refeed. Competes 2-3 times per year with improving totals."
        metrics:
          - "Competition total within 97%+ of best gym total across 3+ meets, demonstrating reliable platform performance"
          - "Achieves Wilks/DOTS score improvement across 3+ consecutive competitions"
          - "Wilks score 300-400 achieved in sanctioned competition"
          - "Goes 8/9 or 9/9 on attempts across 3+ competitions"
          - "Successfully executes a weight cut: weigh-in within 0.5 kg of class limit, then refeeds to compete at 2-3% above weigh-in weight"
          - "Third attempts selected based on how opener and second moved (RPE assessment), not pre-determined ego numbers"
        resources:
          - title: "Stronger by Science — Peaking for Competition"
            url: "https://www.strongerbyscience.com/peaking/"
            type: "article"
        tips:
          - "Select third attempts based on how the second attempt MOVED, not a pre-determined number — if your second was RPE 9.5, do not jump 5 kg; if it was RPE 8, you can be aggressive"
      - level: expert
        criteria: "Competes at regional, national, or international level in a drug-tested or untested federation. Masters tactical attempt selection based on competitor totals and flight position — knows when to take a conservative third to secure placement vs. when to go for a big third to win. Performs at peak under maximum competitive pressure (national-level stage, large audience, high stakes). Coaches others through competition day including warm-up timing, attempt selection, commands, and mental preparation. Understands all major scoring systems (Wilks, DOTS, IPF GL, Goodlift Points) and can calculate them to inform tactical decisions mid-meet."
        metrics:
          - "Wilks score 400+ (elite) or 500+ (world-class) achieved in sanctioned competition"
          - "Coaches 3+ athletes through successful competition days with 80%+ achieving 8/9 or 9/9 on attempts"
          - "Goes 9/9 on attempts in at least one competition at regional level or higher"
          - "Makes tactical third-attempt adjustments mid-meet based on competitor performance and scoring system calculations"
          - "Competition PRs within 2% of best gym lifts across all three movements, demonstrating consistent platform performance under pressure"
          - "Qualifies for or competes at a national-level competition (e.g., USAPL Nationals, IPF Worlds qualifying total)"
        resources:
          - title: "Starting Strength — Tactical Attempt Selection at the Elite Level"
            url: "https://www.youtube.com/watch?v=tEvvMBiCDEY"
            type: "video"
        tips:
          - "At the elite level, learn to make tactical third-attempt adjustments based on competitor totals and scoring systems — sometimes a conservative third to secure placement is smarter than a risky PR attempt"
    tags: ["competition", "testing", "peaking", "strategy"]

