  # ── BURNS & ENVIRONMENTAL ───────────────────────────────────────────────────
  - id: "science/first-aid-cpr/burns-environmental"
    title: "Burns & Heat/Cold Emergencies"
    description: >
      Burns and environmental emergencies (heat stroke, hypothermia, frostbite)
      are common and can be life-threatening. Proper first-aid management in
      the first minutes dramatically affects outcomes. This node covers burn
      assessment and treatment, heat-related illness, cold-related illness,
      and lightning injuries.

      Sub-skills covered: burn depth classification (superficial — red and
      painful; partial thickness — blisters and pain; full thickness — white/
      charred and painless), burn size estimation (Rule of Nines, palm method),
      burn first aid (cool with running water 10-20 minutes, cover with clean
      dressing, do NOT apply butter/ice/ointments), chemical burn decontamination
      (brush off dry chemicals, flush with water 20+ minutes), electrical burn
      assessment (entry/exit wounds, cardiac monitoring needed), heat cramps
      (muscle cramps, hydration), heat exhaustion (heavy sweating, weakness,
      nausea, cool pale skin), heat stroke (hot dry or wet skin, altered mental
      status, temperature above 104F — MEDICAL EMERGENCY), hypothermia staging
      (mild: shivering, 90-95F; moderate: shivering stops, confusion, 82-90F;
      severe: unconscious, below 82F), frostbite (superficial vs. deep), and
      active rewarming techniques.
    benchmarks:
      - level: beginner
        criteria: "Classifies burns by depth (superficial, partial thickness, full thickness). Cools a burn with running water for 10-20 minutes. Covers burn with clean dressing. Knows NOT to apply ice, butter, or ointments. Recognizes heat stroke as a 911 emergency (hot skin, altered mental status)."
        metrics:
          - "Correctly classifies burn depth in 4/5 photo or description scenarios"
          - "Demonstrates correct burn cooling technique (running water 10-20 min, not ice) in a simulated scenario"
          - "Identifies when a burn requires 911 (full thickness, large area, face/hands/feet/genitals, circumferential, chemical, electrical)"
          - "Correctly differentiates heat exhaustion from heat stroke in 3/3 scenarios"
          - "Lists 3 things you should NOT apply to a burn (ice, butter, toothpaste, ointments)"
        resources:
          - title: "Mayo Clinic — Burns: First Aid"
            url: "https://www.mayoclinic.org/first-aid/first-aid-burns/basics/art-20056649"
            type: "article"
          - title: "American Red Cross — Burns"
            url: "https://www.redcross.org/get-help/how-to-prepare-for-emergencies/types-of-emergencies/burn.html"
            type: "article"
          - title: "ProCPR — Burn First Aid"
            url: "https://www.youtube.com/watch?v=EaJmzB8YgS0"
            type: "video"
          - title: "St John Ambulance — Burns and Scalds"
            url: "https://www.sja.org.uk/get-advice/first-aid-advice/burns-and-scalds/"
            type: "article"
        practice:
          - "10 min: Burn classification quiz — review 10 burn images or descriptions and classify by depth"
          - "5 min: Practice burn cooling — simulate a forearm burn and run cool (not cold) water over it for the full 10-20 minutes to understand how long that actually is"
          - "5 min: Heat illness recognition drill — partner describes 5 scenarios and you identify heat cramps vs. heat exhaustion vs. heat stroke"
        projects:
          - "Create a burn first-aid reference card with do's and don'ts, posted in your kitchen"
          - "Check your home for burn hazards (hot water heater above 120F, accessible stove, chemicals without labels) and address at least 2"
        tips:
          - "Cool the burn with running water for 10 to 20 minutes — research shows this is the single most effective first-aid treatment for burns and the window of benefit is up to 3 hours after injury"
          - "Never pop blisters from a partial-thickness burn — the blister is a natural sterile dressing that protects against infection"
      - level: intermediate
        criteria: "Estimates burn size using Rule of Nines and palm method. Manages chemical burns (brush dry chemicals, flush with water 20+ minutes). Recognizes electrical burn dangers (cardiac arrhythmia, internal injuries). Manages heat exhaustion (cool, hydrate, rest) and initiates aggressive cooling for heat stroke. Recognizes and manages mild hypothermia (remove wet clothing, insulate, warm drinks)."
        metrics:
          - "Correctly estimates burn total body surface area within 5% using Rule of Nines on 3/3 scenarios"
          - "Demonstrates chemical burn decontamination (PPE, brush dry chemical, 20+ min water flush)"
          - "Initiates appropriate cooling measures for a simulated heat stroke patient within 2 minutes"
          - "Correctly manages a simulated mild hypothermia patient (remove wet clothes, insulate, warm fluids, prevent further heat loss)"
          - "Passes burn and environmental emergency section of Red Cross or AHA First Aid certification"
        resources:
          - title: "AHA — Heartsaver First Aid Course"
            url: "https://cpr.heart.org/en/cpr-courses-and-kits/heartsaver/heartsaver-first-aid"
            type: "course"
          - title: "Mayo Clinic — Heat Stroke: First Aid"
            url: "https://www.mayoclinic.org/first-aid/first-aid-heatstroke/basics/art-20056655"
            type: "article"
          - title: "Mayo Clinic — Hypothermia: First Aid"
            url: "https://www.mayoclinic.org/first-aid/first-aid-hypothermia/basics/art-20056624"
            type: "article"
          - title: "ProCPR — Environmental Emergencies"
            url: "https://www.youtube.com/watch?v=TVdoJp47pBo"
            type: "video"
        practice:
          - "10 min: Rule of Nines practice — draw the zones on a body diagram and estimate burn size for 5 different scenarios"
          - "10 min: Chemical burn decontamination drill — simulate PPE donning, dry chemical removal, and 20-minute water flush protocol"
          - "15 min: Heat stroke cooling drill — practice rapid cooling techniques (ice packs to neck, armpits, groin; cold water dousing; fan)"
        projects:
          - "Obtain first-aid certification that covers burns and environmental emergencies"
          - "Create a heat illness prevention plan for your outdoor sports team or workplace including hydration schedules, rest breaks, and warning signs"
        tips:
          - "For heat stroke, cool first, transport second — every minute of delay in cooling reduces survival. Use whatever is available: ice water immersion is ideal, but dousing with cold water and fanning is effective too"
      - level: advanced
        criteria: "Manages complex burns (inhalation injury signs, circumferential burns, large-area burns). Performs field rewarming for moderate-to-severe hypothermia (hypothermia wrap, heat sources). Manages deep frostbite (field rewarming only if no risk of refreezing). Understands lightning injury assessment and management. Can manage burn and environmental patients in remote settings."
        metrics:
          - "Identifies signs of inhalation injury (singed nasal hair, soot in mouth, hoarse voice, stridor) in a scenario"
          - "Constructs a hypothermia wrap using available materials (sleeping bag, tarp, hot water bottles) for a simulated patient"
          - "Correctly manages a simulated deep frostbite case (protect from further injury, rewarm in 98-102F water ONLY if no refreezing risk)"
          - "Describes the unique assessment priorities for a lightning strike victim (cardiac arrest, burns, blast injury, spinal injury)"
        resources:
          - title: "NOLS Wilderness Medicine — Environmental Emergencies"
            url: "https://www.nols.edu/en/coursefinder/courses/wilderness-first-responder-WFR/"
            type: "course"
          - title: "Mayo Clinic — Frostbite: First Aid"
            url: "https://www.mayoclinic.org/first-aid/first-aid-frostbite/basics/art-20056653"
            type: "article"
          - title: "St John Ambulance — Hypothermia"
            url: "https://www.sja.org.uk/get-advice/first-aid-advice/effects-of-heat-and-cold/hypothermia/"
            type: "article"
        practice:
          - "20 min: Hypothermia wrap construction practice using sleeping bag, tarp, and improvised heat sources (hot water bottles, chemical heat packs)"
          - "15 min: Frostbite management scenario — assess, protect, and prepare for controlled rewarming in a water bath"
          - "10 min: Inhalation injury recognition drill — partner describes burn patient findings and you identify signs suggesting airway involvement"
        projects:
          - "Complete the environmental emergency module of a Wilderness First Responder course"
          - "Develop a cold-weather expedition medical plan covering hypothermia prevention, recognition, and field management"
        tips:
          - "Never rewarm frostbitten tissue if there is any chance it will refreeze — refreezing causes dramatically worse tissue damage than the initial frostbite"
      - level: expert
        criteria: "Teaches burn care and environmental emergency management. Designs training programs for outdoor organizations and workplaces. Understands the evidence base for burn cooling, heat stroke management, and hypothermia rewarming. Contributes to organizational safety policies for extreme environments."
        metrics:
          - "Delivers burns and environmental emergency training to at least 15 students with 90%+ pass rate"
          - "Designs a workplace heat illness prevention program compliant with OSHA guidelines"
          - "Can explain the evidence for 10-20 minute burn cooling and cold water immersion for heat stroke"
          - "Creates and runs a complex environmental emergency simulation scenario"
        resources:
          - title: "NOLS Wilderness Medicine — Instructor Development"
            url: "https://www.nols.edu/en/wilderness-medicine/"
            type: "course"
          - title: "Red Cross — Instructor Certification"
            url: "https://www.redcross.org/take-a-class/become-an-instructor"
            type: "course"
          - title: "AHA — First Aid Guidelines"
            url: "https://cpr.heart.org/en/resuscitation-science/cpr-and-ecc-guidelines"
            type: "article"
        practice:
          - "30 min: Design a burns and environmental emergency workshop with stations for burn assessment, heat stroke cooling, and hypothermia wrap"
          - "20 min: Develop a heat illness prevention policy for an outdoor event or workplace"
        projects:
          - "Deliver burns and environmental emergency training to an outdoor recreation group or workplace safety team"
          - "Create or review the extreme temperature safety policy for your organization"
        tips:
          - "Outdoor organizations that teach proactive prevention (hydration plans, layering systems, acclimatization schedules) have dramatically lower rates of environmental emergencies than those that only teach reactive treatment"
    tags: ["environmental", "burns", "practical"]

  # ── ALLERGIC REACTIONS ──────────────────────────────────────────────────────
  - id: "science/first-aid-cpr/allergic-reactions"
    title: "Allergic Reactions & Anaphylaxis"
    description: >
      Anaphylaxis is a severe, life-threatening allergic reaction that can
      kill within minutes if untreated. Epinephrine auto-injectors (EpiPens)
      are the first-line treatment and can be administered by bystanders. This
      node covers recognizing allergic reactions from mild to life-threatening,
      administering epinephrine, and post-anaphylaxis management.

      Sub-skills covered: recognizing mild allergic reactions (localized hives,
      itching, mild swelling), recognizing anaphylaxis (involvement of 2+ body
      systems — skin: hives/flushing; respiratory: wheezing/stridor/throat
      tightness; cardiovascular: hypotension/tachycardia/dizziness; GI: nausea/
      vomiting/cramping), common triggers (foods: peanuts, tree nuts, shellfish,
      milk, eggs; insect stings: bee, wasp, hornet; medications: penicillin,
      NSAIDs; latex), epinephrine auto-injector use (EpiPen, Auvi-Q, generic —
      remove safety cap, press firmly against outer mid-thigh, hold for 10
      seconds, can be given through clothing), positioning the patient (sitting
      upright if breathing difficulty, lying flat with legs elevated if low
      blood pressure, recovery position if vomiting), calling 911 (always —
      even after epinephrine, biphasic reactions can occur), second dose of
      epinephrine if no improvement in 5-15 minutes, and antihistamines
      (diphenhydramine/Benadryl) as adjunct only — never as replacement for
      epinephrine in anaphylaxis.
    benchmarks:
      - level: beginner
        criteria: "Recognizes signs of a severe allergic reaction (hives, swelling, breathing difficulty, dizziness). Knows to call 911 immediately for anaphylaxis. Can help a patient use their own prescribed epinephrine auto-injector. Understands that epinephrine is the only treatment for anaphylaxis — antihistamines are not sufficient."
        metrics:
          - "Identifies anaphylaxis vs. mild allergic reaction in 4/5 scenario descriptions"
          - "Demonstrates correct EpiPen use (remove cap, press to thigh, hold 10 seconds) on a training device"
          - "Correctly states the 4 body systems involved in anaphylaxis (skin, respiratory, cardiovascular, GI) and gives an example symptom for each"
          - "Knows to call 911 even after giving epinephrine"
          - "Correctly states that antihistamines do NOT treat anaphylaxis"
        resources:
          - title: "Mayo Clinic — Anaphylaxis: First Aid"
            url: "https://www.mayoclinic.org/first-aid/first-aid-anaphylaxis/basics/art-20056608"
            type: "article"
          - title: "American Red Cross — Allergic Reactions"
            url: "https://www.redcross.org/get-help/how-to-prepare-for-emergencies/types-of-emergencies/allergic-reaction.html"
            type: "article"
          - title: "ProCPR — How to Use an EpiPen"
            url: "https://www.youtube.com/watch?v=GJiAHF_kHCM"
            type: "video"
          - title: "St John Ambulance — Anaphylaxis"
            url: "https://www.sja.org.uk/first-aid-advice/anaphylaxis/"
            type: "article"
        practice:
          - "10 min: EpiPen trainer practice — remove safety cap, press to outer mid-thigh, hold for 10 seconds, repeat 5 times"
          - "5 min: Anaphylaxis recognition quiz — partner describes 5 allergic reaction scenarios and you identify mild vs. severe"
          - "5 min: Patient positioning practice — sitting upright for respiratory distress, lying flat with legs elevated for hypotension"
        projects:
          - "Ask 5 people you regularly spend time with whether they have known allergies and where they keep their epinephrine auto-injector if prescribed"
          - "Practice using an EpiPen trainer until you can complete the sequence correctly in under 10 seconds"
        tips:
          - "Do not hesitate to give epinephrine — the risk of NOT giving it to someone in anaphylaxis is death. The risk of giving it unnecessarily is a fast heartbeat and jitteriness that resolves in minutes"
          - "Anaphylaxis can progress from mild symptoms to cardiac arrest in minutes — call 911 and give epinephrine at the first sign of multi-system involvement"
      - level: intermediate
        criteria: "Administers epinephrine auto-injector independently (not just helping patient). Knows when to give a second dose (5-15 minutes if no improvement). Understands biphasic anaphylaxis (second reaction hours later). Manages anaphylaxis in special populations (infants, pregnant women, patients on beta-blockers). Documents and reports the episode to EMS."
        metrics:
          - "Correctly administers EpiPen to a mannequin leg including site selection, injection technique, and 10-second hold"
          - "Correctly identifies when a second dose is indicated in 3/3 scenario descriptions"
          - "Explains biphasic anaphylaxis and why hospital observation is needed even after symptoms resolve"
          - "Provides a structured handoff to EMS including trigger, time of onset, symptoms, epinephrine dose and time, response"
          - "Passes allergy/anaphylaxis section of AHA or Red Cross First Aid certification"
        resources:
          - title: "AHA — Heartsaver First Aid CPR AED"
            url: "https://cpr.heart.org/en/cpr-courses-and-kits/heartsaver/heartsaver-first-aid-cpr-aed"
            type: "course"
          - title: "ProCPR — Anaphylaxis Management"
            url: "https://www.youtube.com/watch?v=OJNFEqsBJpQ"
            type: "video"
          - title: "Mayo Clinic — Epinephrine Auto-Injector"
            url: "https://www.mayoclinic.org/drugs-supplements/epinephrine-injection-route/proper-use/drg-20072421"
            type: "article"
        practice:
          - "15 min: Full anaphylaxis scenario drill — recognize symptoms, call 911, administer epinephrine, position patient, monitor, decide on second dose"
          - "10 min: EMS handoff practice — deliver a structured report on a simulated anaphylaxis patient"
          - "5 min: Second dose decision drill — partner presents 5 post-epinephrine scenarios and you decide whether a second dose is indicated"
        projects:
          - "Obtain first-aid certification that includes anaphylaxis management"
          - "Create an allergy action plan template for your workplace or school that includes trigger identification, symptom recognition, and step-by-step response"
        tips:
          - "Patients on beta-blockers may not respond to the first dose of epinephrine and may need a second dose sooner — beta-blockers block the receptors that epinephrine acts on"
          - "Biphasic anaphylaxis occurs in up to 20% of cases — symptoms resolve then return hours later. This is why EVERY anaphylaxis patient must go to the hospital even if they feel better after epinephrine"
      - level: advanced
        criteria: "Manages anaphylaxis in remote settings where evacuation is delayed. Understands intramuscular epinephrine dosing (0.3mg adult, 0.15mg child). Can draw up epinephrine from a vial if auto-injectors unavailable. Recognizes anaphylaxis mimics (vasovagal syncope, panic attack, asthma, angioedema without anaphylaxis). Manages refractory anaphylaxis (repeated doses, positioning, IV fluids if trained)."
        metrics:
          - "Correctly differentiates anaphylaxis from vasovagal syncope and panic attack in 4/4 scenarios"
          - "States correct epinephrine IM dosing for adult and pediatric patients"
          - "Manages a simulated remote anaphylaxis scenario including repeated dosing, monitoring, and evacuation planning"
          - "Demonstrates correct technique for drawing up epinephrine from a multi-dose vial (if within scope of training)"
        resources:
          - title: "NOLS Wilderness Medicine — Anaphylaxis in Remote Settings"
            url: "https://www.nols.edu/en/coursefinder/courses/wilderness-first-responder-WFR/"
            type: "course"
          - title: "Mayo Clinic — Anaphylaxis Diagnosis and Treatment"
            url: "https://www.mayoclinic.org/diseases-conditions/anaphylaxis/diagnosis-treatment/drc-20351474"
            type: "article"
          - title: "ProCPR — Advanced Allergy Management"
            url: "https://www.youtube.com/watch?v=3p8Q_qe4AQQ"
            type: "video"
        practice:
          - "15 min: Differential diagnosis drill — partner presents 6 scenarios of acute symptoms (rash, breathing difficulty, fainting) and you differentiate anaphylaxis from mimics"
          - "15 min: Remote anaphylaxis scenario — manage a patient in a simulated backcountry setting with limited supplies and delayed evacuation"
          - "10 min: Epinephrine dosing quiz — correctly state doses for adult, child (15-30kg), and infant for both auto-injector and vial"
        projects:
          - "Complete the anaphylaxis module of a Wilderness First Responder course"
          - "Develop a remote anaphylaxis management protocol for a backcountry trip including medication supply, monitoring plan, and evacuation triggers"
        tips:
          - "In remote settings, carry multiple doses of epinephrine — a single auto-injector may not be enough for refractory anaphylaxis hours from definitive care"
      - level: expert
        criteria: "Teaches anaphylaxis recognition and management to lay rescuers and healthcare providers. Designs allergy emergency response plans for schools and organizations. Understands the immunology of anaphylaxis and the pharmacology of epinephrine. Advocates for epinephrine access policies."
        metrics:
          - "Delivers anaphylaxis training to at least 20 participants with 95%+ recognition accuracy on post-test"
          - "Designs an organizational anaphylaxis response plan that includes staff training, epinephrine stock, and practice drills"
          - "Can explain the mechanism of anaphylaxis (IgE-mediated mast cell degranulation) and how epinephrine counteracts it at a teaching level"
          - "Advocates for stock epinephrine policies in schools or public venues"
        resources:
          - title: "AHA — BLS Instructor Essentials"
            url: "https://cpr.heart.org/en/cpr-courses-and-kits/healthcare-professional/bls-instructor"
            type: "course"
          - title: "Red Cross — Become an Instructor"
            url: "https://www.redcross.org/take-a-class/become-an-instructor"
            type: "course"
          - title: "American Academy of Allergy, Asthma & Immunology — Anaphylaxis"
            url: "https://www.aaaai.org/conditions-treatments/allergies/anaphylaxis"
            type: "article"
        practice:
          - "30 min: Design a 1-hour anaphylaxis awareness and EpiPen training session for school teachers or coaches"
          - "20 min: Review your organization's current anaphylaxis policy and identify gaps"
        projects:
          - "Deliver anaphylaxis training to staff at a school, camp, or childcare center"
          - "Help a school or organization develop or update their anaphylaxis emergency response plan"
        tips:
          - "Stock epinephrine laws allow schools and public venues to keep epinephrine on hand for anyone experiencing anaphylaxis — not just those with prescriptions. Advocate for these programs in your community"
    tags: ["medical", "life-saving", "allergy"]

  # ── WILDERNESS FIRST AID ────────────────────────────────────────────────────
  - id: "science/first-aid-cpr/wilderness-remote"
    title: "Wilderness & Remote First Aid"
    description: >
      Wilderness first aid addresses the unique challenges of providing medical
      care far from hospitals and EMS. When help is hours or days away, the
      first aider must make extended care decisions, improvise equipment, and
      manage evacuation. This node covers the wilderness medicine mindset,
      extended patient care, improvised techniques, and evacuation decision-making.

      Sub-skills covered: wilderness vs. urban first aid (delayed definitive
      care, improvisation, extended monitoring), the NOLS/WMA patient assessment
      system (scene size-up, primary survey, secondary survey, vital signs
      monitoring every 15-30 minutes), clearing the spine in the field (NOLS
      criteria: reliable patient, no distracting injuries, no midline tenderness,
      no neurological deficits), wound management in the field (irrigation with
      disinfected water, closure for low-infection-risk wounds, daily dressing
      changes), long bone and joint splinting with improvised materials (trekking
      poles, sleeping pads, clothing), managing shock with limited resources,
      treating altitude illness (AMS, HACE, HAPE — descent is definitive
      treatment), managing water-related emergencies (near-drowning, hypothermia),
      backcountry medication protocols (ibuprofen, diphenhydramine, epinephrine,
      oral rehydration), and evacuation decision-making (walk out, assisted
      carry, helicopter, when to call for help).
    benchmarks:
      - level: beginner
        criteria: "Understands the difference between urban and wilderness first aid (time, resources, communication). Carries and knows how to use a basic backcountry first-aid kit. Can perform basic wilderness wound care (irrigation, bandaging). Knows when to turn back or call for rescue (altered mental status, inability to walk, worsening condition)."
        metrics:
          - "Lists 3 key differences between urban and wilderness first-aid situations"
          - "Assembles a wilderness first-aid kit appropriate for a day hike"
          - "Irrigates and bandages a simulated wound using only kit contents"
          - "Correctly identifies 3/3 scenarios where evacuation is needed vs. can continue"
          - "Explains how to call for help in a remote area (cell phone, satellite communicator, signal for help)"
        resources:
          - title: "NOLS Wilderness Medicine — About Wilderness First Aid"
            url: "https://www.nols.edu/en/coursefinder/courses/wilderness-first-aid-WFA/"
            type: "course"
          - title: "American Red Cross — Wilderness First Aid"
            url: "https://www.redcross.org/take-a-class/first-aid/wilderness-first-aid"
            type: "course"
          - title: "ProCPR — Wilderness First Aid Basics"
            url: "https://www.youtube.com/watch?v=JnhFEUYFzig"
            type: "video"
          - title: "Mayo Clinic — Wilderness Safety Tips"
            url: "https://www.mayoclinic.org/healthy-lifestyle/fitness/in-depth/hiking/art-20546893"
            type: "article"
        practice:
          - "15 min: Pack a wilderness first-aid kit for a day hike — include wound care supplies, medications, emergency blanket, and communication device"
          - "10 min: Practice wound irrigation using a plastic bag with a pinhole as an improvised irrigation syringe"
          - "5 min: Scenario quiz — partner describes 5 backcountry situations and you decide: continue, monitor, or evacuate"
        projects:
          - "Take a NOLS Wilderness First Aid (WFA) or Red Cross Wilderness First Aid 2-day course"
          - "Go on 3 day hikes carrying your first-aid kit and practice identifying potential hazards on the trail"
        tips:
          - "The biggest difference between wilderness and urban first aid is time — in the city, EMS arrives in 5-10 minutes. In the backcountry, help may be 6-24 hours away. This changes every decision you make"
      - level: intermediate
        criteria: "Performs the full NOLS/WMA patient assessment system including vital signs monitoring. Improvises splints from available materials (trekking poles, sleeping pads, pack frames). Manages wounds for extended field care (irrigation, closure decisions, infection monitoring). Clears the C-spine using field criteria. Makes evacuation decisions based on patient condition and resources."
        metrics:
          - "Performs a complete wilderness patient assessment (scene size-up through vital signs) in under 10 minutes"
          - "Takes and records a full set of vital signs (level of consciousness, respiratory rate, pulse rate and quality, skin signs, pupils, blood pressure by palpation) every 15 minutes for 1 hour"
          - "Improvises a functional lower-leg splint using only a sleeping pad, trekking poles, and tape/cordage"
          - "Correctly applies NOLS spine-clearing criteria to 4/4 scenario patients"
          - "Passes NOLS Wilderness First Aid or equivalent certification exam"
        resources:
          - title: "NOLS Wilderness First Aid Course"
            url: "https://www.nols.edu/en/coursefinder/courses/wilderness-first-aid-WFA/"
            type: "course"
          - title: "Red Cross — Wilderness and Remote First Aid"
            url: "https://www.redcross.org/take-a-class/first-aid/wilderness-first-aid"
            type: "course"
          - title: "ProCPR — Wilderness Splinting Techniques"
            url: "https://www.youtube.com/watch?v=cC0QnFoNqCk"
            type: "video"
        practice:
          - "20 min: Full wilderness patient assessment drill — scene size-up, primary survey, secondary survey, vital signs, SAMPLE history"
          - "15 min: Improvised splinting challenge — create effective splints for forearm, lower leg, and ankle using only outdoor gear"
          - "15 min: Vital signs monitoring practice — take and record vitals every 15 minutes for 1 hour on a simulated patient"
        projects:
          - "Obtain NOLS Wilderness First Aid or Red Cross Wilderness First Aid certification"
          - "Plan a backpacking trip medical kit and response plan including evacuation routes, communication plan, and nearest hospital"
        tips:
          - "In wilderness settings, your most important tool is a written patient assessment — recording vital signs every 15 minutes creates a trend that tells you whether the patient is getting better or worse, which drives your evacuation decision"
      - level: advanced
        criteria: "Manages patients for extended periods (12-72 hours) in remote settings. Treats altitude illness (AMS, HACE, HAPE) including medication administration and descent decisions. Manages near-drowning and submersion incidents. Performs advanced wound management (debridement, closure, infection treatment). Leads evacuation including litter carries. Holds Wilderness First Responder (WFR) certification."
        metrics:
          - "Manages a simulated patient for 4+ hours with documented vital signs trending and treatment adjustments"
          - "Correctly identifies and initiates treatment for AMS, HACE, and HAPE in scenario testing"
          - "Leads a team of 6 in a 30-minute litter carry evacuation over rough terrain"
          - "Performs wound closure (butterfly strips or wound closure strips) on a simulated laceration with appropriate wound selection criteria"
          - "Holds current NOLS Wilderness First Responder (WFR) or equivalent certification"
        resources:
          - title: "NOLS Wilderness First Responder Course"
            url: "https://www.nols.edu/en/coursefinder/courses/wilderness-first-responder-WFR/"
            type: "course"
          - title: "NOLS Wilderness Medicine — Altitude Illness"
            url: "https://www.nols.edu/en/wilderness-medicine/"
            type: "article"
          - title: "ProCPR — Extended Patient Care"
            url: "https://www.youtube.com/watch?v=4vqOp9Hbvvk"
            type: "video"
        practice:
          - "Full day: Participate in a mock wilderness rescue scenario — patient assessment, treatment, monitoring for 2+ hours, and litter evacuation"
          - "20 min: Altitude illness scenario drill — differentiate AMS, HACE, and HAPE and initiate appropriate treatment"
          - "30 min: Litter carry practice with a team of 6 — practice handoffs, terrain negotiation, and patient monitoring during transport"
        projects:
          - "Complete NOLS Wilderness First Responder (80-hour) certification"
          - "Serve as the medical lead for a multi-day backcountry trip and prepare a comprehensive medical plan"
        tips:
          - "The golden rule of altitude illness: any neurological symptoms at altitude (severe headache, confusion, ataxia) must be assumed to be HACE until proven otherwise — descend immediately"
      - level: expert
        criteria: "Teaches wilderness medicine at the WFA or WFR level. Designs wilderness medicine curricula and simulation scenarios. Leads wilderness rescue operations. Contributes to wilderness medicine protocols and guidelines. Holds Wilderness EMT (WEMT) or equivalent advanced certification."
        metrics:
          - "Holds NOLS Wilderness Medicine Instructor certification or equivalent"
          - "Has instructed at least 3 complete WFA or WFR courses"
          - "Designs realistic multi-patient wilderness simulation scenarios with moulage and environmental factors"
          - "Leads or participates in actual wilderness search-and-rescue operations"
        resources:
          - title: "NOLS Wilderness Medicine — Instructor Course"
            url: "https://www.nols.edu/en/wilderness-medicine/"
            type: "course"
          - title: "Wilderness Medical Society — Practice Guidelines"
            url: "https://wms.org/research/practice-guidelines/"
            type: "article"
          - title: "NASAR — Search and Rescue"
            url: "https://www.nasar.org/"
            type: "article"
        practice:
          - "Full day: Design and run a multi-patient wilderness simulation scenario with moulage, environmental stressors, and limited supplies"
          - "30 min: Debrief a wilderness medicine simulation — identify learning points and areas for improvement for each student"
        projects:
          - "Obtain NOLS Wilderness Medicine Instructor certification"
          - "Join a local search-and-rescue team and participate in training exercises and operations"
        tips:
          - "The best wilderness medicine instructors create training environments that are as close to real as possible — cold, dark, wet, loud, confusing. Skills that work in a comfortable classroom may fail in the field"
    tags: ["wilderness", "advanced", "expedition"]

  # ── INSTRUCTOR CERTIFICATION ────────────────────────────────────────────────
  - id: "science/first-aid-cpr/instructor-certification"
    title: "First Aid Instructor Certification"
    description: >
      The capstone of first-aid education: becoming a certified instructor who
      can teach, evaluate, and certify others. This node covers the pedagogy
      of skills-based training, instructor certification pathways through AHA
      and Red Cross, program management, quality assurance, and community
      impact through teaching.

      Sub-skills covered: adult learning principles (tell, show, do, review),
      skills-based training methodology (demonstration, practice with feedback,
      skills testing), AHA Instructor Essentials course requirements, Red Cross
      instructor candidate training, course setup and equipment management
      (mannequins, AED trainers, supplies), skills testing and remediation,
      providing effective feedback (positive first, specific, actionable),
      managing difficult students, course administration (rosters, cards,
      reporting), quality assurance (monitoring pass rates, student feedback,
      instructor updates), Training Center administration for AHA, and
      building community training programs.
    benchmarks:
      - level: beginner
        criteria: "Understands the pathway to becoming a first-aid instructor. Has completed provider-level certifications (BLS, First Aid, CPR/AED). Has observed at least one certification class taught by an experienced instructor. Understands adult learning principles at a basic level."
        metrics:
          - "Holds current AHA BLS Provider and Heartsaver First Aid CPR AED certifications (or Red Cross equivalents)"
          - "Has observed at least 2 complete certification classes and documented observations"
          - "Can describe the tell-show-do-review teaching method and give an example for CPR instruction"
          - "Lists the requirements for AHA BLS Instructor or Red Cross Instructor candidacy"
        resources:
          - title: "AHA — How to Become an Instructor"
            url: "https://cpr.heart.org/en/cpr-courses-and-kits/healthcare-professional/bls-instructor"
            type: "article"
          - title: "Red Cross — Become an Instructor"
            url: "https://www.redcross.org/take-a-class/become-an-instructor"
            type: "course"
          - title: "ProCPR — What It Takes to Become a CPR Instructor"
            url: "https://www.youtube.com/watch?v=wJr3aMJpkRs"
            type: "video"
        practice:
          - "Observe 2 complete certification classes and take notes on teaching techniques, student engagement, and skills testing"
          - "Read the AHA Instructor Essentials or Red Cross Instructor Manual overview chapters"
          - "Practice explaining CPR steps to a friend using the tell-show-do method"
        projects:
          - "Obtain all prerequisite provider-level certifications (BLS, First Aid, CPR/AED)"
          - "Shadow an experienced instructor for 3 classes and document what techniques were most effective"
        tips:
          - "Start shadowing instructors early — most instructor certification programs require a recommendation from an experienced instructor, and teaching is a skill that benefits enormously from observation before you try it yourself"
      - level: intermediate
        criteria: "Completes instructor candidate course (AHA Instructor Essentials or Red Cross Instructor training). Passes written and skills exams. Teaches under supervision of a Training Center Faculty or experienced instructor. Receives positive evaluations from mentor. Issues first certification cards."
        metrics:
          - "Completes AHA Instructor Essentials online module and in-person training or Red Cross Instructor course"
          - "Passes instructor candidate written exam with score of 84% or higher"
          - "Teaches at least 2 classes under mentor supervision with positive evaluations"
          - "Successfully tests and certifies at least 10 students"
          - "Receives mentor sign-off to teach independently"
        resources:
          - title: "AHA — Instructor Essentials Course"
            url: "https://cpr.heart.org/en/cpr-courses-and-kits/healthcare-professional/bls-instructor"
            type: "course"
          - title: "Red Cross — Instructor Certification Process"
            url: "https://www.redcross.org/take-a-class/become-an-instructor"
            type: "course"
          - title: "AHA — Instructor Network Resources"
            url: "https://cpr.heart.org/en/cpr-courses-and-kits"
            type: "article"
        practice:
          - "Teach a full class section (e.g., adult CPR) under mentor observation and receive feedback"
          - "Practice skills testing — evaluate 5 students on CPR and provide pass/remediation decisions with specific feedback"
          - "Set up and tear down a full classroom including mannequin disinfection, AED trainers, and supplies"
        projects:
          - "Complete AHA BLS Instructor or Red Cross CPR/First Aid Instructor certification"
          - "Teach 2 complete certification classes under supervision and collect student feedback"
        tips:
          - "Your first few classes will feel overwhelming — have your lesson plan written out step by step, and lean on the course videos to carry the content while you focus on student engagement and skills practice"
      - level: advanced
        criteria: "Teaches independently across multiple course types (BLS, Heartsaver, First Aid). Mentors new instructor candidates. Manages course logistics including scheduling, equipment maintenance, and card issuance. Maintains high student pass rates and satisfaction scores. Stays current with guideline updates and implements them in teaching."
        metrics:
          - "Teaches at least 12 classes per year across 2+ course types"
          - "Maintains first-attempt pass rate above 90% across all courses"
          - "Mentors at least 2 new instructor candidates to certification"
          - "Student satisfaction scores average 4.5/5 or higher"
          - "Implements guideline updates within 3 months of publication"
        resources:
          - title: "AHA — Training Center Resources"
            url: "https://cpr.heart.org/en/cpr-courses-and-kits"
            type: "article"
          - title: "Red Cross — Instructor Resources"
            url: "https://www.redcross.org/take-a-class/become-an-instructor"
            type: "course"
          - title: "AHA — Guidelines Update"
            url: "https://cpr.heart.org/en/resuscitation-science/cpr-and-ecc-guidelines"
            type: "article"
        practice:
          - "Mentor a new instructor candidate through their first 2 supervised classes — provide written feedback after each"
          - "Review the latest AHA or Red Cross guideline updates and update your lesson plans accordingly"
          - "Conduct a classroom equipment inventory and maintenance check — replace expired supplies, disinfect mannequins, test AED trainers"
        projects:
          - "Mentor 2 instructor candidates from application to independent teaching status"
          - "Develop a training schedule for your organization or Training Center for the next 6 months"
        tips:
          - "The best instructors never stop being students — take a refresher course from another instructor at least once a year to see how others teach and pick up new techniques"
      - level: expert
        criteria: "Serves as Training Center Faculty (TCF) or equivalent leadership role. Evaluates and certifies new instructors. Designs training programs for organizations and communities. Conducts quality assurance reviews. Contributes to resuscitation education at the regional or national level. Drives community CPR training initiatives."
        metrics:
          - "Holds Training Center Faculty (TCF) or Regional Faculty designation"
          - "Has evaluated and certified at least 10 new instructors"
          - "Manages a Training Center or training program with at least 5 active instructors"
          - "Trains at least 200 students per year (directly or through instructors supervised)"
          - "Conducts at least 2 quality assurance reviews of instructors per year"
        resources:
          - title: "AHA — Training Center Faculty Role"
            url: "https://cpr.heart.org/en/cpr-courses-and-kits"
            type: "article"
          - title: "AHA — Resuscitation Education Science"
            url: "https://cpr.heart.org/en/resuscitation-science"
            type: "article"
          - title: "Red Cross — Advanced Instructor Development"
            url: "https://www.redcross.org/take-a-class/become-an-instructor"
            type: "course"
        practice:
          - "Conduct a quality assurance review of an instructor's class — observe, evaluate skills testing accuracy, and provide written feedback"
          - "Design a community CPR training initiative targeting underserved populations"
          - "Write a Training Center annual report including classes taught, students certified, instructor development, and quality metrics"
        projects:
          - "Achieve Training Center Faculty designation with AHA or equivalent advanced instructor role"
          - "Launch a community CPR training program that certifies at least 100 people in its first year"
        tips:
          - "The ultimate goal of instructor certification is community impact — every person you train becomes a potential lifesaver. The true measure of success is not how many cards you issue, but how many lives are saved because someone you trained was there when it mattered"
    tags: ["teaching", "leadership", "certification"]

