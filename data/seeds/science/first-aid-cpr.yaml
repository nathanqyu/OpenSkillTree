          - "30 min: Design a 2-hour splinting skills workshop with stations for upper extremity, lower extremity, and spinal injuries"
          - "20 min: Evaluate 5 students performing splinting and document specific feedback"
        projects:
          - "Deliver a musculoskeletal injury management class to at least 10 students with hands-on skills testing"
          - "Write a training scenario guide for 5 different fracture patterns with expected findings and management steps"
        tips:
          - "The best orthopedic first-aid instructors create realistic moulage and scenarios — a well-made simulated open fracture creates more learning than 10 PowerPoint slides about open fractures"
