# OpenSkillTree — Seed Skill Tree: Meditation & Mindfulness
#
# Domain:  Science / Contemplative Practice / Meditation & Mindfulness
# Author:  OpenSkillTree Team (first pass)
# Version: 0.1.0
#
# Practice reference: cumulative hours and daily consistency
# Benchmark levels loosely map to:
#   beginner     ≈ 5–10 min daily for 2–4 weeks  (establishing habit, learning basics)
#   intermediate ≈ 20+ min daily for 3+ months    (steady practice, deepening technique)
#   advanced     ≈ 45+ min daily, retreat experience, 500+ lifetime hours
#   expert       ≈ teacher-level, 1000+ hours, formal training in guiding others
#
# Teaching order based on standard secular meditation pedagogy (MBSR,
# Headspace progression, Waking Up app curriculum, UCLA MARC):
#   Breath awareness (anchor) → body scan (interoception) →
#   focused attention / concentration → open monitoring / mindfulness →
#   loving-kindness (metta) → walking meditation → stress reduction (MBSR) →
#   neuroscience literacy → retreat practice → teaching & guiding.
# Breath awareness is universally taught first as the foundational anchor.

tree:
  id: "science/meditation-mindfulness"
  title: "Meditation & Mindfulness"
  description: >
    A complete skill map for meditation and mindfulness practice — the
    systematic training of attention, awareness, and compassion. Covers
    breath-based anchoring, body scanning, concentration (shamatha),
    open monitoring (vipassana-style mindfulness), loving-kindness,
    movement-based practice, evidence-based stress reduction, the
    neuroscience of contemplative practice, intensive retreat training,
    and the skills needed to teach and guide others. Draws on secular
    curricula including MBSR, Headspace, Waking Up, and the UCLA
    Mindful Awareness Research Center.
  domain: "Science"
  visibility: "public"

nodes:
  # -- FOUNDATION ----------------------------------------------------------------
  - id: "science/meditation-mindfulness/breath-awareness"
    title: "Breath Awareness"
    description: >
      The universal starting point for meditation. Breath awareness trains
      the capacity to place attention on a single sensory anchor — the
      physical sensations of breathing — and to notice when the mind
      wanders and gently return. Every major tradition and secular program
      (MBSR, Headspace, Waking Up, UCLA MARC) begins here.

      Sub-skills covered: finding the breath (nostrils, chest, belly),
      counting breaths (1-to-10 cycles), noting the pause between
      inhale and exhale, recognizing mind-wandering without judgment,
      the redirect (gentle return to the anchor), and establishing a
      daily sit habit.

      Drills to practice: (1) Timed sits — 5 min, then 10, then 15,
      tracking consecutive days. (2) Breath counting — count exhales
      1 to 10 and restart; note how far you get before losing count.
      (3) Location experiment — spend one session noticing breath at
      nostrils, next at belly, compare which is easier to track.
      (4) Wandering tally — use a clicker or mental note each time
      you notice the mind has wandered; the noticing IS the practice.
    benchmarks:
      - level: beginner
        criteria: "Sits for 5-10 minutes with eyes closed. Can locate the breath at nostrils, chest, or belly. Notices when mind wanders and returns attention to the breath. Completes at least 10 sessions over 2 weeks. Understands that noticing distraction is success, not failure."
        metrics:
          - "Completes 10 guided breath-awareness sessions of 5-10 min within 2 weeks"
          - "Counts breath cycles 1-to-10 and reaches 10 at least once per session"
          - "Logs at least 10 sessions in a meditation app or journal within first 14 days"
          - "Self-reports noticing mind-wandering and redirecting 3+ times per sit"
        resources:
          - title: "Headspace — Basics Course (10 sessions, free)"
            url: "https://www.headspace.com/meditation/meditation-for-beginners"
            type: "course"
          - title: "UCLA MARC — Free Guided Meditations (Breathing Meditation)"
            url: "https://www.uclahealth.org/programs/marc/free-guided-meditations/guided-meditations"
            type: "video"
          - title: "Sam Harris / Waking Up — Introductory Course"
            url: "https://www.wakingup.com/"
            type: "course"
          - title: "Yoga With Adriene — Meditation for Beginners"
            url: "https://www.youtube.com/watch?v=4pLUleLdwY4"
            type: "video"
        practice:
          - "5 min daily: Sit quietly and count exhales 1 to 10; restart when you lose count or reach 10"
          - "5 min daily: Follow a guided breath awareness meditation from UCLA MARC or Headspace"
          - "2 min: After each session, journal one sentence about what you noticed (mind busy, calm, sleepy, etc.)"
        projects:
          - "Complete a 10-day beginner course on Headspace or Waking Up without skipping a day"
          - "Build a 14-day streak of daily sits (any duration) tracked in an app or paper log"
        tips:
          - "The goal is NOT to stop thinking — the goal is to notice when you have drifted and come back; every return to the breath is a successful repetition"
          - "If you cannot feel the breath, place one hand on your belly and feel the rise and fall — this makes the anchor more tangible"
      - level: intermediate
        criteria: "Sits for 20+ minutes without a guide. Maintains attention on the breath for multiple consecutive cycles before mind-wandering. Distinguishes subtle breath qualities (warmth, coolness, rhythm changes). Practices daily for 3+ months with minimal gaps."
        metrics:
          - "Sustains unguided breath-focused sits of 20 minutes 5+ days per week"
          - "Counts 10 consecutive breath cycles without losing count on at least 3/5 attempts"
          - "Maintains a daily practice streak of 60+ consecutive days"
          - "Self-reports average of 1-2 major distractions per 20-minute sit (down from 5+)"
          - "Cumulative logged practice reaches 30+ hours"
        resources:
          - title: "Tara Brach — Breath as Home Base (talk)"
            url: "https://www.tarabrach.com/guided-meditations/"
            type: "video"
          - title: "Insight Timer — Unguided Timer with Interval Bells"
            url: "https://insighttimer.com/meditation-timer"
            type: "tool"
          - title: "Waking Up — The Fundamentals Course (28 sessions)"
            url: "https://www.wakingup.com/"
            type: "course"
          - title: "Greater Good Science Center — Mindful Breathing Practice"
            url: "https://ggia.berkeley.edu/practice/mindful_breathing"
            type: "article"
        practice:
          - "20 min daily: Unguided sit using Insight Timer with a single bell at 10 min — track breath at nostrils for the full duration"
          - "5 min: After each sit, note in a journal: approximate number of times mind wandered, dominant distraction type (planning, memory, sensation)"
          - "Weekly: One 30-minute sit to push your duration edge"
        projects:
          - "Complete 90 consecutive days of daily practice (any duration 15 min+) and review your journal for patterns"
          - "Sit for 30 minutes unguided and self-assess: how many breath cycles can you track before distraction?"
        tips:
          - "When you find your attention stable on the breath for several cycles, try narrowing focus to just the tip of the nostrils — this refines concentration further"
          - "Posture matters more as sits get longer — sit upright with a straight spine, relaxed shoulders, and chin slightly tucked so you stay alert without tension"
      - level: advanced
        criteria: "Sits for 45+ minutes with sustained breath focus. Experiences periods of minimal mind-wandering (5+ minutes of continuous attention). Notices the space between breaths and subtle shifts in rhythm without controlling them. Has retreat experience (at least one multi-day silent retreat). 200+ cumulative hours."
        metrics:
          - "Completes 45-minute unguided breath-focused sits 4+ times per week"
          - "Self-reports periods of 5+ minutes of unbroken breath attention in at least half of sessions"
          - "Has completed at least one multi-day (3+ day) silent meditation retreat"
          - "Cumulative logged practice reaches 200+ hours"
          - "Can describe the difference between controlling the breath and observing it, and demonstrates passive observation in practice"
        resources:
          - title: "Tara Brach — Deepening Breath Meditation (guided talk)"
            url: "https://www.tarabrach.com/guided-meditations/"
            type: "video"
          - title: "Sam Harris / Waking Up — Advanced Lessons on Concentration"
            url: "https://www.wakingup.com/"
            type: "course"
          - title: "Insight Timer — Long Unguided Sessions & Community Groups"
            url: "https://insighttimer.com"
            type: "tool"
        practice:
          - "45 min daily: Unguided sit with breath as sole object; notice when attention becomes effortless versus forced"
          - "One session per week: 60-minute sit — observe the breath without any counting or labeling, just pure attention to sensation"
          - "Retreat: attend at least one 3-to-7-day silent retreat emphasizing breath-based concentration (e.g., Goenka, IMS, Spirit Rock)"
        projects:
          - "Complete a 5-to-10-day silent meditation retreat and journal about shifts in breath attention over the course of the retreat"
          - "Track 200 cumulative practice hours and write a reflection on how your relationship to the breath has changed since the first sit"
        tips:
          - "At this stage, the breath can become very subtle — if it seems to disappear, widen your attention to the whole body breathing rather than forcing focus on one spot"
          - "Do not chase special states — treat calm, bliss, and restlessness all the same: notice them and return to the breath"
      - level: expert
        criteria: "Breath awareness is effortless and immediate — attention rests on the breath without deliberate placement. Can sustain hour-plus sits with near-continuous attention. Guides others in breath-based meditation. Has 500+ cumulative hours. Demonstrates equanimity during practice regardless of mental or physical discomfort."
        metrics:
          - "Sustains 60+ minute sits with self-reported near-continuous breath attention (fewer than 3 major distractions per hour)"
          - "Cumulative logged practice exceeds 500 hours"
          - "Has led or co-led at least 5 guided breath-awareness sessions for groups"
          - "Can clearly articulate the progression from effortful to effortless attention and teach it to beginners"
          - "Maintains daily practice of 45+ minutes for 1+ year without significant breaks"
        resources:
          - title: "UCLA MARC — Mindfulness Research & Teacher Training Resources"
            url: "https://www.uclahealth.org/programs/marc"
            type: "article"
          - title: "Insight Timer — Teacher and Community Guide Tools"
            url: "https://insighttimer.com/meditation-teachers"
            type: "tool"
          - title: "Tara Brach — Full Archive of Talks and Guided Meditations"
            url: "https://www.tarabrach.com/guided-meditations/"
            type: "video"
        practice:
          - "60 min daily: Unguided sit — breath is the home base but attention should settle without effortful placement"
          - "Monthly: lead a 20-minute guided breath meditation for a small group and collect feedback"
          - "Ongoing: mentor one beginner through their first 30 days of practice"
        projects:
          - "Design and lead a 4-week breath-awareness introduction course (weekly 30-min sessions) for beginners"
          - "Write a personal practice guide documenting your breath-awareness progression from first sit to current practice"
        tips:
          - "Teaching breath awareness to others is the fastest way to deepen your own understanding — you will discover subtle aspects of the practice through the questions beginners ask"
          - "At the expert level, the breath can become an always-available anchor even off the cushion — practice brief breath check-ins throughout the day to integrate formal and informal practice"
    tags: ["foundation", "concentration", "measurable"]

  # -- BODY SCAN -----------------------------------------------------------------
  - id: "science/meditation-mindfulness/body-scan"
    title: "Body Scan"
    description: >
      Systematic movement of attention through the body from head to toe
      (or toe to head), noticing sensations without trying to change them.
      The body scan builds interoceptive awareness — the ability to sense
      internal bodily states — which is foundational to both mindfulness
      and emotional regulation. It is a core practice in MBSR (Mindfulness-
      Based Stress Reduction) and most secular mindfulness programs.

      Sub-skills covered: sequential attention (moving through body regions
      in order), noticing physical sensations (tingling, warmth, pressure,
      numbness, pain), distinguishing sensation from interpretation (e.g.,
      tightness in chest vs. anxiety), staying with difficult sensations
      without reactivity, and progressive relaxation as a side effect
      (not the goal) of non-reactive attention.

      Drills to practice: (1) Guided 20-min body scan — follow a recording
      from UCLA MARC or Headspace. (2) Speed scan — 5 min head-to-toe
      rapid sweep. (3) Spot check — pick one body region (hands, feet,
      face) and spend 5 min exploring just that area. (4) Lying vs.
      sitting comparison — do the same scan in both postures and note
      differences in sensation.
    benchmarks:
      - level: beginner
        criteria: "Completes a guided body scan of 15-20 minutes without falling asleep. Moves attention sequentially through at least 5 body regions (feet, legs, torso, arms, head). Notices at least one distinct sensation per region. Understands the difference between relaxation and awareness."
        metrics:
          - "Completes 8 guided body scan sessions of 15-20 min within 3 weeks"
          - "Reports noticing at least 1 distinct sensation per body region in post-session journal"
          - "Stays awake through the full scan in at least 6 out of 8 sessions"
          - "Can name 3+ types of physical sensations (tingling, warmth, pressure, tightness, numbness)"
        resources:
          - title: "UCLA MARC — Body Scan Guided Meditation (free)"
            url: "https://www.uclahealth.org/programs/marc/free-guided-meditations/guided-meditations"
            type: "video"
          - title: "Headspace — Body Scan Basics"
            url: "https://www.headspace.com/meditation/body-scan"
            type: "course"
          - title: "Yoga With Adriene — Body Scan Meditation"
            url: "https://www.youtube.com/watch?v=ihwcw_ofuME"
            type: "video"
          - title: "Greater Good Science Center — Body Scan Meditation"
            url: "https://ggia.berkeley.edu/practice/body_scan_meditation"
            type: "article"
        practice:
          - "15 min daily: Follow a guided body scan recording (UCLA MARC or Headspace) lying down or seated"
          - "5 min: After each scan, write one sentence per body region about what you noticed"
          - "3 min: Quick standing body scan before meals — sweep attention from feet to head"
        projects:
          - "Complete 8 body scan sessions in 3 weeks and compile a sensation journal noting patterns"
          - "Do one body scan lying down and one sitting up on the same day — note the differences"
        tips:
          - "If you keep falling asleep during body scans, try sitting upright or keeping your eyes slightly open — drowsiness is the most common beginner challenge"
          - "There is no wrong sensation — numbness, nothing, blankness, and absence of feeling are all valid observations"
      - level: intermediate
        criteria: "Completes unguided body scans of 30+ minutes. Notices subtle sensations (pulse, micro-tensions, temperature gradients). Can slow down and linger in areas of discomfort without reactivity. Practices 3+ times per week for 3+ months."
        metrics:
          - "Sustains unguided body scans of 30 minutes 3+ times per week"
          - "Reports noticing 3+ distinct sensations per body region (not just 'tense' or 'relaxed')"
          - "Can stay with uncomfortable sensations (e.g., knee pain, back tension) for 2+ minutes without shifting position"
          - "Cumulative body scan practice reaches 20+ hours"
        resources:
          - title: "Tara Brach — Body Scan: Arriving in Presence (guided)"
            url: "https://www.tarabrach.com/guided-meditations/"
            type: "video"
          - title: "Insight Timer — Body Scan Meditations (curated collection)"
            url: "https://insighttimer.com/meditation-topics/body-scan"
            type: "video"
          - title: "Greater Good Science Center — The Science of Interoception"
            url: "https://greatergood.berkeley.edu/topic/mindfulness"
            type: "article"
        practice:
          - "30 min 3x/week: Unguided body scan — move through the body in fine detail (individual fingers, sides of the face, internal organs)"
          - "10 min: Spot-focus practice — pick one area of chronic tension and spend 10 minutes just observing it"
          - "5 min daily: Quick body scan at the start of each meditation sit before switching to breath"
        projects:
          - "Map your body's typical sensation patterns: create a body outline and color-code regions by common sensations over a 2-week period"
          - "Practice a 45-minute slow body scan and write a reflection comparing it to your first 15-minute scan"
        tips:
          - "Interoceptive awareness improves with repetition — the same body region will reveal increasingly subtle sensations the more you scan it"
          - "When you encounter numbness or blankness in a region, stay there — numbness is not absence of sensation but a signal worth investigating"
      - level: advanced
        criteria: "Scans the entire body in fine detail — individual joints, internal organs, skin surface vs. deeper layers. Uses body scan as a doorway to insight — notices the impermanent, changing nature of all sensation. Integrates body awareness into daily life (notices tension arising in real-time during stress). Retreat experience with extended body-scan practice."
        metrics:
          - "Completes 45-minute body scans with fine-grained attention (30+ distinct body regions)"
          - "Reports spontaneous body awareness off the cushion — notices stress-related tension within seconds of it arising"
          - "Has completed a retreat that included extended body-scan practice (e.g., Goenka 10-day)"
          - "Cumulative body scan practice reaches 100+ hours"
        resources:
          - title: "Waking Up — Body and Sensation Advanced Lessons"
            url: "https://www.wakingup.com/"
            type: "course"
          - title: "Tara Brach — Radical Acceptance: Body-Based Awareness (talk)"
            url: "https://www.tarabrach.com/radical-acceptance/"
            type: "video"
          - title: "UCLA MARC — Research on Interoception and Mindfulness"
            url: "https://www.uclahealth.org/programs/uclamindful/about-us/research/maps-research"
            type: "article"
        practice:
          - "45 min 4x/week: Full body scan moving through 30+ regions, noticing arising and passing of sensations"
          - "Throughout the day: 3 micro body-scans (30 seconds each) triggered by routine events (phone ringing, sitting down, waiting)"
          - "One extended 90-minute body scan per month to explore deep interoceptive territory"
        projects:
          - "Complete a 10-day Goenka Vipassana retreat or equivalent body-scan-intensive retreat"
          - "Write a 1-page reflection on how body awareness has changed your relationship to stress or emotional reactivity"
        tips:
          - "At the advanced level, let go of the sequential scanning pattern sometimes — allow attention to move freely to wherever sensation is most vivid"
          - "Notice how sensations arise and pass without your intervention — this direct observation of impermanence is the insight gateway"
      - level: expert
        criteria: "Body awareness is continuous — the practitioner can drop into full-body felt sense at any moment. Guides others in body scan practice. Understands and can explain the neuroscience of interoception. Has trained formally in MBSR or equivalent body-scan pedagogy. 500+ cumulative hours including body-scan-focused practice."
        metrics:
          - "Can guide a 30-minute body scan for a group from memory with clear, well-paced instructions"
          - "Demonstrates continuous interoceptive awareness in daily life (verified by self-report and/or peer feedback)"
          - "Cumulative practice (including body scan) exceeds 500 hours"
          - "Has completed formal teacher training that includes body scan instruction (MBSR, MBCT, or equivalent)"
        resources:
          - title: "UCLA MARC — MBSR Teacher Training Information"
            url: "https://www.uclahealth.org/programs/marc/facilitating-mindfulness/continuing-mindfulness-teacher-education"
            type: "course"
          - title: "Tara Brach — Teaching Meditation: Body-Based Practices"
            url: "https://www.tarabrach.com/guided-meditations/"
            type: "video"
          - title: "Greater Good Science Center — Mindfulness & the Body Research"
            url: "https://greatergood.berkeley.edu/topic/mindfulness"
            type: "article"
        practice:
          - "Daily: Integrate body scan into formal sits — start each session with a 5-min scan before primary technique"
          - "Monthly: Lead a guided body scan for a group and collect participant feedback"
          - "Quarterly: Review interoception research literature to stay current on the science"
        projects:
          - "Design and deliver a 4-week body scan course for beginners with progressive session lengths"
          - "Compile a teaching guide for body scan meditation including common challenges and adaptations for different populations"
        tips:
          - "When teaching body scan, pacing is everything — leave long pauses between instructions; beginners need more silence than you think"
          - "Different populations need different adaptations — trauma-sensitive body scan avoids directing attention to areas commonly associated with trauma and always offers choice"
    tags: ["foundation", "interoception", "MBSR"]

  # -- FOCUSED ATTENTION (CONCENTRATION) -----------------------------------------
  - id: "science/meditation-mindfulness/focused-attention"
    title: "Focused Attention (Concentration)"
    description: >
      The deliberate training of one-pointed concentration (shamatha in
      the Buddhist tradition). Focused attention meditation uses a single
      object — breath, a visual point, a mantra, or a candle flame — and
      the practitioner returns to that object every time the mind wanders.
      This builds the attentional stability that underlies all other
      meditation practices.

      Sub-skills covered: choosing and committing to an anchor object,
      sustaining attention for increasing durations, recognizing subtle
      vs. gross distractions, labeling distractions (thinking, planning,
      remembering) to create distance, developing access concentration
      (a stable baseline of attention), and working with the five
      hindrances (desire, aversion, sloth, restlessness, doubt).

      Drills to practice: (1) Single-point gaze (trataka) — stare at a
      candle flame or dot on the wall for 5 min without looking away.
      (2) Mantra repetition — silently repeat a single word or phrase
      for 10 min, returning when the mind wanders. (3) Counting
      meditation — count each exhale to 10, restart from 1 if you lose
      track. (4) Progressive duration challenge — add 5 min per week.
    benchmarks:
      - level: beginner
        criteria: "Chooses a single object of focus (breath, mantra, or visual point) and returns to it repeatedly during a 10-minute sit. Understands the difference between focused attention and mind-wandering. Can label a distraction (thinking, planning, hearing) before returning to the object."
        metrics:
          - "Completes 12 focused-attention sessions of 10 min in 3 weeks"
          - "Reaches a count of 10 (breath counting) at least 2 times per 10-minute session"
          - "Labels the type of distraction (thinking, planning, sensory) before returning to focus 50% of the time"
          - "Reports maintaining focus on a single object for at least 30 consecutive seconds"
        resources:
          - title: "Headspace — Focus Course"
            url: "https://www.headspace.com/meditation/focus"
            type: "course"
          - title: "Waking Up — Concentration Introductory Lessons"
            url: "https://www.wakingup.com/"
            type: "course"
          - title: "UCLA MARC — Guided Meditation: Focusing"
            url: "https://www.uclahealth.org/programs/marc/free-guided-meditations/guided-meditations"
            type: "video"
        practice:
          - "10 min daily: Choose one anchor (breath at nostrils, mantra, or candle flame) and keep returning to it every time you notice you have drifted"
          - "5 min: Trataka (candle gazing) — stare at a flame without blinking as long as comfortable, then close eyes and hold the afterimage"
          - "5 min: Label practice — each time you notice a distraction, silently whisper its type (thinking, hearing, feeling) before returning"
        projects:
          - "Complete a 3-week concentration challenge: week 1 at 10 min, week 2 at 12 min, week 3 at 15 min daily"
          - "Try 3 different anchor objects (breath, mantra, candle) over 3 days and journal which held your attention best"
        tips:
          - "Concentration is a muscle — it gets stronger with repetition, not force; do not clench your jaw or tense your body trying to focus"
          - "Label distractions gently (whisper 'thinking' internally) — this creates a micro-moment of metacognition that makes it easier to let go"
      - level: intermediate
        criteria: "Sustains focused attention for 20+ minutes on a single object. Experiences periods of 2-5 minutes of continuous attention. Recognizes the five hindrances (desire, aversion, sloth, restlessness, doubt) when they arise. Practices daily for 3+ months."
        metrics:
          - "Sustains 20-minute focused attention sessions 5+ days per week"
          - "Self-reports periods of 2-5 minutes of unbroken focus in at least half of sessions"
          - "Can name and recognize all 5 hindrances during practice"
          - "Cumulative focused attention practice reaches 40+ hours"
          - "Completes a full 10-count (breath counting) without losing track on 5/10 attempts"
        resources:
          - title: "Tara Brach — Working with the Hindrances (talk)"
            url: "https://www.tarabrach.com/guided-meditations/"
            type: "video"
          - title: "Waking Up — Deepening Concentration Lessons"
            url: "https://www.wakingup.com/"
            type: "course"
          - title: "Insight Timer — Concentration Meditation Collection"
            url: "https://insighttimer.com/meditation-topics/concentration"
            type: "video"
          - title: "Greater Good Science Center — How Meditation Changes the Brain"
            url: "https://greatergood.berkeley.edu/article/item/how_to_focus_a_wandering_mind"
            type: "article"
        practice:
          - "20 min daily: Unguided single-object focus — stay with chosen anchor for full duration"
          - "5 min: When a hindrance arises, name it (e.g., 'restlessness'), observe it for 30 seconds, then return to the object"
          - "Weekly: One 30-minute sit to push concentration duration"
        projects:
          - "Keep a hindrance journal for 4 weeks — after each sit, note which hindrance was most prominent and what triggered it"
          - "Build up to a 30-minute unbroken focused-attention sit and write a reflection on the experience"
        tips:
          - "Sloth and restlessness are the two most common intermediate hindrances — for sloth, try meditating with eyes slightly open; for restlessness, do 5 minutes of walking meditation first"
          - "Access concentration (a stable, relaxed focus) is the goal — not laser-beam intensity; if you feel strain, you are trying too hard"
      - level: advanced
        criteria: "Sustains 45+ minutes of focused attention with minimal distraction. Experiences access concentration (sustained, effortless focus) regularly. Recognizes subtle distractions (mental images, background mental chatter) before they pull attention. Has retreat experience with concentration practice. 200+ hours."
        metrics:
          - "Completes 45-minute unguided concentration sits 4+ times per week"
          - "Self-reports access concentration (stable, easeful attention) arising in at least 30% of sits"
          - "Recognizes subtle distractions (background imagery, sub-verbal thoughts) before they become gross distractions"
          - "Has completed at least one concentration-focused retreat (3+ days)"
          - "Cumulative focused attention practice reaches 200+ hours"
        resources:
          - title: "Sam Harris / Waking Up — Advanced Concentration Practice"
            url: "https://www.wakingup.com/"
            type: "course"
          - title: "Tara Brach — Concentration and the Jhanas (talk)"
            url: "https://www.tarabrach.com/guided-meditations/"
            type: "video"
          - title: "Insight Timer — Long-Duration Concentration Sessions"
            url: "https://insighttimer.com"
            type: "tool"
        practice:
          - "45 min daily: Single-object concentration — when access concentration arises, rest in it without manipulating"
          - "10 min: After main sit, review the session mentally — where did attention become unstable? What preceded it?"
          - "Retreat: attend a concentration-focused retreat (shamatha, jhana practice) of 5+ days"
        projects:
          - "Complete a 7-day concentration retreat and journal the progression of attentional stability across days"
          - "Track access concentration frequency over 3 months: note in each session log whether stable focus arose and how long it lasted"
        tips:
          - "Access concentration often arises when you stop trying so hard — paradoxically, relaxing effort while maintaining intention is the key"
          - "Do not chase pleasant states that arise during concentration — treat jhana factors (pleasure, ease, one-pointedness) as natural byproducts, not goals"
      - level: expert
        criteria: "Concentration is a reliable, on-demand skill — can enter access concentration within minutes. Understands and may have experienced jhana or jhana-adjacent states. Guides others in concentration practice. Has 500+ hours. Can teach the progressive stages of concentration and common pitfalls."
        metrics:
          - "Self-reports ability to enter access concentration within 5-10 minutes of sitting"
          - "Sustains 60+ minute concentration sits regularly"
          - "Cumulative practice exceeds 500 hours"
          - "Has led concentration meditation sessions for groups on at least 5 occasions"
          - "Can articulate the stages of concentration practice (from gross distraction to access concentration to absorption) and teach each stage"
        resources:
          - title: "UCLA MARC — Teacher Training in Meditation Instruction"
            url: "https://www.uclahealth.org/programs/marc/facilitating-mindfulness/continuing-mindfulness-teacher-education"
            type: "course"
          - title: "Insight Timer — Teaching and Leading Meditations"
            url: "https://insighttimer.com/meditation-teachers"
            type: "tool"
          - title: "Greater Good Science Center — Attention and Meditation Research"
            url: "https://greatergood.berkeley.edu/topic/mindfulness"
            type: "article"
        practice:
          - "60 min daily: Concentration practice as primary technique, with periodic self-assessment of attentional quality"
          - "Monthly: Guide a concentration meditation for a group and debrief with participants about their experience"
          - "Ongoing: Study classical concentration texts (Visuddhimagga, Right Concentration by Leigh Brasington) to deepen theoretical understanding"
        projects:
          - "Develop a 6-week progressive concentration course with weekly session plans from beginner to intermediate level"
          - "Write a personal map of your concentration practice milestones and turning points"
        tips:
          - "At the expert level, concentration and mindfulness merge — stable attention naturally reveals the moment-to-moment flow of experience"
          - "When teaching concentration, emphasize the balance between effort and ease — most students either try too hard or are too lax"
