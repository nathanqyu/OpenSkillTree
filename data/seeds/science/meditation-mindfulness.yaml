  - source: "science/meditation-mindfulness/focused-attention"
    target: "science/meditation-mindfulness/open-monitoring"
    type: "enables"
    note: "Stable focused attention is prerequisite for open monitoring — you must be able to sustain attention before you can open it to the full field of experience"

  - source: "science/meditation-mindfulness/body-scan"
    target: "science/meditation-mindfulness/open-monitoring"
    type: "enables"
    note: "Body scan develops the interoceptive and sensory awareness that becomes the content of open monitoring practice"

