        criteria: "Established meditation teacher with a regular teaching practice, supervision experience, and contribution to the broader meditation community. Trains other teachers. Deep personal practice of 1000+ hours. Recognized in a tradition or training program. Can teach across contexts (clinical, corporate, retreat, community)."
        metrics:
