  - source: "science/meditation-mindfulness/breath-awareness"
    target: "science/meditation-mindfulness/focused-attention"
    type: "enables"
    note: "Breath awareness is the simplest form of focused attention — it directly develops the concentration needed for advanced single-point focus"

  - source: "science/meditation-mindfulness/breath-awareness"
    target: "science/meditation-mindfulness/walking-meditation"
    type: "enables"
    note: "Basic attention training from breath awareness transfers to tracking physical sensations during walking"

