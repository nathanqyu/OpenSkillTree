  - source: "science/meditation-mindfulness/open-monitoring"
    target: "science/meditation-mindfulness/loving-kindness"
    type: "complementary"
    note: "Open monitoring and metta complement each other — awareness practice deepens compassion, and compassion practice opens awareness"

