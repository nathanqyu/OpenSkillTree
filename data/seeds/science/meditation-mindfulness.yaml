            type: "tool"
        practice:
          - "2x/month: Lead a 20-30 minute guided meditation for a group, varying the technique each time"
          - "After each session: debrief with a mentor or senior teacher about what went well and what to improve"
          - "Weekly: Study how experienced teachers guide sessions (listen to Tara Brach, Sam Harris, MARC recordings) and note their pacing, language, and silence use"
        projects:
          - "Design and lead a 4-week meditation introduction course (one session per week) for a workplace or community group"
          - "Complete a formal meditation teacher training program (UCLA MARC, Tara Brach, or equivalent)"
        tips:
          - "Record every session you lead and listen back within 24 hours — you will hear pacing issues and verbal habits you cannot notice in the moment"
          - "Trauma-informed language is essential from the start: always offer invitations ('you might try...') rather than commands ('now close your eyes')"
      - level: advanced
        criteria: "Teaches meditation regularly and confidently. Designs multi-week programs for specific populations. Handles participant challenges (emotional reactions, resistance, physical pain, sleepiness) skillfully. Has completed formal teacher training. Personal practice exceeds 500 hours. Has a teaching mentor or supervision."
        metrics:
          - "Teaches meditation regularly (weekly or more) for groups of 10+ people"
          - "Has designed and delivered at least 2 multi-week programs"
          - "Has handled 5+ participant challenges (crying, panic, resistance, strong emotion) during or after sessions"
          - "Has completed formal teacher training certification"
          - "Personal practice exceeds 500 cumulative hours"
          - "Receives regular teaching supervision from a senior teacher"
